{id:953,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路路面标线中，停止线的宽度通常为？",options:["20~40cm","5cm","100cm","1cm"],answer:[0],explanation:"停止线宽度通常20-40cm(横向宽带)，比一般标线(10-15cm)宽，确保驾驶员在较远处就能清晰看到。"},{id:954,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路设计中，平曲线与竖曲线的组合原则是？",options:["平包竖(竖曲线包含在平曲线内)，避免错位","各自独立","竖曲线包平曲线","不完全重叠"],answer:[0],explanation:"平包竖原则：竖曲线宜包含在平曲线范围内(竖曲线起终点在平曲线缓和曲线之外)，避免平竖曲线顶点错位造成视觉扭曲。"},{id:955,type:"single",category:"公路工程技术标准",difficulty:2,question:"公路路线设计中的运行速度预测模型，通常采用什么速度作为代表？",options:["V85(85%位车速)","V50(中位车速)","V15(15%位车速)","设计速度"],answer:[0],explanation:"运行速度预测采用V85(85%位车速)，代表大多数驾驶员实际使用的速度。根据平面和纵断面线形分段预测V85，检验与设计速度的协调性。"},{id:956,type:"single",category:"公路工程技术标准",difficulty:2,question:"公路设计阶段的安全评价通常采用什么方法？",options:["运行速度协调性评价(速度差法)","仅事故统计分析","仅专家评审","仅驾驶员问卷"],answer:[0],explanation:"设计阶段安全评价常用运行速度协调性法：检验相邻路段V85差值(ΔV85)，ΔV85>20km/h时线形协调性差，需调整设计。"},{id:957,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路限高架通常设置在什么位置？",options:["被保护结构物(桥梁/隧道/管线)前一定距离处","公路起点","公路终点","收费站"],answer:[0],explanation:"限高架设置在被保护结构物前方适当距离处，超高车辆碰到限高架时停车绕行，避免撞击后方的重要结构物。"},{id:958,type:"single",category:"公路工程技术标准",difficulty:2,question:"高速公路设计交通量采用什么年份的预测值？",options:["设计年限末年的AADT(通常为建成后第15年或第20年)","建成当年的AADT","施工期间的AADT","开通后第1年的AADT"],answer:[0],explanation:"设计交通量采用设计年限(规划期)末年预测AADT。高速公路设计年限一般为建成后15年或20年(根据项目重要性)。"},{id:959,type:"single",category:"交通管理与控制",difficulty:1,question:"城市道路交叉口处，停止线应设置在什么位置？",options:["人行横道线后方(上游侧)，距人行横道1~3m","人行横道线上","人行横道前方","交叉口中心"],answer:[0],explanation:"停止线设置在人行横道后方1~3m处，确保车辆停在安全位置不侵占人行横道，同时保证过街行人安全。"},{id:960,type:"single",category:"交通管理与控制",difficulty:2,question:"交叉口渠化设计的主要目的是？",options:["通过标线和导流岛等引导不同方向车流各行其道，减少冲突","增加信号相位","减少车道数","降低车速"],answer:[0],explanation:"渠化设计利用标线、交通岛、导流线等将交叉口内不同流向的交通流在空间上进行分离和引导，减少冲突点、提高安全和效率。"},{id:961,type:"single",category:"交通管理与控制",difficulty:2,question:"城市道路网络中，断头路的缺点是？",options:["减少路网连通性，增加绕行距离","增加路网密度","提高可达性","减少交通拥堵"],answer:[0],explanation:"断头路(Dead-end Road)降低了路网的连通性和可达性，迫使车辆绕行，增加其他道路负担。提高路网连通度是缓解拥堵的策略之一。"},{id:962,type:"single",category:"交通管理与控制",difficulty:1,question:"公交站台(港湾式)的设计目的是？",options:["公交车停靠时不占用行车道，减少对后方车流的干扰","增加公交运力","减少公交线路","提高公交票价"],answer:[0],explanation:"港湾式公交站台将公交停靠区域凹入人行道侧，公交车停靠时不影响行车道上的正常车流，减少延误和追尾风险。"},{id:963,type:"single",category:"交通管理与控制",difficulty:2,question:"交通工程中，饱和度的英文是？",options:["Degree of Saturation (v/c ratio)","Saturation flow","Capacity","Level of Service"],answer:[0],explanation:"饱和度=Degree of Saturation=V/C比(Volume/Capacity ratio)。饱和流率=Saturation Flow Rate。服务水平=Level of Service(LOS)。"},{id:964,type:"single",category:"交通管理与控制",difficulty:2,question:"交叉口禁左管理(禁止左转)可以减少什么？",options:["交叉冲突点数量和信号相位数量","右转交通量","直行交通量","行人流量"],answer:[0],explanation:"禁止左转消除了左转车流与其他方向的交叉冲突(最危险冲突类型)，可减少信号相位(简单化)，提高交叉口通行安全与效率。"},{id:965,type:"single",category:"交通流理论",difficulty:1,question:"浮动车法调查中，测试车行驶速度应？",options:["尽量接近道路上大多数车辆的平均速度","以最快速度行驶","以最慢速度行驶","以设计速度行驶"],answer:[0],explanation:"测试车应尽量以车流平均速度行驶(与被测车流融为一体)，速度过快或过慢都会增大测量误差。"},{id:966,type:"single",category:"交通流理论",difficulty:2,question:"时间平均速度的观测方法是在道路某一断面？",options:["记录一段时间内通过的所有车辆的地点车速取算术平均","记录所有车辆的行程时间","记录交通密度","记录占有率"],answer:[0],explanation:"时间平均速度TMS(Time Mean Speed)：在道路固定断面上观测一段时间内各车辆通过该断面的瞬时车速，取算术平均值。"},{id:967,type:"single",category:"交通流理论",difficulty:1,question:"交通工程学中，DHV/K的值等于？",options:["AADT","PHF","MADT","ADT"],answer:[0],explanation:"DHV=K×AADT，所以AADT=DHV/K。即通过设计小时交通量和K值可反推年平均日交通量。"},{id:968,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道内监控摄像机的防护等级至少应达到？",options:["IP66或以上(防尘防水)","IP20","无要求","IP00"],answer:[0],explanation:"隧道内潮湿多尘有腐蚀性气体，摄像机防护等级通常IP66及以上(完全防尘+防强力水喷射)，有些还要求防爆等级。"},{id:969,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道照明电源应属于哪类负荷？",options:["一级负荷(配应急电源)","二级负荷","三级负荷","任意负荷"],answer:[0],explanation:"隧道照明(尤其是应急照明)属于一级负荷，必须配备UPS或柴油发电机等应急电源，保证外部电网故障时仍能正常照明≥30分钟。"},{id:970,type:"single",category:"公路隧道设计规范",difficulty:2,question:"特长隧道通常采用的通风方式是？",options:["分段纵向通风+竖井排送风","全横向通风","半横向通风","自然通风"],answer:[0],explanation:"特长隧道(>3000m)因污染物沿纵向累积过长，常用分段纵向通风：通过竖井/斜井将隧道分为若干通风段，每段独立送排风。"},{id:971,type:"single",category:"公路隧道设计规范",difficulty:3,question:"隧道火灾时排烟方向应与人员疏散方向的关系是？",options:["排烟方向与疏散方向相反(烟气不追及疏散人员)","相同","无关系","任意方向"],answer:[0],explanation:"理想的火灾排烟策略是使烟气流动方向与人员疏散方向相反(逆疏散方向排烟)，确保疏散通道处于无烟或低烟状态。"},{id:972,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路护栏上安装的公里标(里程牌)的作用是？",options:["标识当前公路里程位置","确定方向","限速","提供地名"],answer:[0],explanation:"公里标(里程牌)安装在护栏或路侧，标识当前所在里程，用于驾驶定位、紧急救援位置报告和养护管理。"},{id:973,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"收费员操作终端应显示什么信息？",options:["车辆类型、应收费额、支付方式、车道状态等","仅时间","仅日期","仅天气预报"],answer:[0],explanation:"收费员终端综合显示：车辆信息(车型/车牌)、费额、支付状态、车道设备状态、监控图像等，辅助收费员高效作业。"},{id:974,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"通信系统为监控系统和收费系统提供什么？",options:["数据传输通道(通信平台)","直接控制","电源供应","人员"],answer:[0],explanation:"通信系统是高速公路机电系统的神经中枢，为监控和收费系统提供语音、数据、图像传输的通信平台。"},{id:975,type:"single",category:"公路交通安全",difficulty:1,question:"钢制护栏立柱在埋入土中部分应做什么处理？",options:["热浸镀锌或等效防腐处理","不做处理","涂清漆","包塑料膜"],answer:[0],explanation:"钢立柱埋入土壤(含水和腐蚀性物质)易锈蚀，必须做热浸镀锌(通常≥80μm)或等效防腐处理，保证20年以上使用寿命。"},{id:976,type:"single",category:"公路交通安全",difficulty:1,question:"缆索护栏的缆索材料通常采用？",options:["高强度镀锌钢丝绳(通常3~4根)","普通钢丝","尼龙绳","链条"],answer:[0],explanation:"缆索护栏使用高强度镀锌钢丝绳(通常直径18-25mm，3-4根平行布置)，具有高抗拉强度和耐腐蚀性。"},{id:977,type:"single",category:"公路交通安全",difficulty:2,question:"护栏最小结构长度的物理意义是？",options:["护栏需要一定长度才能形成整体(连续梁/连续索)防护效应","护栏必须非常长","护栏可以非常短","任意长度均可"],answer:[0],explanation:"护栏短于最小长度时无法形成有效的整体防护(碰撞时端部效应影响大，护栏会整体位移或失效)。最小长度保证了足够锚固和力的传递。"},{id:978,type:"single",category:"公路交通安全",difficulty:1,question:"高速公路防眩板材料通常为？",options:["塑料(PE/PP)或玻璃钢(FRP)，轻质耐候","纯金属","木材","石材"],answer:[0],explanation:"防眩板常用：工程塑料(PE/PP——轻便/经济)、玻璃钢(FRP——强度高/耐候)、金属(钢/铝——耐用但重)。要求轻质、耐候、抗UV老化。"},{id:979,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路交叉口范围内的最小净空高度一般不小于？",options:["5.0~5.5m","2.5m","3.5m","10m"],answer:[0],explanation:"公路(含城市道路)上跨桥梁或管线的最小净空：高速/一级/二级≥5.0m，三四级≥4.5m。城市道路跨线桥净空通常≥5.0~5.5m。"},{id:980,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路标志牌上的文字高度根据什么确定？",options:["设计速度——速度越高字符越大","交通量","道路长度","车道数"],answer:[0],explanation:"标志文字高度与设计速度有关：120km/h时汉字高度≥60cm，100→50cm，80→40cm，60→30cm，40→20cm。速度越高需越大字保证远距离识读。"},{id:981,type:"single",category:"公路工程技术标准",difficulty:1,question:"JTG B01-2014标准的权威性在于？",options:["它是中华人民共和国交通运输部发布的行业标准，具有法律效力","它是企业标准","它是地方标准","它是推荐性标准"],answer:[0],explanation:"JTG(Jiaotong Guifan)是交通运输部发布的强制性或推荐性行业标准，在全国公路行业具有权威约束力。"},{id:982,type:"single",category:"交通管理与控制",difficulty:1,question:"人行横道线上行人的路权优先于？",options:["转弯车辆(转弯车辆必须让行正在人行横道上的行人)","所有车辆(包括直行)","非机动车","公交车"],answer:[0],explanation:"人行横道(斑马线)上行人享有优先通行权，转弯车辆在任何情况下都必须停车或减速让行正在通过的行人。"},{id:983,type:"single",category:"交通管理与控制",difficulty:2,question:"交叉口右转专用车道的设计可带来什么好处？",options:["右转车辆不需等待红灯(无冲突时)，减少延误","增加右转冲突","减少通行能力","增加信号相位"],answer:[0],explanation:"右转专用道+渠化岛使右转车流在多数情况下可不经信号灯直接右转(减速让行)，减少右转车辆排队对直行车道的影响。"},{id:984,type:"single",category:"交通管理与控制",difficulty:1,question:"交通警察指挥手势信号的效力与交通信号灯的关系是？",options:["交警手势>交通信号灯>交通标志标线","三者效力相同","信号灯>交警手势","标志标线>交警手势"],answer:[0],explanation:"交通信号效力等级：交通警察指挥手势>交通信号灯>交通标志标线。当三者不一致时，按高位效力执行。"},{id:985,type:"single",category:"交通流理论",difficulty:1,question:"交通调查中视频检测法的优点是？",options:["可回放核查、可提取多种交通参数","精度最高","成本最低","不受天气影响"],answer:[0],explanation:"视频检测法：录像可反复回放核查数据，可同时提取交通量、车型、速度、车头时距等多种参数。缺点是夜间/恶劣天气精度下降。"},{id:986,type:"single",category:"交通流理论",difficulty:2,question:"交通波理论中，消散波(Rarefaction Wave)是？",options:["排队车辆开始移动(从阻塞状态→自由流状态)时产生的波","车辆停止时产生的波","车流稳定行驶时产生的波","车辆加速时产生的波"],answer:[0],explanation:"消散波(稀疏波/扩张波)：绿灯亮起/拥堵消散时，车辆从阻塞密度向较低密度过渡，波速为正(向下游传播)。"},{id:987,type:"single",category:"交通流理论",difficulty:2,question:"入口匝道的合流区通行能力主要受什么因素影响？",options:["主线外侧车道的交通量和间隙分布","匝道长度","匝道宽度","匝道曲率"],answer:[0],explanation:"合流区通行能力取决于主线外侧车道能为合流车辆提供的可插车间隙数量和大小。主线流量越大间隙越少，合流区通行能力越低。"},{id:988,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道内禁止使用什么类型的灯具(普通要求)？",options:["无防护的裸露灯泡","LED灯具","高压钠灯","荧光灯"],answer:[0],explanation:"隧道内不能使用无防护的裸露灯泡(易碎/不防水/不防尘)。所有隧道灯具都应具有足够的防护等级(IP65+)。"},{id:989,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道火灾后排烟系统的恢复时间取决于？",options:["排烟风机持续运行时间和隧道内烟气完全排出所需时间","隧道长度","交通量","设计速度"],answer:[0],explanation:"火灾后需继续排烟直至烟气完全排出隧道，能见度恢复正常水平后，经检查确认安全方可恢复交通。"},{id:990,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"高速公路监控中心一般设置在什么位置？",options:["高速公路管理分中心或总中心，便于管理和调度","隧道内","收费站旁","服务区"],answer:[0],explanation:"监控中心(分中心/总中心)设置在交通便利、便于管理全线路段的位置，通常与收费管理中心或管理分公司合建。"},{id:991,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"ETC车载单元(OBU)通常安装在车辆的什么位置？",options:["前挡风玻璃内侧(后视镜附近)","车顶外部","车底","后备箱"],answer:[0],explanation:"OBU(On Board Unit/电子标签)安装在前挡风玻璃内侧后视镜附近，通过微波(5.8GHz DSRC)与路侧天线通信。"},{id:992,type:"single",category:"公路交通安全",difficulty:1,question:"交通标志结构立柱底部法兰盘的作用是？",options:["通过地脚螺栓与混凝土基础连接，将标志结构固定","装饰","调整高度","反光"],answer:[0],explanation:"立柱底部的法兰盘(底板)通过预埋地脚螺栓与混凝土基础连接，将风荷载等传递至基础。是标志结构最重要的受力连接节点。"},{id:993,type:"single",category:"公路交通安全",difficulty:2,question:"缆索护栏的初始张拉力设置过大会导致？",options:["缆索断裂风险增加，碰撞时缓冲效果变差","防护能力提高","维护更方便","成本降低"],answer:[0],explanation:"缆索初始张力过大会降低碰撞时的能量吸收能力(变形空间不足)，缆索本身及其端部锚固也面临更大的疲劳和断裂风险。"},{id:994,type:"single",category:"公路交通安全",difficulty:1,question:"夜间道路照明不良时，驾驶员主要依靠什么获取道路信息？",options:["车辆前照灯和道路反光设施(标线/轮廓标/标志)","仅凭经验","仅路灯","仅GPS"],answer:[0],explanation:"夜间照明不足时，驾驶员依靠车灯照射+道路反光设施(反光标线、轮廓标、反光标志)反馈的光线判断道路走向和边界。"},{id:995,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路设计中的缓和曲线参数A值(回旋线参数)决定了？",options:["缓和曲线的长度和曲率变化快慢(A^2=R×L)","圆曲线半径","超高值","纵坡值"],answer:[0],explanation:"缓和曲线参数A(回旋线参数)：A^2=R×Ls，A越大曲率变化越缓慢(缓和曲线越长)。A值根据设计速度、圆曲线半径和线形协调要求确定。"},{id:996,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路路基压实度的检测方法不包括？",options:["目测预估","灌砂法","环刀法","核子密度仪法"],answer:[0],explanation:"压实度检测方法：灌砂法(标准方法)、环刀法、核子密度仪法等。目测不可靠不能作为检测方法。压实度=实际干密度/最大干密度×100%。"},{id:997,type:"single",category:"交通管理与控制",difficulty:1,question:'交叉口停止线前的"左转待转区"标线的作用是？',options:["左转车辆可提前进入交叉口等待左转时机","禁止左转","增加直行车道","仅供行人使用"],answer:[0],explanation:"左转待转区：直行绿灯时左转车辆可驶入待转区等待，待左转绿灯(或安全间隙)时完成左转，减少左转通过时间增加通行能力。"},{id:998,type:"single",category:"交通管理与控制",difficulty:1,question:"右转信号控制(右转红灯)通常在什么情况下设置？",options:["右转与行人过街冲突严重或右转交通量特别大时","所有交叉口","仅大型交叉口","不需要设置"],answer:[0],explanation:"一般交叉口右转允许在安全条件下直接进行(减速让行)。当右转与行人冲突严重或需独立控制时，才设右转专用信号灯。"},{id:999,type:"single",category:"交通管理与控制",difficulty:2,question:"城市交通早晚高峰的形成是由于？",options:["通勤出行(工作/上学)在时间上的高度集中","交通事故","道路施工","天气原因"],answer:[0],explanation:"早晚高峰主要由通勤出行(上班上学/下班放学)在相近时间段内集中出行形成。这是城市交通管理面临的最大挑战。"},{id:1e3,type:"single",category:"交通流理论",difficulty:1,question:"交通量统计中，通常用什么时间单位最为常用？",options:["小时交通量(veh/h)","日交通量","月交通量","年交通量"],answer:[0],explanation:"小时交通量(veh/h)是交通工程中最常用的基本流量单位，可反映短期流量波动，便于通行能力对比分析。日交通量用于规划。"},{id:1001,type:"single",category:"交通流理论",difficulty:2,question:"交通规划中小区划分(Zone System)的原则是？",options:["小区内出行特性相对均质，小区间通过路网连接","按行政区划严格划分","小区面积必须相等","小区人口必须相等"],answer:[0],explanation:"小区划分原则：内部用地性质/出行特性相对均质；小区边界与天然屏障(河流/铁路)或行政界线一致；小区数量适中(便于OD矩阵处理)。"},{id:1002,type:"single",category:"公路交通安全",difficulty:1,question:"公路护栏端头应涂成什么颜色以增强警示效果？",options:["黄色或红白相间条纹","黑色","白色","绿色"],answer:[0],explanation:"护栏端头(迎车面)涂黄黑或红白相间条纹(警示色)，提醒驾驶员注意前方护栏起始点，防止意外碰撞。"},{id:1003,type:"judge",category:"交通管理与控制",difficulty:1,question:"交叉口停止线应设置在人行横道线后方。",options:["正确","错误"],answer:[0],explanation:"正确。停止线设在人行横道后方1-3m处，确保车辆不妨碍行人过街。"},{id:1004,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道内限速标志应设在什么位置？",options:["隧道入口前及隧道内适当位置重复设置","仅隧道入口","仅隧道出口","任意位置"],answer:[0],explanation:"限速标志在隧道入口前设置，隧道内较长时需适当重复设置，提醒驾驶员持续保持安全车速。"},{id:1005,type:"single",category:"公路隧道设计规范",difficulty:1,question:"公路隧道内行车道的标线通常为？",options:["白色实线(禁止变道)","白色虚线","黄色实线","无标线"],answer:[0],explanation:"隧道内为保障安全通常施划白色实线(禁止变换车道)，特长隧道在条件允许时可设虚线允许变道。"},{id:1006,type:"single",category:"公路隧道设计规范",difficulty:2,question:"特长隧道设置车行横通道的作用不包括？",options:["日常车辆掉头","紧急情况车辆转移","消防救援车辆通行","养护车辆通行"],answer:[0],explanation:"车行横通道用于紧急情况(火灾/事故)下车辆转移和救援通行，不用于日常车辆掉头(不安全)。"},{id:1007,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道内发生车辆故障时，驾驶员应将车辆？",options:["尽量移至紧急停车带并开启双闪灯","停在行车道上","立即弃车逃跑","加速驶离"],answer:[0],explanation:"故障车辆应尽量靠边停入紧急停车带(如有)，开启双闪灯，在车后设置警示标志，人员撤离至安全区域并报警。"},{id:1008,type:"single",category:"公路隧道设计规范",difficulty:1,question:"公路隧道入口前设置的禁止变道标志是？",options:["白色实线+禁止变道标志","虚线","无标志","仅文字提示"],answer:[0],explanation:"隧道入口前设禁止变道标志配合白色实线，提醒驾驶员在隧道内(尤其隧道入口及内部)不得随意变换车道。"},{id:1009,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道通风系统风机启动优先级的原则是？",options:["优先启动累计运行时间最短的风机(均衡磨损)","随机启动","总是启动同一台","按编号顺序"],answer:[0],explanation:"风机控制策略：优先启动累计运行时间最短的风机，使各风机运行时间均衡，延长整体使用寿命。"},{id:1010,type:"single",category:"公路隧道设计规范",difficulty:3,question:"隧道设计时纵向临界风速的经验计算公式为？",options:["临界风速∝(g×H×Q/(ρ×Cp×T))^(1/3)","仅与隧道长度相关","仅与交通量相关","无计算公式"],answer:[0],explanation:"临界风速经验公式：Vc∝(gHQ/ρCpT)^(1/3)。其中H为隧道高度，Q为火源热释放率，ρ为空气密度，Cp为比热，T为烟气温度。"},{id:1011,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道照明灯具有效寿命到期前应？",options:["定期检查和批量更换(预防性维护)","等全部坏了再换","每年全部更换","不需要维护"],answer:[0],explanation:"隧道灯具应采用预防性维护策略：定期检测光衰，在寿命末期(通常5-8年)批量更换，避免照明质量逐盏下降。"},{id:1012,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道内禁止行人和非机动车通行，是因为？",options:["隧道内空间狭小、光线暗、空气差，行人和非机动车安全风险极高","节省隧道空间","减少管理成本","隧道属于机动车专用道路"],answer:[0],explanation:"公路隧道(尤其长隧道)内空气污染、照明暗、车辆速度快、无专用人行道，行人和非机动车通行极不安全。"},{id:1013,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道内射流风机气流方向可以反向吗？",options:["可以(双向可逆风机)","不可以","仅火灾时可以","仅养护时可以"],answer:[0],explanation:"可逆式射流风机(双向风机)根据通风需求可正反转改变气流方向，适应不同工况(正常运营/火灾排烟)。"},{id:1014,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道内NO2(二氧化氮)浓度过高的主要危害是？",options:["刺激呼吸道，影响人体健康","腐蚀隧道结构","降低能见度","增加CO浓度"],answer:[0],explanation:"NO2主要危害人体呼吸系统(刺激/损害)，高浓度可致命。隧道内NO2主要来自柴油车尾气。规范将NO2作为控制指标之一。"},{id:1015,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道洞外亮度L20(S)是在距洞口多少距离处测量的？",options:["一个停车视距","10m","100m","洞外任意位置"],answer:[0],explanation:"L20(S)在距洞口一个停车视距距离处，面向洞口方向20度视场角内测量。停车视距根据设计速度确定。"},{id:1016,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道内风机噪声应控制在什么水平？",options:["满足声环境标准(通常≤80-90dB)","无要求","≤50dB","≤120dB"],answer:[0],explanation:"风机噪声(尤其射流风机)是隧道内主要噪声源，需控制在合理水平(距风机10m处通常≤85-90dB(A))，减少对驾驶员的影响。"},{id:1017,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道中央控制室(监控室)一般设置在？",options:["隧道入口附近或管理站内","隧道中间段","隧道出口","任意位置"],answer:[0],explanation:"中央控制室设置在隧道入口附近或管理站内，便于值班人员监控全线运营状态并快速响应事件。"},{id:1018,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道通道门(横通道门)防火等级一般要求？",options:["防火极限不低于1.5~2小时","无防火要求","耐火0.5小时","防火极限无限"],answer:[0],explanation:"横通道门的防火极限通常≥1.5-2小时(甲级防火门)，保证火灾期间通道对面(非事故隧道)不受烟火侵袭。"},{id:1019,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"下雨天高速公路可变限速标志通常将限速降至？",options:["80km/h或更低(根据能见度和路面湿滑程度)","120km/h","不变","200km/h"],answer:[0],explanation:"雨天路面湿滑、能见度降低，可变限速系统根据实时气象条件将限速降至80km/h或更低(如60km/h)，降低水滑和追尾风险。"},{id:1020,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路收费广场前的减速标线作用是？",options:["提醒驾驶员前方有收费站，需提前减速","装饰","引导方向","分隔车道"],answer:[0],explanation:"收费广场前施划横向减速标线(振动标线)，通过视觉和振动提醒驾驶员前方有收费站，需提前减速准备停车缴费或ETC通行。"},{id:1021,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路服务区入口标志通常是什么颜色？",options:["绿底白字(指路标志风格)","红底白字","黄底黑字","蓝底白字"],answer:[0],explanation:"高速公路上的指路和服务信息标志采用绿底白字(高速公路专用指路色)。服务区入口标志属于指路系统。"},{id:1022,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"ETC门架系统设置在什么位置？",options:["高速公路主线或匝道的门架上(通常设置在上方横梁)","路侧地面上","隧道内","服务区内"],answer:[0],explanation:"ETC门架(包含RSU天线、车牌识别、车型识别等设备)架设在主线或匝道上方横梁上，车辆通过时自动完成收费交易。"},{id:1023,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路上跨线桥上的交通标志应注意什么？",options:["不能被桥梁结构遮挡，确保所有车道可见","仅需一个标志","不需要标志","标志尽可能小"],answer:[0],explanation:"跨线桥上安装的门架式或悬臂式标志需保证每条车道的驾驶员都能无遮挡地看到，安装高度和位置需精心设计。"},{id:1024,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"高速公路收费系统设计应满足什么可靠性要求？",options:["车道设备降级运行能力(设备故障时仍可基本收费)","永不停机","无需维护","无故障"],answer:[0],explanation:"收费系统应具备降级运行能力：车道计算机故障时可独立工作≥48h，网络中断时可离线收费并在恢复后上传数据。"},{id:1025,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路标志牌上的出口编号通常表示？",options:['出口所在公里数(如"出口45"表示位于约45km处)',"随机编号","行政区划代码","桥梁编号"],answer:[0],explanation:'出口编号通常与该出口距公路起点(或省界)的里程对应(如"出口45"≈K45)，少数采用行政区划编号系统。'},{id:1026,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"匝道收费广场的渐变段(过渡段)长度应满足？",options:["车辆从设计速度安全减速至收费车道速度的要求","仅视觉要求","任意长度","不需要渐变段"],answer:[0],explanation:"收费广场渐变段长度=减速所需距离，使车辆从匝道设计速度安全平滑地减速到收费车道通行速度(ETC 20-30km/h或停车)。"},{id:1027,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"监控系统视频事件检测(VED)可以自动识别什么？",options:["逆行车辆、行人闯入、停车、拥堵、烟雾等异常事件","车辆品牌","驾驶员面部","车辆颜色"],answer:[0],explanation:"VED(Video Event Detection)通过图像分析自动识别：逆行、行人、停车、拥堵排队、抛洒物、烟雾等异常交通事件并报警。"},{id:1028,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路出口减速车道长度根据什么确定？",options:["主线设计速度和车辆安全减速至匝道速度所需距离","仅出口长度","仅匝道长度","车道宽度"],answer:[0],explanation:"减速车道长度=车辆从主线运行速度安全减速至匝道设计(或限速)速度所需的距离+感知反应距离。"},{id:1029,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"通信系统的网管功能不包括？",options:["进行交通信号配时优化","故障管理","配置管理","性能管理"],answer:[0],explanation:"通信网管系统(NMS)功能：故障管理(告警)、配置管理(设备参数)、性能管理(流量/误码率)、安全管理、计费管理等。交通信号配时属于交通控制系统。"},{id:1030,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"交通工程及沿线设施设计中，管理设施的办公区通常设置在？",options:["高速公路管理中心(含收费、监控、通信、办公)","隧道内","服务区旁","匝道收费站旁"],answer:[0],explanation:"管理中心(综合楼)集中设置办公、收费管理、监控、通信等各系统的管理用房，通常位于交通便利的互通立交附近。"},{id:1031,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路路侧设置的里程牌(公里牌)公里数递增方向是？",options:["沿公路桩号递增方向(通常从起点向终点递增)","从终点向起点","从中间向两端","无规律"],answer:[0],explanation:"公路桩号通常从路线起点向终点递增(东→西或北→南方向)，里程碑上的数字沿此方向递增。"},{id:1032,type:"single",category:"公路交通安全",difficulty:1,question:"桥梁护栏与路基护栏连接处过渡段的最小长度一般不小于？",options:["根据速度差和刚度差计算确定(通常≥12~24m)","1m","100m","无要求"],answer:[0],explanation:"过渡段长度根据两侧护栏的刚度差和设计速度确定，一般≥12~24m，使刚度平缓过渡。"},{id:1033,type:"single",category:"公路交通安全",difficulty:1,question:"路面标线材料中，热熔型标线的主要优点是？",options:["耐磨性好、使用寿命长(1~3年)、反光效果好","成本最低","施工最简单","可随时修改"],answer:[0],explanation:"热熔型标线(热熔涂料+玻璃珠)耐磨、附着力强、反光好，是目前高速公路和城市主干道最常用的标线材料。使用寿命1-3年。"},{id:1034,type:"single",category:"公路交通安全",difficulty:1,question:"交通标志板面的反光膜等级越高，表示？",options:["反光亮度(逆反射系数)越高","价格越低","寿命越短","颜色越深"],answer:[0],explanation:"反光膜等级按逆反射系数(单位:cd/lx/m^2)分级，等级越高反光越强(如钻石级>高强级>工程级)，能满足更远的视认距离和较差天气条件。"},{id:1035,type:"single",category:"公路交通安全",difficulty:2,question:"防眩板在高填方路段的设置应考虑什么额外因素？",options:["强侧风可能导致防眩板振动或损坏，需加固设计","不需要额外考虑","仅考虑美观","仅考虑成本"],answer:[0],explanation:"高填方或跨谷桥梁上侧风较大，防眩板需加强结构(加厚/加密/加支撑)，防止强风导致振动疲劳断裂或防眩功能失效。"},{id:1036,type:"single",category:"公路交通安全",difficulty:1,question:"公路两侧隔离栅高度一般不小于？",options:["1.5~1.8m","0.5m","3m","5m"],answer:[0],explanation:"隔离栅高度一般1.5~1.8m，能有效阻止行人和大多数动物翻越，实现高速公路全封闭管理。"},{id:1037,type:"single",category:"公路交通安全",difficulty:3,question:"波形梁护栏碰撞时能量的主要耗散方式不包括？",options:["车辆自身完全吸收(护栏不变形)","波形梁板弯曲变形","立柱弯曲变形","防阻块变形"],answer:[0],explanation:"护栏碰撞能量通过护栏系统的塑性变形(波形板弯曲/立柱弯曲/防阻块压溃)来耗散。护栏必须变形吸能，完全刚性不变形会将能量全部传递给车辆和乘员。"},{id:1038,type:"single",category:"公路交通安全",difficulty:1,question:"缆索护栏中钢丝绳的防腐措施是？",options:["热浸镀锌(每根钢丝均镀锌后再捻制成绳)","涂油漆","包塑料","不做防腐"],answer:[0],explanation:"缆索护栏用钢丝绳采用先镀锌后捻制的工艺，每根钢丝在捻制前已经过热浸镀锌处理，保证全寿命周期内的耐腐蚀性能。"},{id:1039,type:"single",category:"公路交通安全",difficulty:1,question:"路侧护栏设置时，立柱外侧距边坡坡顶的距离应满足？",options:["立柱外侧土基有足够的承载力(通常≥1.0~2.0m)，防止碰撞时立柱拔出","任意距离","仅需10cm","直接立在坡顶边缘"],answer:[0],explanation:"立柱需埋入稳定土体，距边坡边缘应留有足够距离(≥1-2m)以保证土基的侧向支撑力，否则碰撞时立柱可能被拔出。"},{id:1040,type:"single",category:"公路交通安全",difficulty:2,question:"混凝土护栏的斜面(坡面)设计是为了？",options:["引导碰撞车辆爬升后回正，减少碰撞减速力","增加护栏重量","增加美观度","降低成本"],answer:[0],explanation:"混凝土护栏采用特定的坡面形状(如F型、单坡型)，车辆碰撞时车轮沿斜面爬升，车辆被引导回正，同时避免车辆翻越。"},{id:1041,type:"single",category:"公路交通安全",difficulty:2,question:"防撞垫按吸能原理可分为？",options:["压缩型(可压溃材料)、能量吸收型(液压/摩擦)和混合型","仅压缩型","仅液压型","无分类"],answer:[0],explanation:"防撞垫分类：①压缩型(蜂窝铝/泡沫等可压溃材料) ②能量吸收型(液压阻尼器/钢带弯曲) ③混合型(压缩+吸能)。"},{id:1042,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路设计时为什么需要设置爬坡车道？",options:["为爬坡困难的大型车辆提供额外车道，避免影响其他车辆","增加道路宽度","美观","仅为施工使用"],answer:[0],explanation:"爬坡车道(Climbing Lane)在长大上坡路段为速度明显下降的大型车提供额外车道，使小客车能正常超车通行。"},{id:1043,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路路面横坡(路拱)的一般值为？",options:["1.5%~2.5%","0.1%","5%~10%","10%~20%"],answer:[0],explanation:"路面横坡(路拱)一般1.5%-2.5%(沥青路面)或1.0%-2.0%(水泥路面)，将雨水排向两侧。雨水多或积雪地区取较大值。"},{id:1044,type:"single",category:"公路工程技术标准",difficulty:2,question:"公路纵断面设计中，变坡点处设置竖曲线的目的是？",options:["使纵断面线形平顺过渡，保证视距和行车舒适性","增加坡度","减少坡度","延长路线"],answer:[0],explanation:"竖曲线(凸形/凹形)使两个不同纵坡之间平滑过渡，避免折点处视距中断或产生不舒适的冲击感。"},{id:1045,type:"single",category:"公路工程技术标准",difficulty:2,question:"设计速度40km/h的三级公路，圆曲线最小半径(一般值)约为？",options:["100~200m","50m","500m","1000m"],answer:[0],explanation:"40km/h时圆曲线最小半径一般值约100-200m(取决于超高取值)。极限值为一般值的60%左右，仅在困难条件下使用。"},{id:1046,type:"single",category:"公路工程技术标准",difficulty:2,question:"公路设计速度与运行速度协调性评价的合格标准通常为？",options:["相邻路段的运行速度差ΔV85≤20km/h","ΔV85≤50km/h","ΔV85≤10km/h","无要求"],answer:[0],explanation:"JTG B01-2014要求相邻路段V85差值≤20km/h(良好线形协调性)，ΔV85>20km/h时线形协调性较差需优化设计。"},{id:1047,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路桥涵设计洪水频率，高速公路特大桥采用？",options:["1/300(三百年一遇)","1/100","1/50","1/500"],answer:[0],explanation:"洪水频率：高速特大桥1/300，大中桥1/100；一级公路特大桥1/300，大中桥1/100；二级及以下相应降低。"},{id:1048,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路隧道内纵坡一般不小于？",options:["0.3%(最小排水纵坡)","0%","1%","3%"],answer:[0],explanation:"隧道内最小纵坡0.3%(保证排水，防止积水)。最大纵坡根据设计速度确定(通常≤3-5%)。"},{id:1049,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路设计中的合成坡度最大值一般不超过？",options:["10%~12%(视设计速度和地区)","5%","20%","50%"],answer:[0],explanation:"合成坡度最大值通常限制在10%-12%(积雪严寒地区≤8%)。合成坡度=sqrt(纵坡^2+超高^2)，过高会导致车辆侧滑风险增大。"},{id:1050,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路用地界桩的作用是？",options:["标明公路用地的法定边界","装饰","引导方向","标识里程"],answer:[0],explanation:"用地界桩沿公路用地边界设置，明确标示公路用地的法定权属范围，防止侵占。"},{id:1051,type:"single",category:"交通流理论",difficulty:1,question:"交通量观测中，机械计数法(气压管)的缺点是？",options:["无法区分车辆类型(精度一般)，易损坏","精度最高","成本最高","速度最快"],answer:[0],explanation:"气压管临时检测器虽安装方便，但无法准确区分车型，且易被重型车辆损坏，适合短时临时调查。"},{id:1052,type:"single",category:"交通流理论",difficulty:2,question:"空间平均速度(SMS)的计算公式为？",options:["SMS=路段长度/所有车辆通过该路段所用时间的平均值","速度的算术平均","最高速度","最低速度"],answer:[0],explanation:"SMS=路段长度/(Σti/n)，即用总距离除以车辆的平均行驶时间。它反映的是区间内的平均运行速度。"},{id:1053,type:"single",category:"交通流理论",difficulty:1,question:"阻塞密度Kj的物理意义是？",options:["道路上车辆完全停止(速度为零)时的最大密度","自由流时的密度","流量最大的时密度","排队开始时的密度"],answer:[0],explanation:"阻塞密度Kj(Jam Density)是车辆完全堵塞无法移动(V=0)时的密度，约为100-150veh/km/车道(与车辆长度和安全距离有关)。"},{id:1054,type:"single",category:"交通流理论",difficulty:1,question:"交通调查中，超声波检测器的优点是？",options:["非接触安装(侧向安装在杆上)，不需切割路面","精度最高","可检测车型","成本最低"],answer:[0],explanation:"超声波检测器侧向安装在信号灯杆或龙门架上，安装维护不需要破坏路面，是除视频检测外另一种非接触式检测方式。"},{id:1055,type:"single",category:"交通流理论",difficulty:2,question:"交通规划四阶段法中各阶段输出的正确对应是？",options:["发生→出行量(Oi,Dj)，分布→OD矩阵，方式→分方式OD，分配→路段流量","全部输出OD矩阵","全部输出路段流量","全部输出交通量"],answer:[0],explanation:"四阶段输出：发生→各小区出行产生/吸引量；分布→各OD对间出行量(OD表)；方式→按交通方式划分的OD表；分配→各路段的交通流量。"},{id:1056,type:"single",category:"公路隧道设计规范",difficulty:1,question:"特长隧道内通常设置什么类型的紧急广播系统？",options:["应急广播(声学广播)和可变信息标志结合","仅可变信息标志","仅声学广播","不设广播"],answer:[0],explanation:"特长隧道内设应急广播系统(扬声器)结合可变信息标志，在紧急情况(火灾/事故)时可对隧道内人员进行语音广播引导疏散。"},{id:1057,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路外场监控设备供电通常采用？",options:["就近取电+UPS备用或太阳能供电","仅UPS","仅电池","无供电"],answer:[0],explanation:"外场设备供电：就近取低压电(通过电缆从变电站引来)+UPS备用；偏远无电区域可采用太阳能+蓄电池供电。"},{id:1058,type:"single",category:"公路交通安全",difficulty:1,question:"防眩设施设置间距的选择依据不包括？",options:["路面颜色","道路平纵线形","中央分隔带宽度","防眩板高度和遮光角"],answer:[0],explanation:"防眩板间距(中心距)根据平纵线形、防眩板尺寸和遮光角计算确定(通常50-100cm)。路面颜色不是设计参数。"},{id:1059,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路设计时，一般路段和困难路段可以采用不同的技术指标，但必须满足？",options:["安全和使用功能的基本要求","完全相同","困难路段无要求","仅美观要求"],answer:[0],explanation:"困难路段经论证可采用较低指标(极限值)，但必须满足安全和使用功能基本要求(视距/安全评价等)，且需在设计中特别注明。"},{id:1060,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道内车道指示器绿色箭头表示？",options:["该车道允许通行","该车道禁止通行","限速","方向指示"],answer:[0],explanation:"车道指示器：绿色向下箭头(↓)=该车道允许通行；红色叉号(X)=该车道禁止通行。是隧道行车的基本信号。"},{id:1061,type:"single",category:"公路隧道设计规范",difficulty:1,question:"公路隧道逃生指示标志采用什么颜色背景？",options:["绿色","红色","黄色","白色"],answer:[0],explanation:"逃生指示标志(安全出口、疏散通道方向)采用绿色背景白色图案，符合国际安全色标准(ISO 7010)。"},{id:1062,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道消防管道在寒冷地区需做什么保护？",options:["保温防冻(电伴热或保温层包裹)","不需要保护","仅涂漆","仅包裹塑料"],answer:[0],explanation:"寒冷地区隧道消防水管(消火栓/泡沫)在冬季可能冻结，需设电伴热系统或保温层，保证消防设施随时可用。"},{id:1063,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道照明控制中的深夜模式是为了？",options:["凌晨低交通量时适当降低照明亮度以节能","关闭所有照明","提高照明","仅开启应急照明"],answer:[0],explanation:"深夜(如0:00-6:00)交通量极低时适当降低照明等级(如降至设计值的50%)，在保证安全的前提下节约能源。"},{id:1064,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道入口段加强照明长度一般取？",options:["一个停车视距","隧道全长","两个停车视距","50m"],answer:[0],explanation:"入口段长度=停车视距(设计速度对应的值)，保证驾驶员在进入隧道后眼睛适应暗环境前能看清前方至少一个停车视距的距离。"},{id:1065,type:"single",category:"公路隧道设计规范",difficulty:3,question:"隧道内火灾烟气分层(热烟气在上，冷空气在下)在什么条件下会被破坏？",options:["纵向风速过大(超过临界风速)","烟气温度过低","没有通风","烟气自己会分层"],answer:[0],explanation:"纵向通风风速超过临界风速时烟气分层被破坏，烟气与空气充分混合，下游能见度全面恶化。因此排烟策略需精心控制风速。"},{id:1066,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道内壁装饰通常采用什么材料？",options:["瓷砖或搪瓷钢板(易清洗、反光好)","普通抹灰","木板","壁纸"],answer:[0],explanation:"隧道内壁装饰用瓷砖、搪瓷(珐琅)钢板或涂料，要求耐火、易清洗(汽车尾气污渍)、高反射率(辅助照明)、耐久。"},{id:1067,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道火灾探测器设置间距一般不大于？",options:["根据探测器类型和覆盖范围确定(通常50~100m)","10m","500m","任意间距"],answer:[0],explanation:"火灾探测器(感温光纤/火焰探测器)沿隧道纵向按一定间距设置(如线型感温光纤连续铺设，火焰探测器50-100m间隔)，确保全覆盖。"},{id:1068,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道监控系统交通事件检测的反应时间一般要求？",options:["事件发生后30~60秒内检测到并报警","5分钟内","10分钟内","1小时内"],answer:[0],explanation:"隧道事件检测要求快速响应(30-60秒内报警)，以便监控人员能尽快启动应急预案、控制隧道入口和发布预警信息。"},{id:1069,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路中央分隔带内的通信管道埋深一般不小于？",options:["0.5~0.8m","0.1m","2m","5m"],answer:[0],explanation:"通信管道埋深(管顶至路面或地面)一般0.5-0.8m(车道下≥0.7m，人行道和绿化带≥0.5m)，满足抗压和防冻要求。"},{id:1070,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路上的紧急电话亭通常涂装什么颜色？",options:["橙色或黄色(醒目易识别)","黑色","白色","绿色"],answer:[0],explanation:"紧急电话亭通常为橙色或黄色(国际通用的醒目警示色)，辅以反光标识，确保驾驶员在远处就能看到。"},{id:1071,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"ETC车道与MTC车道之间应设置什么设施？",options:["分隔岛或弹性分隔柱，防止车辆误入或变道穿插","无设施","仅标线","仅标志"],answer:[0],explanation:"ETC和MTC车道间设分隔岛或弹性分隔柱，物理隔离不同类型车道，防止MTC车辆误入ETC车道或ETC车辆在收费广场随意变道。"},{id:1072,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路路肩上的突起路标(反光道钉)间距通常为？",options:["6~15m","1m","100m","无道钉"],answer:[0],explanation:"路肩突起路标(道钉)间距通常6-15m(直线段)，弯道加密至3-6m，与轮廓标配合强化道路线形诱导。"},{id:1073,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"收费系统设计中对ETC交易成功率的要求通常为？",options:["≥99.5%(高可靠性)","≥90%","≥50%","无要求"],answer:[0],explanation:"ETC交易成功率≥99.5%(高可靠性要求)，失败交易需降级处理(转MTC人工收费或引导至指定车道)。设备需定期检测维护。"},{id:1074,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路绿化在交通安全中的作用不包括？",options:["增加车道数量","视线诱导","防眩","美化环境"],answer:[0],explanation:"绿化作用：视线诱导(树木排列引导线形)、防眩(中央分隔带植物)、美化、生态环保。增加车道数是工程扩建而非绿化功能。"},{id:1075,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"高速公路供电系统中，通信和监控系统属于哪类负荷？",options:["一级负荷(需双电源+UPS)","二级负荷","三级负荷","无特殊要求"],answer:[0],explanation:"监控、通信、收费系统为一级负荷：需双路电源(市电+柴油发电机)+UPS，保证任何情况下系统不间断运行。"},{id:1076,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路指路标志上地名的排列顺序原则是？",options:["由近及远排列(最近地名在最上方)","由远及近","字母顺序","随机排列"],answer:[0],explanation:"指路标志上的地名按距离由近及远从上到下(或从左到右)排列，方便驾驶员快速找到目标地名的方向指示。"},{id:1077,type:"single",category:"公路交通安全",difficulty:1,question:"波形梁护栏拼接处搭接方向应？",options:["顺行车方向搭接(上游板在外侧)","逆行车方向搭接","任意方向均可","不需要搭接"],answer:[0],explanation:"护栏板的搭接方向应顺行车方向：上游板块搭接在下游板块外侧，避免碰撞时板端绊阻车辆，保证护栏连续导向功能。"},{id:1078,type:"single",category:"公路交通安全",difficulty:1,question:"防眩板颜色通常选择？",options:["暗色(深绿/深灰/黑色，不反光)","白色","银色","亮黄色"],answer:[0],explanation:"防眩板应为暗色(深绿/深灰/黑色等非反光色)，避免自身反射光线对驾驶员造成眩光或视觉干扰。"},{id:1079,type:"single",category:"公路交通安全",difficulty:1,question:"路面标线施工前，路面应？",options:["清扫干净并保持干燥","不需要处理","仅洒水","仅加热"],answer:[0],explanation:"标线施工前路面必须清扫(无尘土/油污)并干燥，否则标线涂料与路面附着不良易脱落，大大缩短使用寿命。"},{id:1080,type:"single",category:"公路交通安全",difficulty:2,question:"高速公路路侧护栏遇桥墩等障碍物时如何过渡？",options:["护栏通过渐变段向外偏出，避开障碍物或在其前方终止并配防撞垫","直接断开","在障碍物处弯折","移除障碍物"],answer:[0],explanation:"遇障碍物(桥墩/标志基础)：护栏通过渐变段向外偏出绕过障碍物，或在障碍物前终止并配防撞垫保护。不能直接断开(形成缺口)。"},{id:1081,type:"single",category:"公路交通安全",difficulty:2,question:"波形梁护栏的镀锌层厚度要求一般不小于？",options:["≥80μm(通常-85μm)","≥10μm","≥200μm","无要求"],answer:[0],explanation:"护栏钢构件热浸镀锌层厚度≥80-85μm(重防腐环境可要求更多)，保证在户外环境中15-20年不生锈。"},{id:1082,type:"single",category:"公路交通安全",difficulty:1,question:"隧道内人行横通道入口处的指示标志应？",options:["发光或高反光，确保在烟雾条件下仍可辨识","普通反光","无特殊要求","仅文字标志"],answer:[0],explanation:"隧道横通道入口指示必须发光(内部照明)或超高等级反光，确保火灾烟雾条件下疏散人员仍能看到并找到逃生通道。"},{id:1083,type:"single",category:"公路交通安全",difficulty:1,question:"高速公路两侧隔离栅的立柱间距一般为？",options:["2~4m","10m","0.5m","20m"],answer:[0],explanation:"隔离栅(刺铁丝网或焊接网)立柱间距通常2-4m，保证网片张紧不下垂，有效阻挡攀爬和钻越。"},{id:1084,type:"single",category:"公路交通安全",difficulty:3,question:"护栏碰撞试验中车辆质量、碰撞速度和碰撞角度的选取依据是？",options:["根据护栏防护等级对应的设计碰撞条件","任意选取","仅根据设计速度","仅根据车辆重量"],answer:[0],explanation:"各等级护栏规定碰撞条件：如SA级用18t客车(或货车)以80km/h和20度角碰撞。不同等级对应不同车辆质量和速度组合。"},{id:1085,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路建设项目的两阶段设计是指？",options:["初步设计和施工图设计","概念设计和详细设计","方案设计和初步设计","施工设计和运营设计"],answer:[0],explanation:"公路项目通常两阶段设计：初步设计(确定技术方案和规模)+施工图设计(详细到可施工)。重大项目可增加可行性研究阶段或技术设计阶段。"},{id:1086,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路限界(净空)中，高速公路行车道上方净高不小于？",options:["5.0m","3.5m","4.0m","6.0m"],answer:[0],explanation:"高速公路和一二级公路行车道上方最小净高5.0m，三四级公路4.5m。城市道路通常≥4.5-5.0m。"},{id:1087,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路路基回弹模量E0反映的是？",options:["路基土抵抗变形的综合力学指标","路基宽度","路基高度","路基密度"],answer:[0],explanation:"路基回弹模量E0(MPa)是表征路基土承载能力的综合力学指标，用于路面结构设计。E0越高路基承载力越强，所需路面结构层越薄。"},{id:1088,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路交通安全设施设计使用年限一般取？",options:["15~20年(钢结构主体)","1年","50年","5年"],answer:[0],explanation:"交通安全设施(钢护栏、标志结构等)设计使用年限一般15-20年，与主体结构设计年限协调。反光膜和标线需定期更换(3-10年)。"},{id:1089,type:"single",category:"公路工程技术标准",difficulty:2,question:"公路设计中的平均纵坡概念用于？",options:["评价长路段爬坡/下坡对行车的影响程度","计算最高速度","确定车道数","选择路面类型"],answer:[0],explanation:"平均纵坡=高程差/水平距离(如连续5km上坡平均坡度3%)。长大连续下坡是货车制动失效事故的重要因素，需特别验算。"},{id:1090,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路项目开工前必须完成什么工作？",options:["施工图设计审批和施工许可","仅初步设计","仅可行性研究","仅方案设计"],answer:[0],explanation:"开工前必须完成施工图审批(交通主管部门)、施工许可(建设主管部门)、招投标、征地拆迁等法定程序。"},{id:1091,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路路面等级按面层类型可分为？",options:["高级路面(沥青混凝土/水泥混凝土)、次高级、中级、低级","仅高级和低级","仅沥青和水泥","无分级"],answer:[0],explanation:"路面等级：高级(沥青混凝土/水泥混凝土)、次高级(沥青表处/贯入式)、中级(碎石/级配砾石)、低级(粒料加固土)。"},{id:1092,type:"single",category:"交通流理论",difficulty:1,question:"交通调查中，雷达测速仪(手持雷达枪)利用什么原理？",options:["多普勒效应(反射波频率随车速变化)","激光反射","声波反射","红外感应"],answer:[0],explanation:"雷达测速利用多普勒效应：发射的电磁波遇到运动车辆反射后频率发生变化(频移)，频移量与车速成正比。"},{id:1093,type:"single",category:"交通流理论",difficulty:2,question:"交通工程中，延误(Delay)的定义是？",options:["车辆由于交通流干扰或控制设施而损失的时间","行程时间","等待时间","红灯时间"],answer:[0],explanation:"延误=实际行程时间-自由流行程时间。分为控制延误(信号/标志造成)和运行延误(交通流间相互干扰)。"},{id:1094,type:"single",category:"交通流理论",difficulty:1,question:"路段平均速度区间(pace speed)通常定义为？",options:["在速度频率分布中10km/h速度区间内包含车辆最多的那个区间","所有速度的平均值","85%位车速","50%位车速"],answer:[0],explanation:"Pace Speed是包含最多车辆数的10km/h宽度速度区间(如80-90km/h)，反映了道路上大多数车辆的速度集中范围，常用于限速制定。"},{id:1095,type:"single",category:"交通流理论",difficulty:1,question:"交通量分布的方向系数D在早晚高峰时段通常？",options:["D值较高(如0.6-0.7)，方向分布不均衡","D=0.5(完全均衡)","D=0","D=1"],answer:[0],explanation:"早高峰入城方向和晚高峰出城方向的交通量明显大于反方向，D值可达0.6-0.7或更高。非高峰时段D接近0.5。"},{id:1096,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道内发生车辆火灾时，正确的逃生方法是？",options:["通过人行横通道进入相邻非事故隧道","向隧道深处逃跑","留在车内等待","返回隧道入口"],answer:[0],explanation:"隧道火灾逃生：按疏散指示通过最近的人行横通道进入相邻安全隧道，不要返回或深入隧道(烟气沿纵向扩散)。"},{id:1097,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道入口前设置的红绿灯与隧道内车道指示器的关系是？",options:["隧道入口红绿灯控制车辆能否进入隧道，车道指示器控制隧道内各车道通行状态","两者功能相同","没有关系","互为备份"],answer:[0],explanation:"入口信号灯控制车辆准入(隧道火灾/事故时关闭入口)；车道指示器控制隧道内各车道通行状态(红叉/绿箭)。两者各有分工。"},{id:1098,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路收费员在岗期间需用到的终端设备不包括？",options:["道路施工工具","车道计算机终端","IC卡读写器","收费显示器"],answer:[0],explanation:"收费员终端设备包括：计算机终端、IC卡读写器、费额显示器、票据打印机等。道路施工工具不属于收费系统设备。"},{id:1099,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"高速公路通信管道过桥时需设置伸缩补偿装置，原因是？",options:["桥梁因温度变化伸缩变形，管道需适应此变形","美观","节约成本","桥梁不长不需要"],answer:[0],explanation:"桥梁在温度作用下产生伸缩变形(伸缩缝)，通信管道需设置伸缩补偿器(如软管/补偿接头)以适应变形，防止管道拉裂。"},{id:1100,type:"single",category:"公路交通安全",difficulty:1,question:"波形梁护栏立柱在碰撞中的主要受力方式是？",options:["弯曲变形(悬臂梁)吸收能量","纯受拉","纯受压","纯受扭"],answer:[0],explanation:"立柱在碰撞中主要受弯：车辆撞击横梁→力传递到立柱→立柱在土基以上部分弯曲变形(形成塑性铰)，吸收碰撞能量。"},{id:1101,type:"single",category:"公路交通安全",difficulty:1,question:"隔离栅立柱基础通常采用？",options:["混凝土浇筑或直接打入土中(根据土质)","仅混凝土","仅钉入式","无基础"],answer:[0],explanation:"隔离栅立柱基础：软土地区用混凝土基础(预埋或现浇)；坚实土可用打入式(直接打入土中)。保证立柱稳定不倾倒。"},{id:1102,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路设计中采用极限最小半径代替一般最小半径的前提是？",options:["受地形地物限制困难路段，经技术经济论证","任何路段都可以","仅高速公路","仅三四级公路"],answer:[0],explanation:"极限最小半径仅在受地形地物严格限制的困难路段，经技术经济论证后方可采用。一般情况下推荐使用一般最小半径或更大值。"},{id:1103,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路交安设施中隔离栅的设置应在？",options:["公路用地边界处(实现全封闭)","路面边缘","中央分隔带","行车道中间"],answer:[0],explanation:"隔离栅沿公路用地边界设置，圈定公路用地范围，实现全封闭管理，阻止外部人员和动物进入。"},{id:1104,type:"single",category:"交通流理论",difficulty:1,question:"交通工程中常用车辆分类按轴距和结构分为？",options:["小客车、中型车、大型车(客车/货车)","仅客车和货车","仅机动车和非机动车","仅两轮车和四轮车"],answer:[0],explanation:"交通工程常用车辆分类：小客车(<5.5m)、中型车(5.5-8m)、大型客车(>8m)、大型货车(>8m或轴数多)。与计费和设计车辆分类不同。"},{id:1105,type:"single",category:"交通管理与控制",difficulty:2,question:"城市道路交通组织中的微循环概念是指？",options:["利用次干道和支路网络分担主干道交通压力","仅主干道循环","仅高速公路循环","交通信号循环变化"],answer:[0],explanation:"交通微循环：利用次干道、支路、街巷等毛细血管式路网分流主干道交通量，提高路网整体通行能力和容错性。"},{id:1106,type:"single",category:"交通管理与控制",difficulty:1,question:"交叉口进口道标志标线中，导向箭头重复设置间距一般为？",options:["30~50m(重复提示)","仅入口处1次","100m","500m"],answer:[0],explanation:"导向箭头在进口道重复设置(通常30~50m间隔，至少2-3次)，确保驾驶员有足够机会看到并提前选择正确车道。"},{id:1107,type:"single",category:"交通流理论",difficulty:1,question:"美国道路通行能力手册(HCM)中，LOS分级(服务水平)采用的字母表示为？",options:["A(最佳)到F(最差)","1(最佳)到6(最差)","I到VI","优到差"],answer:[0],explanation:"HCM(美国)用A-F字母分级(A=自由流最优，F=强制流最差)。中国JTG B01-2014用一至六级(数字分级)。两者都是六级，方向不同。"},{id:1108,type:"single",category:"交通管理与控制",difficulty:1,question:"我国城市道路交通信号灯设置依据的主要国家标准是？",options:["GB 14886《道路交通信号灯设置与安装规范》","JTG B01","GB 5768","JTG D80"],answer:[0],explanation:"GB 14886-2016规定信号灯的设置条件、安装要求和显示方式。GB 5768规定标志标线。JTG系列为公路工程行业标准。"},{id:1109,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道通风CO浓度三级报警阈值通常设置为？",options:["一级100ppm(启动风机)，二级150ppm，三级250ppm(关闭隧道)","10ppm","1000ppm","1ppm"],answer:[0],explanation:"CO三级报警：一级(如100ppm)预警启动部分风机；二级(如150ppm)加开风机；三级(如250ppm)关闭隧道。具体值根据隧道长度和设计标准有所差异。"},{id:1110,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"高速公路服务区污水处理设施应满足什么要求？",options:["处理后水质达到国家排放标准方可排放","无需处理直接排放","仅简单沉淀","自然下渗"],answer:[0],explanation:"服务区远离城市管网需自建污水处理设施(如MBR一体化设备)，出水需满足《污水综合排放标准》后方可排放或回用。"},{id:1111,type:"single",category:"公路交通安全",difficulty:1,question:"公路客运车辆应配备的安全设施不包括？",options:["ETC电子标签","灭火器","安全锤","安全带"],answer:[0],explanation:"客运车辆安全设施：灭火器、安全锤(破窗)、安全带、三角警告牌、车门应急开关等。ETC是收费设施，非安全设施。"},{id:1112,type:"single",category:"公路工程技术标准",difficulty:2,question:"公路平面线形组合设计中的基本型是指？",options:["直线→缓和曲线→圆曲线→缓和曲线→直线","仅圆曲线","仅直线","直线→圆曲线→直线(无缓和曲线)"],answer:[0],explanation:"基本型=直线+缓和曲线+圆曲线+缓和曲线+直线，是最标准的平曲线组合。特殊条件下可采用S型、卵型、凸型等变体。"},{id:1113,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路选线中，越岭线(翻山线路)的选线关键是？",options:["选择合理的垭口(最低山口)和展线方案","避开所有山","沿山谷走","高处通过"],answer:[0],explanation:"越岭线选线关键：①选合适垭口(高程最低/地质条件好的山口) ②合理展线(利用山坡地形延长路线降低平均纵坡)满足最大纵坡要求。"},{id:1114,type:"single",category:"交通流理论",difficulty:3,question:"交通仿真模型标定(Calibration)的目的是？",options:["调整模型参数使仿真输出与实际观测数据一致","仅运行模型","仅收集数据","仅展示结果"],answer:[0],explanation:"标定通过调整跟驰/换道模型参数(如反应时间、期望速度等)使仿真结果(流量/速度/排队长度)与实测值吻合，是仿真可靠性的基础。"},{id:1115,type:"single",category:"交通管理与控制",difficulty:2,question:"绿波控制中带速(progression speed)与限速的关系是？",options:["带速应≤限速(并在驾驶员舒适速度范围内)","带速可以远超限速","带速与限速无关","带速必须等于限速"],answer:[0],explanation:"绿波带设计带速应≤路段限速(且为驾驶员普遍接受的舒适速度，通常取限速的80-100%)，鼓励按带速行驶的驾驶员享受不停车通过。"},{id:1116,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路入口加速车道长度取决于？",options:["车辆从匝道速度安全加速至主线运行速度所需的距离","仅入口长度","仅匝道长度","仅交通量"],answer:[0],explanation:"加速车道长度=车辆从匝道设计速度加速到主线运行速度(或能安全合流的速度)所需的距离+感知反应距离。"},{id:1117,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路上指示服务区距离的标志设置在？",options:["服务区前方2km、1km、500m处逐级预告","仅服务区入口","不需要预告","仅在服务区出口"],answer:[0],explanation:"服务区预告采用三级预告(2km/1km/500m)，与出口预告类似，帮助驾驶员提前规划是否进入服务区休息。"},{id:1118,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"监控系统外场设备中，气象检测器的安装位置应选择？",options:["能代表该路段典型气象条件的开阔位置","隧道内","桥下","任何位置"],answer:[0],explanation:"气象检测器应设在能代表该路段气象特征的开阔位置(避开局部遮挡)，准确反映雾、雨、雪、风等对交通有影响的气象条件。"},{id:1119,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路服务区停车场的路面结构应满足什么要求？",options:["承受大型货车荷载，通常采用水泥混凝土路面","仅普通沥青路面","砂石路面","无特殊要求"],answer:[0],explanation:"服务区停车场(尤其货车区)承受重车频繁低速转弯和停车，通常采用水泥混凝土路面或高强度沥青路面，抗车辙和变形。"},{id:1120,type:"single",category:"公路隧道设计规范",difficulty:1,question:"公路隧道内限高标志的设置是因为？",options:["隧道建筑限界有限(受衬砌内轮廓限制)，超高车辆需提前警告","仅为装饰","仅为了控制车速","没有实际用途"],answer:[0],explanation:"隧道内轮廓(衬砌内表面)决定了净高限值。入口前必须设置限高标志和限高架，防止超高车辆撞击隧道结构。"},{id:1121,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道监控中心的视频监视墙通常显示？",options:["隧道内所有摄像机的实时画面及关键区域重点监视","仅一幅画面","仅地图","仅数据"],answer:[0],explanation:"CCTV监视墙多画面显示：重要区域(出入口/紧急停车带)常驻显示+轮巡其他画面。事件发生时自动弹出相关画面。"},{id:1122,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道消防栓的出水压力和流量应符合什么标准？",options:["满足消防灭火需求(通常栓口压力≥0.3MPa，流量≥10L/s)","无标准要求","仅需出水即可","仅凭经验"],answer:[0],explanation:"隧道消火栓系统按消防规范设计：最不利点消火栓栓口压力≥0.3MPa，单个消火栓出流量≥10L/s，保证有效灭火。"},{id:1123,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道内信号覆盖(广播和手机信号)在紧急情况下的作用是？",options:["向隧道内人员发布疏散指令和信息","仅用于娱乐","仅用于通话","不需要信号覆盖"],answer:[0],explanation:"隧道内广播系统和手机信号覆盖(泄漏电缆/天线)在紧急情况下是关键的应急通信手段：发布疏散指令、引导人员撤离。"},{id:1124,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道内路面标线相比洞外标线有什么特殊要求？",options:["更高的反光性能和耐污性(尾气污染降低反光效果)","完全一样","反光性能可以更低","不需要标线"],answer:[0],explanation:"隧道内标线需更高等级反光(尾气/粉尘/潮湿降低反光)、突起路标辅助、耐水和耐污染性能更好。"},{id:1125,type:"single",category:"公路交通安全",difficulty:1,question:"公路护栏立柱防腐处理通常在什么环节进行？",options:["工厂预制阶段(热浸镀锌后出厂)","施工现场涂漆","不需要防腐","安装完成后处理"],answer:[0],explanation:"护栏钢构件(立柱/波形板/防阻块等)在工厂完成热浸镀锌后出厂，现场仅进行组装。现场焊接部分需补涂防腐涂料。"},{id:1126,type:"single",category:"公路交通安全",difficulty:1,question:"波形梁护栏板在运输和安装过程中应注意？",options:["防止镀锌层划伤或碰撞损坏","可以随意堆放","不需要注意","仅注意长度"],answer:[0],explanation:"护栏板在运输和安装中应避免摩擦划伤镀锌层(一旦破损会从破损处开始锈蚀)。使用尼龙吊带、妥善堆放垫护。"},{id:1127,type:"single",category:"公路交通安全",difficulty:2,question:"大跨径缆索承重桥梁(悬索桥/斜拉桥)护栏等级建议为HA级，主要原因是？",options:["此类桥梁重要性极高且逃生救援困难，需最高级别防护","桥梁跨度大","桥梁美观","桥梁造价高"],answer:[0],explanation:"特大缆索承重桥梁(悬索桥/斜拉桥)一旦发生车辆冲出事故，后果极其严重(坠江/坠谷)，且救援极为困难。HA级(最高)防护是行业共识。"},{id:1128,type:"single",category:"公路交通安全",difficulty:1,question:"轮廓标(反光片)的安装角度应？",options:["反射面垂直于车灯光线入射方向(以获得最大反光效果)","平行于路面","朝向天空","任意方向"],answer:[0],explanation:"轮廓标反射面应基本垂直于车灯光线入射方向(微调倾角)，最大限度地将光线反射回驾驶员眼睛，提高夜间诱导效果。"},{id:1129,type:"single",category:"公路交通安全",difficulty:3,question:"路侧净区宽度的取值通常依据什么？",options:["设计速度、交通量、填挖方边坡坡度等综合确定","仅设计速度","仅边坡坡度","固定值"],answer:[0],explanation:"路侧净区宽度无统一固定值，根据设计速度(速度越高净区越宽)、边坡坡度(越陡净区越宽)、交通量等因素综合确定。美国AASHTO有详细指南。"},{id:1130,type:"single",category:"公路工程技术标准",difficulty:2,question:"公路设计中，控制点(Control Point)是指？",options:["必须经过或必须避开的特定地点(城镇/桥梁/保护区等)","路面最高点","桥梁中心","隧道中点"],answer:[0],explanation:"控制点是公路选线的约束节点：必经控制点(拟连接的城镇/交通枢纽)和避让控制点(自然保护区/基本农田/不良地质区)。选线需在控制点之间寻找最优路径。"},{id:1131,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路路面结构的基层主要功能是？",options:["承受面层传来的车辆荷载并分散传递给路基","直接承受车轮磨耗","排水","装饰"],answer:[0],explanation:"基层是路面结构的主要承重层：将面层传来的车轮荷载分散后传递给路基。基层质量直接影响路面整体承载能力和使用寿命。"},{id:1132,type:"single",category:"公路工程技术标准",difficulty:2,question:"公路建设中对占用耕地的补偿原则是？",options:["占一补一(占多少耕地补多少同等质量的耕地)","不需要补偿","仅经济补偿","仅异地补偿"],answer:[0],explanation:"国家严格保护耕地：公路建设占用耕地须占一补一(占补平衡)，补充同等数量和质量的耕地。占用基本农田需国务院审批。"},{id:1133,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路桥梁伸缩缝的作用是？",options:["适应桥梁因温度变化和荷载作用产生的纵向伸缩变形","增加承载能力","连接桥梁和路基","美观"],answer:[0],explanation:"伸缩缝释放桥梁结构温度应力和收缩徐变，使桥梁能自由伸缩而不产生附加应力或破坏。伸缩缝是桥梁的重要功能构件。"},{id:1134,type:"single",category:"交通流理论",difficulty:1,question:"交通调查中，区间车速调查(牌照法)的基本方法是？",options:["记录车辆通过起点和终点的时刻(识别牌照匹配)，计算行程时间和速度","雷达测速","问卷调查","GPS跟踪"],answer:[0],explanation:"牌照法：在路段起终点记录每辆车的牌照和通过时刻，匹配后计算行程时间÷路段长度=区间速度。适用于OD调查配合使用。"},{id:1135,type:"single",category:"交通管理与控制",difficulty:1,question:"城市道路交叉口视距三角形(Sight Triangle)是指？",options:["交叉口转角处为保证驾驶员能看见相交道路来车而不得有障碍物的三角区域","交叉口的中心区域","人行横道区域","停止线区域"],answer:[0],explanation:"视距三角形是交叉口转角处保证通视(无建筑物/植物/停车遮挡)的最小三角形区域，确保驾驶员能及时看到相交道路的来车或行人。"},{id:1136,type:"single",category:"交通管理与控制",difficulty:1,question:"公交车专用道的标志通常是什么颜色？",options:["蓝色(指示标志)","红色","黄色","绿色"],answer:[0],explanation:"公交专用道标志为蓝色圆形(指示标志)或蓝底白字矩形标志。路面标线通常为黄色虚线或实线并标注公交专用字样。"},{id:1137,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路监控系统中车辆检测器的安装位置不包括？",options:["收费亭内","主线路面","匝道路面","隧道内"],answer:[0],explanation:"车辆检测器安装在路面或路侧(主线/匝道/隧道)，用于检测车辆通过。收费亭内不需要车辆检测器(收费员肉眼可见)。"},{id:1138,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道内紧急电话应设置在哪一侧？",options:["行车方向右侧(紧急停车带一侧)","左侧","两侧都必须","任意侧"],answer:[0],explanation:"紧急电话通常设在行车方向右侧(紧急停车带侧)，便于故障车辆驾驶员使用。间距不宜大于200m。"},{id:1139,type:"single",category:"公路交通安全",difficulty:1,question:"防眩板在直线路段的设置间距(中心距)通常为？",options:["50~100cm","5cm","5m","10m"],answer:[0],explanation:"防眩板直线段间距通常50-100cm(根据高度和遮光角计算)，弯道加密。间距过大出现漏光，过密不经济且压抑。"},{id:1140,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路建设项目的环境影响评价应在什么阶段完成？",options:["项目开工前(可行性研究或设计阶段)","施工完成后","运营期间","不需要环评"],answer:[0],explanation:"环境影响评价(EIA)是公路建设项目的前置条件，须在项目审批/核准前完成环评审批。未经环评审批不得开工建设。"},{id:1141,type:"single",category:"交通流理论",difficulty:1,question:"交通工程中，年平均日交通量(AADT)的单位是？",options:["veh/d(辆/天)","veh/h","veh/min","veh/s"],answer:[0],explanation:"AADT单位veh/d(辆/天)，表示一年中平均每天通过某断面的车辆数。设计小时交通量DHV单位veh/h。"},{id:1142,type:"single",category:"交通管理与控制",difficulty:2,question:"右转渠化岛的作用是？",options:["引导右转车辆沿规定轨迹行驶，减少与其他方向车流的冲突","增加车道数","提供停车位","仅美化"],answer:[0],explanation:"右转渠化岛(三角形/泪滴形交通岛)引导右转车辆沿专用轨迹行驶(减速让行或自由右转)，减少右转车与直行/行人的冲突面积。"},{id:1143,type:"single",category:"公路交通安全",difficulty:1,question:"高速公路急弯路段前通常设置的线形诱导标志颜色是？",options:["黄底黑图案(警告标志)","红底白字","蓝底白图案","绿底白字"],answer:[0],explanation:"线形诱导标(弯道诱导标)为黄底黑图案的警告标志(或独立的黄黑条纹诱导设施)，提醒驾驶员前方道路弯道方向和曲率。"},{id:1144,type:"single",category:"公路工程技术标准",difficulty:2,question:"四级公路路基宽度双车道路段一般取？",options:["6.5m","3.5m","12m","24m"],answer:[0],explanation:"四级公路双车道路基宽一般6.5m(行车道2×3.25+土路肩)，单车道路基宽4.5m。是各等级中宽度最小的。"},{id:1145,type:"single",category:"交通管理与控制",difficulty:2,question:"城市道路交通拥堵治理中，采用单双号限行的缺点是？",options:["抑制居民出行需求，且长期效果递减(购多辆车规避)","没有缺点","提高通行速度","减少事故"],answer:[0],explanation:"限行短期可缓解拥堵，但长期居民可能通过购多辆车规避限行，实际效果递减。同时抑制合理出行需求，社会成本高。"},{id:1146,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路标志板抗风设计主要考虑的因素是？",options:["标志板面积、当地风速(30年一遇)和支撑结构形式","仅标志颜色","仅标志内容","仅标志位置"],answer:[0],explanation:"标志结构抗风设计：风荷载=风压×标志面积×体型系数。风速取30年一遇10min平均最大风速。大型门架式标志需特别加强基础。"},{id:1147,type:"single",category:"公路隧道设计规范",difficulty:1,question:"特长隧道内设置的车行横通道数量取决于？",options:["隧道长度(按规范间距要求：750~1000m一处)","仅交通量","仅设计速度","随机确定"],answer:[0],explanation:"车行横通道间距一般750~1000m，隧道越长需要越多。如5km隧道约需5-7处车行横通道。"},{id:1148,type:"single",category:"公路交通安全",difficulty:2,question:"波形梁护栏板壁厚一般取？",options:["2.5~4.0mm(根据防护等级)","0.5mm","10mm","20mm"],answer:[0],explanation:"波形梁板壁厚通常2.5-4.0mm(常见3mm)，防护等级越高板厚越大或采用三波板(双波板→三波板升级)。"},{id:1149,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路里程碑(公里牌)一般为石碑或？",options:["铝合金板或钢筋混凝土预制","仅石制","仅木制","可无碑"],answer:[0],explanation:"里程碑常用：石质碑(传统)、铝合金板(现代高速常用，附着在护栏上)、钢筋混凝土预制桩等。要求耐久、醒目。"},{id:1150,type:"single",category:"交通管理与控制",difficulty:2,question:"城市交通控制系统按控制策略可分为？",options:["定时控制、感应控制、自适应控制","仅定时控制","仅感应控制","仅自适应控制"],answer:[0],explanation:"三种基本控制策略：定时(固定周期)、感应(检测触发)、自适应(实时优化调整周期和绿信比)。三者在实际中常配合使用。"},{id:1151,type:"single",category:"交通流理论",difficulty:1,question:"交通量观测站按观测目的分为？",options:["连续观测站(永久)和临时观测站(短期)","仅连续站","仅临时站","不分类型"],answer:[0],explanation:"连续(永久)观测站全年365天不间断记录(提供AADT/K/D等参数)；临时(短期)观测站为特定项目(设计/研究)进行有限时段观测。"},{id:1152,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道内发生交通拥堵时监控系统的应对措施包括？",options:["在隧道入口设置限流或关闭信号防止拥堵加剧","不做任何处理","仅录像","仅报警"],answer:[0],explanation:"隧道内拥堵时：入口控制信号限制进入车辆(限流或关闭)，可变信息标志提示后方车辆减速或绕行，防止隧道内车辆越积越多。"},{id:1153,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路收费站前的水泥路面与沥青路面衔接处应？",options:["设置过渡段(刚性路面过渡到柔性路面)","直接连接","无特殊要求","断开"],answer:[0],explanation:"水泥混凝土路面(收费站)与沥青路面(主线)之间需设过渡段(通常为水泥-沥青过渡板或特殊处理)，防止两种不同刚度路面衔接处出现台阶或裂缝。"},{id:1154,type:"single",category:"公路交通安全",difficulty:1,question:"护栏板的拼接螺栓孔通常为？",options:["长圆形(腰形孔，允许温度伸缩)","圆形","方形","三角形"],answer:[0],explanation:"波形梁板上的拼接螺栓孔为长圆形(腰形孔)，允许护栏板在温度变化时沿纵向自由伸缩，防止温差应力导致护栏板拱起或拉裂。"},{id:1155,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路景观设计的原则不包括？",options:["一味追求豪华和复杂造型","与周围自然和人文环境协调","保证行车安全不分散注意力","突出地域特色"],answer:[0],explanation:"公路景观设计原则：协调环境、安全第一(不过度吸引注意)、突出地域特色。豪华复杂不是原则(与节约和环保理念相悖)。"},{id:1156,type:"single",category:"交通管理与控制",difficulty:2,question:"交叉口信号周期过长的缺点是？",options:["车辆和行人等待时间过长，违章行为可能增加","通行能力提高","更安全","更节能"],answer:[0],explanation:"周期过长：红灯等待时间过长可能引发驾驶员和行人烦躁/闯红灯行为，延误大幅增加。最优周期应在安全和效率间寻求平衡。"},{id:1157,type:"single",category:"交通流理论",difficulty:1,question:"交通量年增长率通常用于？",options:["预测未来交通量(以现状为基础按年增长率推算)","计算日交通量","计算小时交通量","不需要预测"],answer:[0],explanation:"年增长率法是最简单的交通量预测方法：未来年交通量=基年交通量×(1+r)^n。r通常取3%~8%(视经济发展阶段)。"},{id:1158,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道内LED照明相比传统照明的节能效果可达？",options:["40%~60%","5%","0%","90%"],answer:[0],explanation:"LED隧道灯较传统高压钠灯可节能40%-60%，加上智能调光控制(深夜降亮度)，综合节能效果可达60%-70%。"},{id:1159,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"ETC车道前方设置减速带的目的是？",options:["强制车辆减速至ETC安全通行速度(20~30km/h)","提高通行速度","装饰","不需要"],answer:[0],explanation:"ETC车道前设减速带(振动标线或减速丘)提醒并强制驾驶员减速至安全通行速度，防止超速通过导致交易失败或碰撞栏杆。"},{id:1160,type:"single",category:"公路交通安全",difficulty:1,question:"护栏端头反光膜的设置是为了？",options:["夜间警示驾驶员护栏起始位置，避免意外碰撞","装饰","增加护栏强度","防水"],answer:[0],explanation:"护栏起始端头(迎车方向)贴高反光膜(黄黑或红白条纹)，夜间反射车灯光线，明确显示护栏起点位置。"},{id:1161,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路路面排水坡度不足的后果是？",options:["路面积水，可能导致水漂(水滑)和水损坏","路面更干净","排水更快","不影响行车"],answer:[0],explanation:"排水坡度不足→路面积水→高速行驶时轮胎与路面间形成水膜(水漂/水滑Hydroplaning)→车辆失控。同时积水加速路面水损坏。"},{id:1162,type:"single",category:"交通管理与控制",difficulty:1,question:"交叉口左转导流线(虚线弧形)的作用是？",options:["引导左转车辆按正确的弧形轨迹行驶，不侵占对向车道","禁止左转","增加左转速度","仅供大型车"],answer:[0],explanation:"左转导流线(弧形虚线)在交叉口内标示左转车辆的推荐行驶轨迹，帮助驾驶员按正确曲线完成左转，避免转小弯或大弯。"},{id:1163,type:"single",category:"交通流理论",difficulty:1,question:"交通量的日变系数(Day Variation Factor)是指？",options:["某日日交通量与周平均日交通量之比","月与年之比","小时与日之比","年与年之比"],answer:[0],explanation:"日变系数=某日日交通量/周平均日交通量(或年平均日交通量)，反映一周内各日交通量的变化模式(如周日可能比平日高)。"},{id:1164,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道排烟风机在高温下运行的持续时间要求一般不少于？",options:["1~2小时","10分钟","30分钟","5小时"],answer:[0],explanation:"排烟风机耐火要求：250-400°C下持续运行≥1-2小时(保证火灾期间人员和救援安全)。超过此时限后结构安全需另行评估。"},{id:1165,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"高速公路通信管道在人孔(手孔)处的弯曲半径应满足？",options:["不小于光电缆允许的最小弯曲半径(通常≥光缆外径的20倍)","任意弯曲","越小越好","无要求"],answer:[0],explanation:"通信管道在人孔/手孔处的弯曲半径需≥光电缆最小弯曲半径(如光缆≥20D，D为光缆外径)，过度弯曲会增大光纤损耗甚至断纤。"},{id:1166,type:"single",category:"公路交通安全",difficulty:1,question:"交通标志基础混凝土强度等级一般不小于？",options:["C20或C25","C5","C50","无要求"],answer:[0],explanation:"标志基础混凝土强度等级一般≥C20(C25用于重要标志)，满足结构承载力和耐久性要求。"},{id:1167,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路桥涵的抗震设防类别根据什么划分？",options:["公路等级和在路网中的重要性(如干线/集散等)","仅桥长","仅桥梁类型","不需要分类"],answer:[0],explanation:"桥梁抗震设防分类按公路功能等级(A类干线/B类集散/C类支线等)和桥梁重要性确定，对应不同的抗震设防标准和构造措施。"},{id:1168,type:"single",category:"交通管理与控制",difficulty:1,question:"学校区域交通宁静化措施不包括？",options:["提高限速值","减速丘","抬高人行横道","警示标志"],answer:[0],explanation:"学校区域应采取降低车速措施(减速丘、抬高人行道、降低限速等)。提高限速值与安全目标相悖。"},{id:1169,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道内禁止停车(紧急情况除外)的原因是？",options:["停车极易引发后车追尾(隧道内视线差、反应时间短)","仅为了美观","为了通行量","无特殊原因"],answer:[0],explanation:"隧道内光线暗、空间狭小、车速快，无故停车极易被后车追尾。紧急停车带是唯一允许停靠的区域(且须开双闪、设警示)。"},{id:1170,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"通信光缆接续盒(接头盒)通常设置在？",options:["人孔(手孔)内或指定接头位置","路面下任意位置","立交桥上","收费亭内"],answer:[0],explanation:"光缆接头盒设置在人孔/手孔内(通信管道检查井)，方便日后检修和扩容。接头盒需防水密封(IP68)。"},{id:1171,type:"single",category:"公路交通安全",difficulty:2,question:"钢护栏热浸镀锌的锌层厚度检测方法通常为？",options:["磁感应测厚仪或显微镜法(断面法)","目测","称重法","听音法"],answer:[0],explanation:"镀锌层厚度检测：磁感应测厚仪(常用非破坏检测)或金相显微镜断面测量(仲裁方法)。需满足最小局部厚度≥规定值。"},{id:1172,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路路肩(硬路肩)在紧急情况下可用于？",options:["故障车辆临时停靠","正常行驶","超车","停车休息"],answer:[0],explanation:"硬路肩主要供故障车辆紧急停靠和特种车辆(救援/养护)临时通行。正常行驶车辆不得占用硬路肩(特定时段潮汐车道除外)。"},{id:1173,type:"single",category:"交通管理与控制",difficulty:1,question:"交叉口右转车与过街行人的冲突,通常采取什么管理措施？",options:["右转车须减速让行行人，或设右转信号灯隔离冲突","行人让行车辆","加速通过","无措施"],answer:[0],explanation:"右转车与行人冲突治理：设右转信号灯(行人绿灯时禁止右转)；或设减速让行标志+渠化岛降低车速；或抬高人行横道。"},{id:1174,type:"single",category:"交通流理论",difficulty:1,question:"环形线圈检测器的尺寸(长×宽)通常为？",options:["2m×2m(方形)或直径1~2m(圆形)","10cm×10cm","10m×10m","随意"],answer:[0],explanation:"环形线圈通常2m×2m方形(或φ1-2m圆形)，需覆盖车道宽度。太小则检测灵敏度和准确性下降(可能漏检摩托车或小型车)。"},{id:1175,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道内高压钠灯的主要优点不包括？",options:["节能(能效比LED更高)","光效较高(约80-140lm/W)","穿透烟雾能力较强(黄光穿透性好)","技术成熟(传统照明方案)"],answer:[0],explanation:"高压钠灯光效较高(80-140lm/W)、黄光穿透烟雾好，是隧道照明的传统方案。但LED在节能(更高lm/W)、显色性和可控性上更优。"},{id:1176,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"收费广场前的ETC天线与车辆OBU的通信频率是？",options:["5.8GHz DSRC(专用短程通信)","2.4GHz WiFi","900MHz RFID","433MHz"],answer:[0],explanation:"中国ETC采用5.8GHz DSRC(专用短程通信)国家标准(GB/T 20851)，实现天线与车载OBU之间的微波通信和交易处理。"},{id:1177,type:"single",category:"公路交通安全",difficulty:1,question:"波形梁护栏拼接螺栓的防松措施是？",options:["采用防松螺母或弹垫(弹簧垫圈)","普通螺母","无措施","焊接固定"],answer:[0],explanation:"护栏拼接螺栓在车辆振动和温度变化下可能松动，需采用防松螺母(如自锁螺母)或弹簧垫圈防止螺栓松脱。"},{id:1178,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路路基填方材料的最小强度(CBR值)要求为？",options:["上路床(0-30cm)CBR≥8%，下路床(30-80cm)CBR≥5%","CBR≥100%","无要求","CBR≥1%"],answer:[0],explanation:"路基填料CBR(加州承载比)要求：上路床(路面下0-30cm)≥8%，下路床(30-80cm)≥5%，上路堤(80-150cm)≥4%，下路堤(>150cm)≥3%。"},{id:1179,type:"single",category:"交通管理与控制",difficulty:1,question:"路口禁止掉头标志表示？",options:["车辆不得在此处掉头","禁止通行","禁止停车","禁止左转"],answer:[0],explanation:"禁止掉头标志(圆形红色边框+黑色掉头箭头+红色斜线)表示该处不得掉头。在路口允许左转但不允许掉头时设此标志。"},{id:1180,type:"single",category:"交通流理论",difficulty:2,question:"交通流参数中，时间占有率与空间占有率的关系是？",options:["两者正相关(密度越高，两种占有率都越高)","两者无关","负相关","相同"],answer:[0],explanation:"时间占有率(时间维度)和空间占有率(空间维度)都与密度正相关：密度越高，检测器上方车辆时间占比越高，路段被车辆覆盖比例也越高。"}];async function k1(){try{if(await yt.questions.count()===0){const t=gy.default||gy;await q1(Array.isArray(t)?t:[])}}catch(e){console.warn("数据库初始化失败，应用仍可运行:",e)}ml.createRoot(document.getElementById("root")).render(A.jsx(gl.StrictMode,{children:A.jsx(w1,{})}))}k1()})();</script>
