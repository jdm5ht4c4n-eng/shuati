照明设施","通风设施","消防设施","监控设施"],answer:[0],explanation:"L>200m的高速公路、一级公路隧道应设置照明。L>500m高速公路隧道应设应急照明。"},{id:446,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道射流风机的布置原则是？",options:["悬挂于隧道顶部，沿纵向间隔布置","设置于隧道侧壁","设置于隧道底部","集中于隧道入口"],answer:[0],explanation:"射流风机悬挂于隧道顶部或侧壁上部，沿纵向按一定间距布置，通过高速射流推动隧道内空气流动。"},{id:447,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道内发生火灾时，通风系统应？",options:["根据火灾位置采取相应排烟策略","保持正常通风模式不变","立即关闭所有风机","仅开启入口风机"],answer:[0],explanation:"火灾时通风系统应切换至火灾排烟模式，根据火灾位置控制风机运行方向，防止烟气扩散并帮助人员疏散。"},{id:448,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道车道指示器通常设置在哪里？",options:["行车方向隧道上方或侧壁","隧道入口外","隧道出口外","隧道监控中心"],answer:[0],explanation:"车道指示器(红叉/绿箭)设置在隧道内每车道上方或侧壁，指示该车道是否允许通行。所有等级隧道均应设。"},{id:449,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道内摄像机应重点布设在哪些位置？",options:["紧急停车带、车行横通道、人行横通道","隧道入口外","隧道照明灯具旁","风机安装处"],answer:[0],explanation:"摄像机重点布设在紧急停车带(监控停靠车辆)、车行横通道(监控调头)、人行横通道(监控人员)等处。"},{id:450,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道配置等级A+和A级必须设置的消防设施不包括？",options:["自动喷淋灭火系统","灭火器","消火栓系统","固定式水成膜泡沫灭火装置"],answer:[0],explanation:"A+/A级必须设：灭火器、消火栓系统、水成膜泡沫灭火装置。自动喷淋在隧道中不常用(水对隧道设备损害大)。"},{id:451,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道入口段照明亮度直接影响因素中，L20(S)的含义是？",options:["距洞口一个停车视距处的20度视场平均亮度","洞口外20m处的亮度","隧道入口20m内的亮度","20度视角下的天空亮度"],answer:[0],explanation:"L20(S)是在距洞口一个停车视距处，正对洞口方向20度圆锥视场内的平均亮度值，是入口段照明设计的基础参数。"},{id:452,type:"single",category:"公路隧道设计规范",difficulty:3,question:"隧道过渡段照明分为几段？",options:["TR1、TR2、TR3三段","一段","两段","四段"],answer:[0],explanation:"过渡段分TR1、TR2、TR3三段，逐级递减亮度，使驾驶员眼睛逐步完成暗适应过程。"},{id:453,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道内CO浓度限值的制定依据主要是？",options:["保障人员健康和行车安全","保护隧道结构","防止设备腐蚀","环保排放要求"],answer:[0],explanation:"CO浓度限值基于人体健康保护(CO与血红蛋白结合导致缺氧)，同时也要保证能见度不受CO影响。"},{id:454,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道内能见度(VI)控制标准的单位是？",options:["K(m^-1)或透过率","百分比","cd/m^2","lx"],answer:[0],explanation:"烟雾浓度(能见度)通常用消光系数K(m^-1)表示，K值越大能见度越差。VI标准根据车速和交通量确定。"},{id:455,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道NO2检测器在规范中的设置要求是？",options:["宜设(推荐但非强制)","必须设","不要求","与CO检测器合并设置"],answer:[0],explanation:"规范规定：CO检测器、能见度检测器、风速风向检测器→必须设(机械通风隧道)；NO2检测器→宜设。"},{id:456,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道交通工程设施配置等级D级适用于？",options:["短隧道+小交通量","特长隧道+大交通量","长隧道+大交通量","中隧道+中等交通量"],answer:[0],explanation:"D级(最低)：短隧道+小交通量。A+(最高)：特长隧道+大交通量。按长度和AADT双因素确定。"},{id:457,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道内交通信号灯组成包括？",options:["红、黄、绿和左转箭头","仅红和绿","红、黄、绿","仅红色"],answer:[0],explanation:"隧道交通信号灯由红、黄、绿和左转箭头组成，设置在隧道入口联络道前20-50m处。"},{id:458,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道消防设施中，固定式水成膜泡沫灭火装置在什么等级隧道必须设置？",options:["A+和A级","所有等级","仅A+级","B级及以上"],answer:[0],explanation:"A+和A级必须设水成膜泡沫灭火装置，B级宜设，C级和D级不作要求。"},{id:459,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道交通工程设施应遵循什么设计原则？",options:["总体规划、一次设计、可分期实施","各自独立设计","仅考虑当前需求","一次建成不得分期"],answer:[0],explanation:"隧道交通工程设施应总体规划、一次设计，但可根据交通量增长情况分期实施，合理利用投资。"},{id:460,type:"single",category:"公路隧道设计规范",difficulty:3,question:"隧道洞外亮度L20(S)的取值与什么因素有关？",options:["隧道洞口朝向、地理纬度、气候条件等","仅隧道长度","仅设计速度","仅交通量"],answer:[0],explanation:"L20(S)与洞口朝向(南/北)、地理纬度、季节、天气、洞口周围环境(植被/岩壁/天空)等因素密切相关。"},{id:461,type:"multi",category:"公路隧道设计规范",difficulty:2,question:"隧道通风控制需检测以下哪些参数？",options:["CO浓度","NO2浓度","能见度(VI)","风速风向","PM2.5"],answer:[0,1,2,3],explanation:"机械通风隧道必须设CO、VI、风速风向检测器。NO2宜设。PM2.5不是隧道通风控制标准参数。"},{id:462,type:"multi",category:"公路隧道设计规范",difficulty:2,question:"隧道照明分为哪些区段？",options:["入口段","过渡段","中间段","出口段","连接段"],answer:[0,1,2,3],explanation:"隧道照明按视觉适应过程分：入口段(明暗适应)、过渡段(逐级)、中间段(基本)、出口段(暗明适应)。"},{id:463,type:"multi",category:"公路隧道设计规范",difficulty:2,question:"以下哪些等级的隧道必须设置消火栓系统？",options:["A+级","A级","B级","C级"],answer:[0,1],explanation:"A+和A级必须设消火栓。B级宜设。C和D级不作要求。"},{id:464,type:"multi",category:"公路隧道设计规范",difficulty:2,question:"隧道火灾探测可以采用哪些技术？",options:["双波长火焰探测器","光纤感温探测系统","图像型火灾探测器","手动报警按钮"],answer:[0,1,2],explanation:"A+/A级高速隧道推荐双波长火焰探测器或光纤感温系统。图像型火灾探测器也可用。手动按钮是报警设施非探测器。"},{id:465,type:"multi",category:"公路隧道设计规范",difficulty:2,question:"以下哪些属于隧道交通监控设施？",options:["车辆检测器","摄像机","可变信息标志","车道指示器","交通信号灯"],answer:[0,1,2,3,4],explanation:"隧道交通监控设施涵盖以上全部：车辆检测、视频监视、信息发布、车道管理和信号控制。"},{id:466,type:"judge",category:"公路隧道设计规范",difficulty:1,question:"所有等级公路隧道均应设置灭火器。",options:["正确","错误"],answer:[0],explanation:"正确。灭火器是所有等级隧道均必须设置的消防设施。"},{id:467,type:"judge",category:"公路隧道设计规范",difficulty:2,question:"L<500m的高速公路隧道可以不设应急照明。",options:["正确","错误"],answer:[0],explanation:"正确。L>500m高速公路隧道应设应急照明，L≤500m的可不设。"},{id:468,type:"judge",category:"公路隧道设计规范",difficulty:2,question:"隧道通风系统中的风机可以频繁启闭以节能。",options:["正确","错误"],answer:[1],explanation:"错误。风机不应频繁启闭以免造成喘振。通风控制周期不宜小于10min，启动间隔不宜小于30s。"},{id:469,type:"judge",category:"公路隧道设计规范",difficulty:1,question:"隧道车道指示器用红色叉号表示该车道禁止通行。",options:["正确","错误"],answer:[0],explanation:"正确。车道指示器：红色叉号(X)禁止通行，绿色箭头(↓)允许通行。"},{id:470,type:"judge",category:"公路隧道设计规范",difficulty:2,question:"隧道出口段照明亮度应低于中间段亮度。",options:["正确","错误"],answer:[1],explanation:"错误。出口段亮度为中间段的3~5倍(高于中间段)，帮助驾驶员适应洞外强光环境(明适应)。"},{id:471,type:"single",category:"公路工程技术标准",difficulty:2,question:"二级公路的设计速度可取？",options:["80km/h、60km/h、40km/h","120km/h、100km/h","30km/h、20km/h","100km/h、80km/h"],answer:[0],explanation:"二级公路：80、60、40km/h。三级：40、30km/h。四级：30、20km/h。"},{id:472,type:"single",category:"公路工程技术标准",difficulty:1,question:"设计速度30km/h时，停车视距为？",options:["30m","40m","20m","75m"],answer:[0],explanation:"30km/h→30m；20km/h→20m。"},{id:473,type:"single",category:"公路工程技术标准",difficulty:2,question:"JTG B01-2014中，设计车辆类型从2003版的三类增加到几类？",options:["五类","四类","六类","七类"],answer:[0],explanation:"2014版设计车辆从三类增至五类：小客车、中型车、大型客车、铰接客车、铰接列车。"},{id:474,type:"single",category:"公路工程技术标准",difficulty:3,question:"高速公路特殊困难路段经论证可采用的设计速度及相邻路段限速要求是？",options:["60km/h，相邻路段设计速度不应大于80km/h","60km/h，相邻路段设计速度不限","40km/h，相邻路段不限","80km/h，相邻路段不限"],answer:[0],explanation:"特殊困难路段经论证可采用60km/h，但长度不宜大于15km，且相邻路段设计速度不应大于80km/h。"},{id:475,type:"single",category:"公路工程技术标准",difficulty:2,question:"公路功能分类中，支线公路对应的技术等级为？",options:["三级或四级公路","高速公路","一级公路","二级公路"],answer:[0],explanation:"支线公路以服务功能为主，不严格要求期望速度，对应三四级公路(技术等级最低)。"},{id:476,type:"single",category:"公路工程技术标准",difficulty:3,question:"JTG B01-2014规定，主要干线公路对应的技术等级为？",options:["高速公路","一级及以上","二级及以上","任一等级"],answer:[0],explanation:"主要干线公路连接20万人口以上大中城市，期望速度≥80km/h，对应高速公路。"},{id:477,type:"single",category:"公路工程技术标准",difficulty:2,question:"JTG B01-2014对中央分隔带宽度的规定是？",options:["不再规定推荐值，根据功能确定","与2003版相同","统一规定为3m","统一规定为2m"],answer:[0],explanation:"2014版不再规定中央分隔带宽度推荐值，改为根据项目中央分隔带功能确定，给予更大设计灵活性。"},{id:478,type:"single",category:"公路工程技术标准",difficulty:1,question:"三级公路车道宽度为？",options:["3.50m或3.25m","3.75m","3.00m","4.00m"],answer:[0],explanation:"三级公路车道宽3.50m(40km/h)或3.25m(30km/h)。四级为3.25m(30km/h)或3.00m(20km/h)。"},{id:479,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"收费岛宽度和侧面高度分别为？",options:["2.2m和0.30m","2.5m和0.50m","2.0m和0.20m","3.0m和1.0m"],answer:[0],explanation:"收费岛宽2.2m，侧面高0.30m。收费车道宽3.2m，超宽车道4.0m。"},{id:480,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"收费天棚净高不小于？",options:["5.5m","3.0m","4.0m","6.0m"],answer:[0],explanation:"收费天棚净高≥5.5m，确保各类车辆(包括超高车辆)正常通过。"},{id:481,type:"single",category:"交通流理论",difficulty:2,question:"速度-流量关系曲线中，同一流量可能对应几个速度值？",options:["两个(一个在非拥挤区，一个在拥挤区)","一个","三个","四个"],answer:[0],explanation:"在Greenshields模型中，同一Q值(除Qmax外)对应两个速度值：高速度低密度(非拥挤区)和低速度高密度(拥挤区)。"},{id:482,type:"single",category:"交通管理与控制",difficulty:2,question:"交叉口交通岛的用途不包括？",options:["增加通行能力","引导车流行驶","保护行人安全","美化环境"],answer:[0],explanation:"交通岛(导流岛、安全岛)用于引导车流、保护行人、提供交通设施安装位置。增加通行能力不是其直接功能。"},{id:483,type:"single",category:"交通管理与控制",difficulty:2,question:"路段人行横道设置间距一般不小于？",options:["150~300m","50m","500m","1000m"],answer:[0],explanation:"城市道路人行横道间距一般150~300m(视行人出行需求)，过密影响车辆运行，过稀不方便行人。"},{id:484,type:"single",category:"公路交通安全",difficulty:2,question:"交通标志结构中，悬臂式支撑适用于？",options:["道路较宽，外侧车道驾驶员不易看清路侧标志时","仅单向单车道","仅人行道","仅停车场"],answer:[0],explanation:"悬臂式支撑将标志伸出到车道上方，适用于道路较宽、路侧标志视认距离不足的情况。"},{id:485,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道内人行横通道的作用是？",options:["火灾等紧急情况下供人员安全疏散","日常行人通行","通风换气","管线布设"],answer:[0],explanation:"人行横通道是上下行隧道之间的连接通道，在火灾等紧急情况下供人员从事故隧道疏散至安全隧道。"},{id:486,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道内车行横通道的作用是？",options:["紧急情况下供车辆调头或救援车辆通行","日常车辆掉头","增加车道","停车休息"],answer:[0],explanation:"车行横通道供紧急情况下车辆从事故隧道转移至非事故隧道，以及消防救援车辆通行。不用于日常掉头。"},{id:487,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"机电设备设计交通量按预测第5年确定，主要是因为？",options:["机电设备更新周期较短，远期需求可通过升级满足","5年最准确","20年无法预测","成本最低"],answer:[0],explanation:"机电设备(检测器、摄像机等)技术更新快、使用寿命约5-10年，按近期交通量配置后期可通过升级改造满足需求。"},{id:488,type:"single",category:"交通管理与控制",difficulty:2,question:"我国城市道路交叉口信号灯的最小绿灯时间一般不少于？",options:["7~10秒","1~3秒","15~20秒","30秒"],answer:[0],explanation:"最小绿灯时间一般7~10秒，保证车辆驾驶员有足够的反应和通过时间，同时保证行人过街安全。"},{id:489,type:"single",category:"公路工程技术标准",difficulty:2,question:"JTG B01-2014中，高速公路、一级公路的整体式断面必须设置？",options:["中央分隔带","左侧路肩","人行道","非机动车道"],answer:[0],explanation:"高速公路和一级公路整体式断面必须设置中央分隔带，分离对向车流，保障行车安全。"},{id:490,type:"single",category:"交通管理与控制",difficulty:3,question:"区域交通信号控制的评价指标PI(Performance Index)通常不包括？",options:["信号灯耗电量","总延误","停车次数","饱和度"],answer:[0],explanation:"区域控制PI通常综合总延误、停车次数、排队长度、饱和度等，信号灯耗电量不是交通运行评估的核心指标。"},{id:491,type:"multi",category:"交通管理与控制",difficulty:2,question:"以下哪些属于被动安全设施？",options:["护栏","防撞垫","缓冲端头","交通标志","交通信号灯"],answer:[0,1,2],explanation:"被动安全设施：护栏、防撞垫、缓冲端头等(碰撞时保护)。标志和信号灯属于主动安全设施(预防)。"},{id:492,type:"multi",category:"公路工程技术标准",difficulty:2,question:"JTG B01-2014中公路按功能分为以下哪些类型？",options:["主要干线公路","次要干线公路","主要集散公路","次要集散公路","支线公路"],answer:[0,1,2,3,4],explanation:"功能五分类。技术五等级：高速、一级、二级、三级、四级。功能分类和技术等级交叉对应。"},{id:493,type:"multi",category:"高速公路交通工程通用规范",difficulty:2,question:"收费制式包括以下哪些？",options:["封闭式","开放式","混合式","均一式"],answer:[0,1,2],explanation:"三种收费制式：封闭式(联网收费)、开放式(独立桥隧)、混合式(近期交通量少时)。均一式适用于城市道路收费。"},{id:494,type:"multi",category:"公路隧道设计规范",difficulty:2,question:"隧道通风系统的主要目的是？",options:["稀释CO和NO2浓度","保证能见度","控制隧道内风速","火灾时排烟","控制隧道内温度"],answer:[0,1,2,3],explanation:"隧道通风目的：稀释污染物(CO/NO2)、保证能见度(排烟尘)、控制风速、火灾排烟。温度控制不是主要目的。"},{id:495,type:"multi",category:"交通流理论",difficulty:3,question:"以下哪些属于交通分配方法？",options:["全有或全无法","增量分配法","用户均衡法","系统最优法","重力模型法"],answer:[0,1,2,3],explanation:"前四种均为交通分配方法。重力模型法属于出行分布阶段的方法。"},{id:496,type:"multi",category:"公路交通安全",difficulty:2,question:"以下哪些情况应设置路侧护栏？",options:["路侧有水深1.5m以上水域","净区内有I级铁路","悬崖深沟深度≥30m(三四级公路)","净区内有一般农田"],answer:[0,1,2],explanation:"前三项为应设置(中)或必须设置(高)条件。一般农田不满足护栏设置条件。"},{id:497,type:"judge",category:"公路工程技术标准",difficulty:2,question:"高速公路设计速度不包括60km/h。",options:["正确","错误"],answer:[1],explanation:"错误。特殊困难路段经论证可采用60km/h，但长度不宜大于15km。"},{id:498,type:"judge",category:"交通管理与控制",difficulty:2,question:"全感应信号控制在所有进口道设置检测器。",options:["正确","错误"],answer:[0],explanation:"正确。全感应控制在所有进口道设置检测器，根据各方向实际到达车辆动态分配绿灯时间。"},{id:499,type:"judge",category:"公路交通安全",difficulty:1,question:"交通标志中蓝色表示指示和指路(一般道路)。",options:["正确","错误"],answer:[0],explanation:"正确。蓝色：指示标志(圆形)和一般道路指路标志(矩形)。高速指路用绿色。"},{id:500,type:"judge",category:"高速公路交通工程通用规范",difficulty:2,question:"通信光电缆可以直接敷设在路基中不需要管道保护。",options:["正确","错误"],answer:[1],explanation:"错误。通信光电缆必须敷设在通信管道内，以保护光电缆并便于维护更换。"},{id:501,type:"judge",category:"公路隧道设计规范",difficulty:1,question:"灭火器是所有等级隧道都必须设置的消防设施。",options:["正确","错误"],answer:[0],explanation:"正确。无论隧道等级，灭火器均为必需的消防设施。"},{id:502,type:"judge",category:"交通管理与控制",difficulty:2,question:"交叉口全红时间越长越好，可以保证安全。",options:["正确","错误"],answer:[1],explanation:"错误。全红时间过长会浪费绿灯时间，降低通行能力。应合理设置(通常2~4秒)，保证清空即可。"},{id:503,type:"judge",category:"交通流理论",difficulty:2,question:"交通密度K与占有率Occupancy之间没有关系。",options:["正确","错误"],answer:[1],explanation:"错误。占有率与密度有良好的正相关关系，检测器常用占有率替代密度作为交通状态指标。"},{id:504,type:"judge",category:"公路工程技术标准",difficulty:1,question:"一级公路的整体式断面必须设置中央分隔带。",options:["正确","错误"],answer:[0],explanation:"正确。高速和一级公路整体式断面必须设中央分隔带以分离对向车流。"},{id:505,type:"judge",category:"公路交通安全",difficulty:2,question:"所有公路桥梁都必须设置中央分隔带护栏。",options:["正确","错误"],answer:[1],explanation:"错误。各等级公路桥梁必须设路侧护栏，但中央分隔带护栏仅高速和干线一级公路桥梁必须设置。"},{id:506,type:"single",category:"交通流理论",difficulty:2,question:"车辆延误按原因可分为？",options:["固定延误、运行延误、停车延误、行程时间延误","仅停车延误","仅行程时间延误","仅排队延误"],answer:[0],explanation:"交叉口延误分类：固定延误(信号控制引起)、运行延误(交通流间干扰)、停车延误(完全停止时间)、行程时间延误。"},{id:507,type:"single",category:"交通管理与控制",difficulty:2,question:"交叉口信号配时中，行人过街最短绿灯时间的计算依据是？",options:["路宽/步行速度(1.2m/s)","周期时间/2","固定15秒","绿灯时间等于车辆相位时间"],answer:[0],explanation:"行人最短绿灯=路宽/1.2m/s，确保行人至少能走到路中央安全岛或完全通过。"},{id:508,type:"single",category:"公路工程技术标准",difficulty:2,question:"JTG B01-2014设计车辆类型中，铰接列车主要用于什么设计场景？",options:["平纵线形、爬坡车道、交叉口渠化等","仅桥梁设计","仅路面设计","仅标志设计"],answer:[0],explanation:"铰接列车(汽车列车)是2014版新增设计车辆，用于长大下坡、爬坡车道、立交匝道、收费广场等线形和设施设计验证。"},{id:509,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"监控系统信息处理与决策设备不包括？",options:["气象检测器","监控计算机","闭路电视控制设备","图像显示设施"],answer:[0],explanation:"信息处理决策：监控计算机、CCTV控制、图像显示等。气象检测器属于信息采集设备。"},{id:510,type:"single",category:"公路隧道设计规范",difficulty:3,question:"隧道照明过渡段TR1、TR2、TR3三段亮度比例关系大致为？",options:["TR1:TR2:TR3 ≈ 1:0.5:0.15 左右","三段亮度完全相同","TR1:TR2:TR3 ≈ 1:2:3","TR1:TR2:TR3 ≈ 1:1:1"],answer:[0],explanation:"过渡段亮度逐级递减：TR1约为入口段的30%，TR2约为TR1的50%，TR3约为TR2的30%，实现平稳过渡。"},{id:511,type:"single",category:"公路交通安全",difficulty:2,question:"路侧护栏在什么情况下宜设置(事故严重程度=低)？",options:["边坡较高、路侧有无法安全越过的障碍物","路侧有高速铁路","路侧有危险品仓库","路侧有高压输电线路"],answer:[0],explanation:"宜设置(低严重程度)：边坡较高且不能保证安全越过、路侧有障碍物无法移除等一般风险场景。"},{id:512,type:"single",category:"交通管理与控制",difficulty:2,question:"可变信息标志(VMS)的发布内容通常不包括？",options:["商业广告","交通事故信息","天气预警","拥堵提示"],answer:[0],explanation:"VMS发布交通相关信息：事故、拥堵、天气、施工、路线引导等。商业广告通常不在高速公路VMS上发布。"},{id:513,type:"single",category:"交通管理与控制",difficulty:2,question:"行人过街信号灯的绿灯闪烁表示？",options:["绿灯即将结束，提醒行人尽快通过","禁止行人进入人行横道","可以正常通过","信号灯故障"],answer:[0],explanation:"绿灯闪烁(绿闪)表示绿灯即将结束，已在人行横道上的行人应继续通过，尚未进入的应等待下一次绿灯。"},{id:514,type:"single",category:"交通管理与控制",difficulty:3,question:"关键交叉口的饱和度应控制在什么范围？",options:["x<0.9(通常设计目标)","x<0.5","x=1.0","x>1.0"],answer:[0],explanation:"关键交叉口设计饱和度通常要求x<0.9(预留一定余量)，x≥1.0表示过饱和，交叉口将出现持续排队。"},{id:515,type:"single",category:"公路工程技术标准",difficulty:2,question:"JTG B01-2014规定，高速公路应设置什么设施？",options:["全部交通安全和管理设施","仅护栏","仅标志标线","仅照明"],answer:[0],explanation:"JTG B01-2014规定高速公路应配置完善的交通安全、服务和管理设施，包括监控、收费、通信等系统。"},{id:516,type:"multi",category:"高速公路交通工程通用规范",difficulty:3,question:"以下哪些属于通信系统业务网的组成部分？",options:["电话交换网","数据通信网","图像传输网","会议电视网","数字同步网"],answer:[0,1,2,3],explanation:"业务网：电话交换、数据通信、图像传输、会议电视、紧急报警、路侧广播、移动通信等。数字同步网属于支撑网。"},{id:517,type:"multi",category:"公路交通安全",difficulty:2,question:"半刚性护栏(波形梁)的优点包括？",options:["容易更换损坏部件","视线诱导效果好","外形较美观","维修费用低"],answer:[0,1,2],explanation:"波形梁护栏前三个均为优点。但其碰撞后需维修更换，维修费用高于混凝土护栏。"},{id:518,type:"multi",category:"交通管理与控制",difficulty:2,question:"交叉口信号控制按控制范围可分为？",options:["单点控制","干线协调控制","区域自适应控制","手动控制"],answer:[0,1,2],explanation:"按控制范围：单点(独立)、干线(协调)、区域(系统优化)。手动控制是非常规方式。"},{id:519,type:"multi",category:"公路隧道设计规范",difficulty:2,question:"以下哪些设备属于隧道通风系统的组成部分？",options:["射流风机","轴流风机","CO检测器","能见度检测器","照明灯具"],answer:[0,1,2,3],explanation:"风机(射流/轴流)和检测器(CO/VI/风速)属于通风系统。照明灯具属于照明系统。"},{id:520,type:"single",category:"公路工程技术标准",difficulty:2,question:"以下哪些是JTG B01-2014新增强制要求的内容？",options:["运行速度检验","安全性评价","爬坡车道设置","货车停车视距验算"],answer:[0],explanation:"2014版新增：运行速度检验、安全性评价、爬坡车道验算、货车停车视距(附录B)。短隧道照明不属于新增。"},{id:521,type:"judge",category:"交通管理与控制",difficulty:1,question:"减速让行标志的形状为倒三角形。",options:["正确","错误"],answer:[0],explanation:"正确。减速让行(Yield)为倒置的等边三角形(顶点向下)，停车让行(Stop)为八角形。"},{id:522,type:"judge",category:"高速公路交通工程通用规范",difficulty:2,question:"ETC不停车收费只能在所有收费站全部使用。",options:["正确","错误"],answer:[1],explanation:"错误。ETC可与MTC(人工半自动收费)混合设置，设置ETC专用车道和MTC/ETC混合车道。"},{id:523,type:"judge",category:"公路交通安全",difficulty:2,question:"护栏本身也是道路障碍物，并非强度越高越好。",options:["正确","错误"],answer:[0],explanation:"正确。护栏设计理念是宽容设计和适度防护，过度强化会增加碰撞严重程度和造价。"},{id:524,type:"judge",category:"交通流理论",difficulty:2,question:"跟驰模型中的反应滞后时间T通常取5~10秒。",options:["正确","错误"],answer:[1],explanation:"错误。跟驰反应滞后时间T通常取1.0~2.5秒，包含感知和操作时间。"},{id:525,type:"judge",category:"公路隧道设计规范",difficulty:2,question:"隧道内消火栓系统在所有等级隧道都必须设置。",options:["正确","错误"],answer:[1],explanation:"错误。仅A+和A级必须设消火栓，B级宜设，C/D级不作要求。"},{id:526,type:"judge",category:"公路工程技术标准",difficulty:2,question:"JTG B01-2014已取消路基总宽度指标值。",options:["正确","错误"],answer:[0],explanation:"正确。2014版取消路基总宽度指标值，不再刚性约束，给予设计更大灵活性。"},{id:527,type:"judge",category:"交通管理与控制",difficulty:1,question:"交通信号红灯时右转车辆在任何情况下都可以通行。",options:["正确","错误"],answer:[1],explanation:"错误。红灯时右转需遵守让行规则(确保安全)，且设有禁止右转标志时必须停车等待。"},{id:528,type:"judge",category:"高速公路交通工程通用规范",difficulty:2,question:"收费系统数据保存时间要求为不少于40天。",options:["正确","错误"],answer:[0],explanation:"正确。收费站数据保存≥40天，须采用数据自动备份。收费中心服务器采用双机热备。"},{id:529,type:"judge",category:"公路交通安全",difficulty:1,question:"公路桥梁必须设置路侧护栏。",options:["正确","错误"],answer:[0],explanation:"正确。各等级公路桥梁(含涵洞)必须设置路侧护栏，防止车辆冲出。"},{id:530,type:"judge",category:"交通流理论",difficulty:2,question:"在Greenshields模型中，K=Kj/2时速度和流量同时达到最大值。",options:["正确","错误"],answer:[1],explanation:"错误。K=Kj/2时流量最大，但速度V=Vf/2(不是最大值)。速度最大值在K=0时(V=Vf)。"},{id:531,type:"single",category:"交通管理与控制",difficulty:2,question:"交通信号控制中，过饱和交叉口的特征不包括？",options:["饱和度x<0.5","车辆需多次周期才能通过","排队持续增长","交叉口发生溢流"],answer:[0],explanation:"过饱和(x≥1.0)特征：车辆需等多次周期、排队持续增长、可能发生溢流(排队延伸到上游)。x<0.5为轻交通状态。"},{id:532,type:"single",category:"交通管理与控制",difficulty:2,question:"公交信号优先策略中，绿灯延长策略是指？",options:["检测到公交车接近时延长当前绿灯时间","提前开启公交车方向的绿灯","插入专用公交相位","缩短红灯时间"],answer:[0],explanation:"绿灯延长：当检测到公交车接近交叉口时适当延长当前绿灯时间，使公交车能够不停车通过。"},{id:533,type:"single",category:"公路工程技术标准",difficulty:2,question:"JTG B01-2014规定设计车辆中的大型客车主要用于？",options:["客运站、机场道路等以客车为主的道路设计","所有道路","仅高速公路","仅城市道路"],answer:[0],explanation:"大型客车是2014版新增设计车辆类型，用于客运站、机场等客车流量大的场景的线形和设施设计验证。"},{id:534,type:"single",category:"公路交通安全",difficulty:3,question:"防撞垫前端距固定障碍物的最小距离一般要求不少于？",options:["根据产品性能和设计速度确定，通常≥5~15m","1m","50m","无要求"],answer:[0],explanation:"防撞垫需足够的变形空间吸收碰撞能量，前端距后方固定障碍物的距离根据设计速度和产品性能确定，通常5~15m。"},{id:535,type:"single",category:"交通管理与控制",difficulty:1,question:"道路交通标线按设置方式分为？",options:["纵向标线、横向标线和其他标线","白色标线和黄色标线","热熔型和常温型","反光型和非反光型"],answer:[0],explanation:"按设置方式：纵向(沿道路方向，如车道线)、横向(垂直于道路方向，如停止线)和其他(如导流线、箭头等)。"},{id:536,type:"single",category:"交通管理与控制",difficulty:2,question:"以下哪些属于交通信号控制方式？",options:["定时控制","感应控制","自适应控制","人工指挥控制"],answer:[0],explanation:"信号控制方式：定时(固定周期)、感应(检测器触发)、自适应(实时优化)。人工指挥是非常规交通管理方式。"},{id:537,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"高速公路监控系统主要功能包括？",options:["信息采集","信息处理与决策","信息发布与控制","人工收费管理"],answer:[0],explanation:"监控系统三大功能：信息采集(检测器/摄像机等)、信息处理决策(计算机)、信息发布控制(VMS/信号灯)。收费管理属于收费系统。"},{id:538,type:"single",category:"公路工程技术标准",difficulty:2,question:"以下哪些属于公路技术等级？",options:["高速公路","一级公路","二级公路","三级公路"],answer:[0],explanation:"五个技术等级。与功能等级(干线/集散/支线)是两个维度，交叉确定具体标准。"},{id:539,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道内发生火灾时应采取的措施包括？",options:["启动火灾排烟模式","开启疏散指示","关闭隧道入口","保持正常通风"],answer:[0],explanation:"火灾时：启动排烟模式、开启疏散指示、关闭/控制隧道入口、通知救援等。保持正常通风会加速烟气扩散。"},{id:540,type:"single",category:"公路交通安全",difficulty:2,question:"交通安全设施按作用可分为？",options:["主动安全设施","被动安全设施","服务设施","管理设施"],answer:[0],explanation:"按作用：主动安全设施(标志/标线/信号灯预防事故)和被动安全设施(护栏/防撞垫减轻后果)。"},{id:541,type:"judge",category:"交通管理与控制",difficulty:1,question:"干线协调控制也叫绿波控制。",options:["正确","错误"],answer:[0],explanation:"正确。干线协调控制通过设置合适的相位差使车辆连续通过多个交叉口形成绿波带。"},{id:542,type:"judge",category:"公路工程技术标准",difficulty:1,question:"四级公路车道宽度可以是3.00m。",options:["正确","错误"],answer:[0],explanation:"正确。四级公路设计速度20km/h时车道宽3.00m；30km/h时宽3.25m。"},{id:543,type:"judge",category:"公路隧道设计规范",difficulty:2,question:"隧道长度大于200m的高速公路隧道应设置照明。",options:["正确","错误"],answer:[0],explanation:"正确。L>200m的高速、一级公路隧道应设置照明。"},{id:544,type:"judge",category:"高速公路交通工程通用规范",difficulty:2,question:"收费岛前后路面应采用沥青路面。",options:["正确","错误"],answer:[1],explanation:"错误。收费岛前后路面应为水泥混凝土路面，以适应车辆频繁制动起动造成的高磨损。"},{id:545,type:"judge",category:"公路交通安全",difficulty:2,question:"路侧护栏在所有路段都必须设置。",options:["正确","错误"],answer:[1],explanation:"错误。路侧护栏根据事故严重程度(低/中/高)和实际条件(边坡高度、障碍物、水域等)判断是否需要设置。"},{id:546,type:"judge",category:"交通管理与控制",difficulty:1,question:"黄灯时间通常设置为3秒。",options:["正确","错误"],answer:[0],explanation:"正确。我国城市道路黄灯通常3秒(设计速度≤60km/h)，高速公路4~5秒。"},{id:547,type:"judge",category:"交通流理论",difficulty:2,question:"第30位小时交通量(30HV)约等于AADT的12%~18%。",options:["正确","错误"],answer:[0],explanation:"正确。K=30HV/AADT通常为0.12~0.18，即DHV约为AADT的12%~18%。"},{id:548,type:"judge",category:"公路工程技术标准",difficulty:1,question:"JTG B01-2014于2015年1月1日起施行。",options:["正确","错误"],answer:[0],explanation:"正确。JTG B01-2014发布日期2014年9月30日，施行日期2015年1月1日。"},{id:549,type:"judge",category:"高速公路交通工程通用规范",difficulty:2,question:"通信系统应采用卫星通信作为主要通信方式。",options:["正确","错误"],answer:[1],explanation:"错误。规范规定以光纤通信为主(稳定可靠、带宽大)，有条件地区可配合移动通信。"},{id:550,type:"judge",category:"公路交通安全",difficulty:1,question:"护栏防撞等级从低到高为C→B→A→SB→SA→SS→HB→HA。",options:["正确","错误"],answer:[0],explanation:"正确。防撞等级代码：一(C)→二(B)→三(A)→四(SB)→五(SA)→六(SS)→七(HB)→八(HA)。"},{id:551,type:"single",category:"公路工程技术标准",difficulty:2,question:"设计速度60km/h时，一条车道的设计通行能力通常在什么范围？",options:["800~1200 pcu/h","500~800 pcu/h","1500~2000 pcu/h","300~500 pcu/h"],answer:[0],explanation:"设计通行能力=基本通行能力×修正系数×V/C比。60km/h时约800-1200pcu/h/车道，具体值受多种因素影响。"},{id:552,type:"single",category:"公路工程技术标准",difficulty:2,question:"公路线形设计的三要素不包括？",options:["路面结构设计","平面线形设计","纵断面线形设计","横断面设计"],answer:[0],explanation:"线形三要素：平面(直线+缓和曲线+圆曲线)、纵断面(坡度+竖曲线)、横断面(车道+路肩+分隔带)。路面结构属于路基路面工程。"},{id:553,type:"single",category:"公路工程技术标准",difficulty:2,question:"公路平面线形的基本组成包括？",options:["直线、缓和曲线、圆曲线","仅直线","仅圆曲线","直线和竖曲线"],answer:[0],explanation:"平面线形=直线+缓和曲线+圆曲线(平曲线)。缓和曲线连接直线和圆曲线，使曲率连续变化。"},{id:554,type:"single",category:"公路工程技术标准",difficulty:2,question:"缓和曲线的主要作用是？",options:["使曲率从直线(0)逐渐过渡到圆曲线(1/R)，离心力渐变","增加道路长度","减少用地","降低造价"],answer:[0],explanation:"缓和曲线使曲率从0(直线)连续变化到1/R(圆曲线)，离心力渐变，驾驶员可从容调整方向，提高舒适性和安全性。"},{id:555,type:"single",category:"公路工程技术标准",difficulty:3,question:"不设超高的最小圆曲线半径取决于什么因素？",options:["设计速度和横向力系数(舒适性)","仅交通量","仅车道数","路面类型"],answer:[0],explanation:"不设超高的最小半径由设计速度和允许横向力系数μ决定：R≥V^2/[127(μ+ih)]。μ值反映乘客舒适度。"},{id:556,type:"single",category:"公路工程技术标准",difficulty:2,question:"公路最大纵坡的限制主要考虑什么因素？",options:["车辆爬坡能力和下坡安全性","排水需求","路面寿命","线形美观"],answer:[0],explanation:"最大纵坡主要受车辆(尤其货车)爬坡能力和下坡制动安全性限制。不同设计速度有不同最大纵坡值。"},{id:557,type:"single",category:"公路工程技术标准",difficulty:1,question:"竖曲线按形状分为？",options:["凸形竖曲线和凹形竖曲线","圆形竖曲线","方形竖曲线","抛物线形(仅一种)"],answer:[0],explanation:"竖曲线分为凸形(变坡点处线形向上凸起)和凹形(向下凹陷)。最小半径和长度由视距和舒适性要求确定。"},{id:558,type:"single",category:"公路工程技术标准",difficulty:2,question:"凸形竖曲线的最小半径主要取决于什么？",options:["停车视距要求","排水要求","路面宽度","车道数"],answer:[0],explanation:"凸形竖曲线最小半径由停车视距要求决定：保证驾驶员能看到前方至少一个停车视距范围内的障碍物。"},{id:559,type:"single",category:"公路工程技术标准",difficulty:2,question:"凹形竖曲线的最小半径主要取决于什么？",options:["夜间行车前照灯照射距离和离心力舒适性","停车视距","路面宽度","交通量"],answer:[0],explanation:"凹形竖曲线最小半径取决于：夜间前灯照射距离(能看到前方路面)和离心力产生的失重感(舒适性)。"},{id:560,type:"single",category:"公路工程技术标准",difficulty:2,question:"公路横断面中，路肩的主要作用不包括？",options:["增加车道通行能力","保护行车道结构","提供侧向安全净空","紧急停车使用"],answer:[0],explanation:"路肩功能：保护行车道(排水/结构支撑)、提供侧向净空(安全感)、紧急停车、养护作业空间。不直接增加通行能力。"},{id:561,type:"single",category:"公路工程技术标准",difficulty:1,question:"高速公路和一级公路的横断面类型为？",options:["整体式断面或分离式断面","仅整体式断面","仅分离式断面","任意形式"],answer:[0],explanation:"高速和一级可采用整体式(上下行同一平面，用中央分隔带分开)或分离式断面(上下行分幅布置)。"},{id:562,type:"single",category:"公路工程技术标准",difficulty:2,question:"公路建筑限界(Building Clearance)是指？",options:["为保证车辆安全通行而规定的不允许任何设施侵入的空间范围","路基宽度","路面宽度","桥梁高度"],answer:[0],explanation:"建筑限界是保证车辆安全通行所需的最小净空，任何结构物、设施、植物均不得侵入该范围。"},{id:563,type:"single",category:"公路工程技术标准",difficulty:2,question:"公路设计速度100km/h时，一条车道的可能通行能力约为？",options:["1800~2200 pcu/h(理想条件下基本值)","1000~1200 pcu/h","3000~3500 pcu/h","500~800 pcu/h"],answer:[0],explanation:"设计速度≥100km/h时一条车道的基本通行能力约2000pcu/h，可能通行能力经修正后略低。"},{id:564,type:"single",category:"公路工程技术标准",difficulty:2,question:"JTG B01-2014中公路等级按什么因素选用？",options:["功能统领：先确定公路功能，再根据交通量确定技术等级","仅按交通量","仅按设计速度","仅按地形条件"],answer:[0],explanation:"2014版最大变化：以公路功能为主导选用等级，非单一交通量决定。功能→交通量→技术等级→设计速度→各项指标。"},{id:565,type:"single",category:"公路工程技术标准",difficulty:2,question:"公路交叉工程包括平面交叉和立体交叉。立体交叉的设置条件不包括？",options:["任意两条公路相交均应设置","高速公路与其他公路相交","一级公路与交通量大的其他公路相交","满足特定技术经济条件"],answer:[0],explanation:"立体交叉不是所有相交都需要设置。高速公路与所有等级公路相交必须设立体交叉；一级公路视交通量条件设。"},{id:601,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"高速公路交通安全设施设计必须与什么相配合？",options:["主体工程","收费系统","服务设施","绿化工程"],answer:[0],explanation:"交通安全设施必须与主体工程相配合，采用运行速度进行安全性评价，通过调整线形技术指标或设施增进安全。"},{id:602,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路交通标志中绿色代表什么？",options:["指路(高速公路)","禁止","警告","指示"],answer:[0],explanation:"绿底白字=高速公路指路标志；蓝底白字=一般道路指路标志；红=禁止；黄=警告；蓝=指示。"},{id:603,type:"single",category:"高速公路交通工程通用规范",difficulty:3,question:"监控系统A22级(最低配置)适用于什么条件？",options:["四或六车道高速公路，服务水平二级路段","八车道高速公路","所有高速公路","仅隧道段"],answer:[0],explanation:"A22(基本配置)：四或六车道高速、服务水平二级路段。配置等级随车道数增加和服务水平下降而提高。"},{id:604,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"紧急报警设施(应急电话)通常设置在什么位置？",options:["高速公路路侧，间隔一定距离(通常1~2km)","收费站","服务区","监控中心"],answer:[0],explanation:"紧急电话沿高速公路路侧每隔1~2km设置(或根据规范确定)，供驾驶员在紧急情况下呼叫救援。"},{id:605,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"高速公路收费方式中，MTC(M annual Toll Collection)是指？",options:["人工半自动收费(人工+计算机+CCTV)","全自动收费","不停车收费","移动支付收费"],answer:[0],explanation:"MTC=Manual Toll Collection，半自动收费：人工收费+计算机辅助管理+CCTV监视，是最常用的收费方式。"},{id:606,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"ETC车道通行速度通常为？",options:["20~30 km/h(低速通过)","60~80 km/h","100~120 km/h","5~10 km/h"],answer:[0],explanation:"ETC车道车辆以20-30km/h低速通过(收费站通常限速)，通过自动识别和扣费实现不停车收费。"},{id:607,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"收费广场水泥混凝土路面的主要原因是？",options:["耐车辆频繁制动和起动造成的磨损","成本低","施工方便","美观"],answer:[0],explanation:"水泥混凝土路面抗磨耗、抗变形能力强，适应收费广场车辆频繁制动、起动、停车造成的路面应力。"},{id:608,type:"single",category:"高速公路交通工程通用规范",difficulty:3,question:"混合式收费制式适用于什么条件？",options:["近期交通量少、短途交通量少、互通立交间距大且出入交通量小","所有高速公路","仅长距离高速","仅桥梁隧道"],answer:[0],explanation:"混合式(主线设收费站+部分匝道设收费站)：近期交通量少、短途少、互通间距大、出入量小的过渡期方案。"},{id:609,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"高速公路通信系统的业务网不包括？",options:["传送网","电话交换网","数据通信网","图像传输网"],answer:[0],explanation:"传送网(干线网+接入网)为第一层；业务网(电话/数据/图像/会议电视等)为第二层；支撑网为第三层。"},{id:610,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"高速公路沿线设施(服务区、停车区)的设置间距一般不超过？",options:["50km","10km","100km","200km"],answer:[0],explanation:"服务区设置间距一般25~50km(或根据规范)，为驾驶员提供休息、加油、餐饮等服务。"},{id:641,type:"single",category:"公路隧道设计规范",difficulty:1,question:"公路隧道按长度分类：短隧道是指长度不大于？",options:["500m","250m","1000m","3000m"],answer:[0],explanation:"隧道按长度分类：特长L>3000m，长1000<L≤3000m，中500<L≤1000m，短L≤500m。"},{id:642,type:"single",category:"公路隧道设计规范",difficulty:1,question:"特长公路隧道是指长度大于多少米的隧道？",options:["3000m","500m","1000m","10000m"],answer:[0],explanation:"特长隧道L>3000m。长隧道：1000~3000m。中隧道：500~1000m。短隧道：≤500m。"},{id:643,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道排烟策略中，纵向排烟方式适用于？",options:["单向交通隧道","双向交通隧道","所有隧道","仅短隧道"],answer:[0],explanation:"纵向排烟利用射流风机沿隧道纵向排烟，适用于单向交通隧道(烟气流向与车行方向关系明确)。"},{id:644,type:"single",category:"公路隧道设计规范",difficulty:3,question:"双向交通隧道发生火灾时，通风排烟策略应如何？",options:["分段排烟或重点排烟，避免烟气影响未疏散人员","仅采用纵向排烟","关闭所有通风","维持正常通风"],answer:[0],explanation:"双向交通隧道火灾时不宜采用简单纵向排烟(会危及一侧人员)，宜采用重点排烟或横向/半横向排烟方式。"},{id:645,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道内射流风机的优缺点不包括？",options:["占用隧道横断面空间大","安装灵活","初期投资相对较低","维护方便"],answer:[0],explanation:"射流风机悬挂于隧道顶部，占用空间小(非大)，安装灵活，投资较低，维护方便，是最常用的隧道通风设备。"},{id:646,type:"single",category:"公路隧道设计规范",difficulty:3,question:"隧道全横向通风方式的特点是什么？",options:["设置独立的送风道和排风道，通风效果均匀但造价高","仅设送风道","仅设排风道","不需要通风道"],answer:[0],explanation:"全横向通风设送风道和排风道，空气横向流过隧道，通风均匀效果好，但土建造价高，适用于特长隧道。"},{id:647,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道照明中，入口段亮度Lth与洞外亮度L20(S)的关系为？",options:["Lth = k × L20(S)，k为折减系数","Lth = L20(S)","Lth = L20(S) / k","Lth = k + L20(S)"],answer:[0],explanation:"入口段亮度Lth通过折减系数k与洞外亮度L20(S)建立关系：Lth=k×L20(S)。k取决于设计速度和交通量。"},{id:648,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道内发生火灾时，人员疏散方向应？",options:["向远离火灾且烟气未蔓延的方向疏散","向上坡方向","向下坡方向","任意方向"],answer:[0],explanation:"人员应朝远离火源、烟气未蔓延的方向疏散(通常通过人行横通道进入相邻非事故隧道)。"},{id:649,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道交通区域控制单元(ACU)通常设置在哪里？",options:["隧道内设备集中处(如横通道附近)","隧道入口外","收费站","监控中心"],answer:[0],explanation:"ACU(区域控制单元)分布在隧道内关键位置，采集附近设备数据并执行控制命令，是隧道监控系统的分布式控制节点。"},{id:650,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道入口前应设置什么交通控制设施？",options:["交通信号灯和可变信息标志","仅标志牌","仅照明","仅护栏"],answer:[0],explanation:"隧道入口前应设交通信号灯(控制车辆进入)、可变信息标志(发布前方信息)、车道指示器等控制设施。"},{id:686,type:"single",category:"公路交通安全",difficulty:2,question:"桥梁护栏防护等级选取时，高事故严重程度(跨越公路/铁路/水源保护区)对应什么等级？",options:["根据公路等级和设计速度确定：高速120km/h为六(SS)级","统一为HA级","统一为C级","与路侧护栏相同"],answer:[0],explanation:"桥梁护栏高等级按道路等级和速度选取：高速120km/h→六(SS)级；100/80→五(SA)级；一级→四(SB)级。特殊桥梁HA级。"},{id:687,type:"single",category:"公路交通安全",difficulty:2,question:"交通标志结构设计时需考虑什么荷载？",options:["风荷载(30年一遇10min平均最大风速)","仅自重","仅雪荷载","仅地震荷载"],answer:[0],explanation:"标志结构设计主要考虑风荷载(30年一遇10min平均最大风速)、自重及可能的雪荷载、地震荷载等。"},{id:688,type:"single",category:"公路交通安全",difficulty:2,question:"防眩板的高度设计主要取决于什么因素？",options:["车辆前照灯高度和道路纵断面线形","路面宽度","设计速度","交通量"],answer:[0],explanation:"防眩板高度由对向车辆前照灯高度、道路纵断面(凹形竖曲线)和横断面(中央分隔带宽度)综合确定。"},{id:689,type:"single",category:"公路交通安全",difficulty:3,question:"波形梁护栏的防护能量与什么因素有关？",options:["护栏等级(结构尺寸和材料强度)","仅护栏长度","仅立柱间距","仅波形板厚度"],answer:[0],explanation:"防护能量取决于护栏等级，由波形板截面尺寸、材料强度、立柱尺寸和间距、横梁数量等结构参数共同决定。"},{id:690,type:"single",category:"公路交通安全",difficulty:1,question:"交通标志按光学特性分为？",options:["反光标志和照明标志","仅反光标志","仅照明标志","LED标志和传统标志"],answer:[0],explanation:"按光学特性：反光标志(使用反光材料，被动发光)和照明标志(主动发光，内部或外部照明)。高速多用反光标志。"},{id:691,type:"single",category:"公路交通安全",difficulty:2,question:"防眩设施设置的主要目的是？",options:["避免对向车辆前照灯产生眩光，保障夜间行车安全","美化路容","降低噪声","隔离车道"],answer:[0],explanation:"防眩设施防止对向车灯产生的眩目光(disability glare和discomfort glare)，减少夜间事故。"},{id:692,type:"single",category:"公路交通安全",difficulty:2,question:"交通安全评价中，事故多发点(黑点)的识别通常依据什么？",options:["事故频率和事故率超过特定阈值","路段长度","交通量","设计速度"],answer:[0],explanation:"事故黑点识别常用方法：事故频率法(≥N次/年)、事故率法(每百万车公里事故率)、等效财产损失法等。"},{id:693,type:"single",category:"公路交通安全",difficulty:2,question:"我国高速公路交通事故的最主要成因是？",options:["人的因素(驾驶员操作不当/超速/疲劳)","车辆故障","道路条件","天气因素"],answer:[0],explanation:"交通事故成因中人-车-路-环境四要素中，人的因素占比最高(驾驶员因素占80%以上)。"},{id:694,type:"single",category:"公路交通安全",difficulty:1,question:"交通标线中，黄色虚线表示？",options:["允许临时跨越(对向车流)","禁止跨越","仅供非机动车","停车线"],answer:[0],explanation:"黄色虚线用于分隔对向车流，允许在安全情况下临时跨越(超车或左转)。黄色实线则表示禁止跨越。"},{id:695,type:"single",category:"公路交通安全",difficulty:3,question:"路侧安全净区(Clear Zone)的概念是？",options:["行车道边缘以外无障碍的可通行区域，用于失控车辆安全恢复","路面范围","路肩范围","边坡范围"],answer:[0],explanation:"路侧安全净区(净区)是行车道边缘以外无障碍的平坦可通行区域，允许失控车辆安全减速或恢复控制。是宽容设计理念的体现。"},{id:721,type:"single",category:"公路工程技术标准",difficulty:2,question:"JTG B01-2014中，公路服务水平六级(强制流)的特征是？",options:["交通流处于走走停停状态，排队现象严重","自由流，驾驶自由度高","稳定流，稍有延误","交通流完全停止"],answer:[0],explanation:"六级(强制流)：走走停停，排队严重，车辆经常停止，是服务水平最差状态。与五级相比，六级已出现周期性停车。"},{id:722,type:"single",category:"公路工程技术标准",difficulty:2,question:"设计速度120km/h的公路，最大纵坡一般不大于？",options:["3%","5%","7%","10%"],answer:[0],explanation:"120km/h最大纵坡一般3%；100km/h→4%；80km/h→5%；60km/h→6%；40km/h→7%。速度越低允许纵坡越大。"},{id:723,type:"single",category:"公路工程技术标准",difficulty:2,question:"公路弯道超高的作用是？",options:["平衡车辆在弯道行驶时受到的离心力","增加路面摩擦","改善排水","美化线形"],answer:[0],explanation:"超高(路面横坡)将弯道路面内侧抬高，利用车辆重力的向心分力平衡部分离心力，提高弯道行车安全性和舒适性。"},{id:724,type:"single",category:"交通管理与控制",difficulty:2,question:"交叉口进口道拓宽(增加车道)的主要目的是？",options:["增加进口道通行能力，减少排队长度","增加出口道通行能力","拓宽人行道","减少交叉口面积"],answer:[0],explanation:"进口道拓宽增加停车线处的车道数，提高单位时间内通过交叉口的车辆数，减少排队长度和延误。"},{id:725,type:"single",category:"交通管理与控制",difficulty:2,question:"城市交通拥堵治理的综合策略不包括？",options:["仅增加道路供给","交通需求管理","公交优先","智能交通系统"],answer:[0],explanation:"拥堵治理需综合施策：TDM减少需求、公交优先转移方式、ITS提高效率、适度增加供给等。单一策略效果有限。"},{id:726,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"气象检测器通常检测什么参数？",options:["能见度、风速风向、路面温度、降雨/雪量等","仅温度","仅风向","仅雨量"],answer:[0],explanation:"气象检测器检测：能见度(雾)、风速/风向、路面温度(结冰)、降水类型和强度等，为交通管控提供气象依据。"},{id:727,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"高速公路服务区等级通常按什么划分？",options:["服务功能和规模(综合服务区、停车区等)","仅按面积","仅按停车位","仅按餐厅大小"],answer:[0],explanation:"服务区按功能和规模分为：综合服务区(加油/餐饮/住宿/维修)、一般服务区(加油/简餐)、停车区(仅停车休息)。"},{id:728,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道洞口外应设置什么设施以减少黑洞效应？",options:["减光设施(如遮光棚)","增加照明","关闭照明","无特殊设施"],answer:[0],explanation:"洞口减光设施(遮光棚/格栅)降低洞口附近亮度，缩小洞内外亮度差，减轻黑洞效应和白洞效应。"},{id:729,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道内人行横通道间距一般不大于？",options:["250~500m","100m","1000m","50m"],answer:[0],explanation:"人行横通道间距一般250~500m(根据隧道等级和长度)，确保人员在火灾紧急情况下能及时到达安全通道。"},{id:730,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道内车行横通道间距一般不大于？",options:["750~1000m","250m","500m","1500m"],answer:[0],explanation:"车行横通道间距一般750~1000m，供紧急情况下车辆转移和救援车辆通行。间距设置需满足消防救援要求。"},{id:731,type:"single",category:"公路交通安全",difficulty:2,question:"波形梁护栏的防护面(朝向车道一侧)应？",options:["光滑连续，无突出物","粗糙","有尖角","任意形状"],answer:[0],explanation:"护栏防护面(车辆可能碰撞面)应光滑连续无突出物，避免碰撞时钩挂车辆或造成额外伤害。"},{id:732,type:"single",category:"公路交通安全",difficulty:2,question:"道路照明设置的主要目的不包括？",options:["增加道路通行能力","提高夜间行车安全","改善视觉环境","降低夜间事故率"],answer:[0],explanation:"道路照明主要提高夜间安全(减少事故)、改善视觉环境。增加通行能力不是照明设计的直接目的。"},{id:733,type:"single",category:"交通管理与控制",difficulty:3,question:"信号交叉口的通行能力计算中，某相位通行能力Cp的计算公式为？",options:["Cp = S × (g/C)，其中S为饱和流量，g/C为绿信比","Cp = S × C","Cp = q × C","Cp = S + g"],answer:[0],explanation:"相位通行能力Cp=饱和流率S×绿信比(g/C)=S×有效绿灯时间/周期时长。即该相位单位时间内能通过的最大车辆数。"},{id:734,type:"single",category:"交通流理论",difficulty:2,question:"交通波停留在原地(ω=0)的条件是？",options:["上下游流量相等(q1=q2)","上下游密度相等","流量为零","密度为零"],answer:[0],explanation:"ω=(q2-q1)/(k2-k1)，当q1=q2时ω=0(波不移动)。但此时如果k1≠k2，说明处于同一流量下的两种密度状态。"},{id:735,type:"single",category:"交通管理与控制",difficulty:2,question:"交叉口左转导流线的作用是？",options:["引导左转车辆按规定的路线和轨迹行驶","禁止左转","增加左转车道","增加左转信号"],answer:[0],explanation:"左转导流线在交叉口内标出左转车辆的行驶轨迹，帮助驾驶员按正确路线左转，避免侵占对向车道。"},{id:736,type:"single",category:"公路工程技术标准",difficulty:2,question:"公路选线的基本原则不包括？",options:["仅考虑最短距离","安全、舒适、经济、环保","与地形地物协调","满足设计速度要求"],answer:[0],explanation:"选线原则综合考虑安全、舒适、经济、环保、与地形协调等，不能仅追求最短距离(可能导致大填大挖)。"},{id:737,type:"single",category:"公路工程技术标准",difficulty:2,question:"加宽(弯道加宽)的作用是？",options:["保证车辆在弯道上行驶时不侵占相邻车道","增加道路宽度","美观","排水"],answer:[0],explanation:"汽车在弯道上行驶时前后轮轨迹不同(内轮差)，需加宽车道以保证车辆不侵占相邻车道或驶出路外。半径越小加宽越大。"},{id:738,type:"single",category:"高速公路交通工程通用规范",difficulty:3,question:"ETC自由流收费(多车道自由流)是指？",options:["主线设置龙门架实现不停车多车道同时收费","所有车道关闭","人工逐一收费","仅在匝道收费"],answer:[0],explanation:"多车道自由流ETC在主线路段设置龙门架，车辆以正常速度通过时完成收费(无需减速)，是ETC技术的升级。"},{id:739,type:"single",category:"交通管理与控制",difficulty:2,question:"全红清空时间的计算依据是？",options:["交叉口宽度/清空速度+车辆长度/清空速度","周期长度","绿灯时间","红灯时间"],answer:[0],explanation:"全红清空时间=(交叉口宽度+车辆长度)/清空速度，确保上一相位进入交叉口的车辆在下一相位车辆到达冲突点前清空。"},{id:740,type:"single",category:"公路交通安全",difficulty:1,question:"警告标志(三角形)的边长根据什么确定？",options:["设计速度：速度越高，边长越大","交通量","车道数","道路长度"],answer:[0],explanation:"警告标志尺寸与设计速度有关：速度越高需要越大的标志以保证足够的视认距离。120km/h需最大尺寸。"},{id:741,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道内灭火器的设置间距一般不大于？",options:["50m","25m","100m","200m"],answer:[0],explanation:"隧道灭火器设置间距一般不宜大于50m(与手动报警按钮间距一致)，确保火灾初期能够快速取用。"},{id:742,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道通风方式中，半横向通风的特点是什么？",options:["设送风道或排风道中的一种，另一种利用隧道空间","同时设送风道和排风道","不需要风道","仅依赖自然风"],answer:[0],explanation:"半横向通风设送风道或排风道其一，另一种利用隧道断面，介于全横向通风和纵向通风之间。"},{id:743,type:"single",category:"公路交通安全",difficulty:2,question:"路面标线用玻璃珠的作用是？",options:["产生回归反射，提高夜间标线可见性","增加标线摩擦力","标线着色","填充标线厚度"],answer:[0],explanation:"玻璃珠(反光珠)嵌入标线表面，利用其回归反射特性将车灯光线反射回驾驶员方向，大幅提高夜间标线视认性。"},{id:744,type:"single",category:"交通管理与控制",difficulty:2,question:"交通控制系统中的检测器布设原则不包括？",options:["检测器越多越好，无限制增加","设置在需要检测交通参数的关键位置","考虑检测精度和覆盖范围","考虑维护便利性"],answer:[0],explanation:"检测器应设在关键位置(进口道、匝道等)，平衡检测需求和成本，确保可维护性。并非越多越好。"},{id:745,type:"single",category:"交通管理与控制",difficulty:2,question:"高速公路交通事件检测算法通常基于什么原理？",options:["检测交通流参数的突变(流量、占有率、速度变化)","车辆识别","牌照比对","人工报告"],answer:[0],explanation:"事件自动检测(AID)算法分析检测器数据的异常变化模式(如占有率突增、速度骤降)来推断可能发生的事件(事故/拥堵)。"},{id:746,type:"single",category:"交通管理与控制",difficulty:3,question:"信号交叉口Webster延误公式中，均匀延误项的计算公式为？",options:["d1 = 0.5C(1-λ)^2/(1-λx)","d1 = C","d1 = 0.5λ","d1 = C/2"],answer:[0],explanation:"Webster模型中均匀延误d1=0.5C(1-λ)^2/(1-λx)，加上随机延误和过饱和延误修正得到总延误。C为周期，λ为绿信比，x为饱和度。"},{id:747,type:"single",category:"公路工程技术标准",difficulty:2,question:"公路项目安全性评价通常在什么阶段进行？",options:["设计阶段和运营阶段","仅施工阶段","仅竣工阶段","仅立项阶段"],answer:[0],explanation:"安全评价贯穿全周期：可行性研究阶段(初步)、设计阶段(详细)、运营前和运营后评价。JTG B01-2014强制要求二级及以上干线进行。"},{id:748,type:"single",category:"公路隧道设计规范",difficulty:3,question:"隧道照明节能措施不包括？",options:["全天开启最大亮度","分级调光控制","采用LED灯具","洞口减光降低入口段亮度需求"],answer:[0],explanation:"节能措施：分级调光(按需调光)、LED灯具(高效节能)、洞口减光(降低入口亮度需求)、清洁维护(保持灯具效率)等。全天最大亮度会浪费能源。"},{id:749,type:"single",category:"公路交通安全",difficulty:2,question:"交通标志的反光膜等级(如I~V类)主要区别在于？",options:["反光亮度(逆反射系数)不同","颜色不同","尺寸不同","形状不同"],answer:[0],explanation:"反光膜按逆反射系数(反光亮度)分为不同等级(如I至V类或钻石级)，等级越高反光性能越好，适用条件越严苛。"},{id:750,type:"single",category:"交通管理与控制",difficulty:2,question:"VMS可变信息标志的信息发布策略应遵循什么原则？",options:["简洁、及时、准确、可信","信息尽可能多","仅发布事故信息","仅发布天气信息"],answer:[0],explanation:"VMS信息发布原则：简洁(快速阅读)、及时(实时性)、准确(避免误导)、可信(避免狼来了效应)。过多的文字反而降低效果。"},{id:751,type:"judge",category:"公路工程技术标准",difficulty:1,question:"高速公路与所有等级公路相交必须设置立体交叉。",options:["正确","错误"],answer:[0],explanation:"正确。高速公路与其他等级公路相交必须设互通式或分离式立体交叉。"},{id:752,type:"judge",category:"交通管理与控制",difficulty:2,question:"Webster延误公式适用于过饱和交叉口(x≥1)。",options:["正确","错误"],answer:[1],explanation:"错误。Webster公式基于未饱和条件(Y<1)，过饱和时不适用(延误趋于无穷)。"},{id:753,type:"judge",category:"公路交通安全",difficulty:1,question:"路侧安全净区的概念体现了宽容设计理念。",options:["正确","错误"],answer:[0],explanation:"正确。路侧净区允许失控车辆安全恢复控制，体现了驾驶员的过错不应以生命为代价的宽容设计理念。"},{id:754,type:"judge",category:"公路隧道设计规范",difficulty:2,question:"隧道消防设施中消火栓系统在所有隧道都必须设置。",options:["正确","错误"],answer:[1],explanation:"错误。A+和A级必须设消火栓，B级宜设，C/D级不作要求。L<500m高速隧道可不设。"},{id:755,type:"judge",category:"高速公路交通工程通用规范",difficulty:2,question:"收费岛宽度为2.2m。",options:["正确","错误"],answer:[0],explanation:"正确。收费岛宽2.2m，侧面高0.30m。收费车道宽3.2m。"},{id:756,type:"judge",category:"公路工程技术标准",difficulty:2,question:"竖曲线分为凸形竖曲线和凹形竖曲线。",options:["正确","错误"],answer:[0],explanation:"正确。竖曲线按形状分为凸形(上凸)和凹形(下凹)两种。"},{id:757,type:"judge",category:"交通管理与控制",difficulty:1,question:"交叉口全红时间是所有方向均为红灯的时间。",options:["正确","错误"],answer:[0],explanation:"正确。全红时间是所有相位均显示红灯的时间段，用于清空交叉口内的滞留车辆。"},{id:758,type:"judge",category:"公路交通安全",difficulty:1,question:"白色虚线分隔同向车流，允许在安全情况下变换车道。",options:["正确","错误"],answer:[0],explanation:"正确。白色虚线用于同向车道分隔，允许变换车道。白色实线则禁止变道。"},{id:759,type:"judge",category:"公路隧道设计规范",difficulty:2,question:"隧道内人行横通道是供行人日常通行的通道。",options:["正确","错误"],answer:[1],explanation:"错误。人行横通道主要供火灾等紧急情况下人员疏散使用，非日常通行。"},{id:760,type:"judge",category:"高速公路交通工程通用规范",difficulty:2,question:"通信光电缆必须敷设在通信管道内。",options:["正确","错误"],answer:[0],explanation:"正确。光电缆必须敷设在通信管道内，提供物理保护和便于维护更换。"},{id:761,type:"single",category:"公路工程技术标准",difficulty:2,question:"公路设计时使用第30位小时交通量的原因是？",options:["经济合理——全年仅29小时交通量超过设计值","最安全","最简单","交通量数据最准确"],answer:[0],explanation:"30HV兼顾需求和经济：若按最大小时设计则投资巨大但一年仅用1小时；按较低小时设计则过多时间拥堵。30位是经济合理的平衡点。"},{id:762,type:"single",category:"公路工程技术标准",difficulty:2,question:"路拱横坡的作用是？",options:["迅速排除路面水","提高车速","加强路面结构","美观"],answer:[0],explanation:"路拱将路面水迅速排向两侧边沟，防止积水导致水滑和路面损坏。"},{id:763,type:"single",category:"交通管理与控制",difficulty:2,question:"信号周期过短会导致什么问题？",options:["车辆频繁启停，增加延误和油耗损失时间比例高","排队消散","通行能力增加","安全提高"],answer:[0],explanation:"周期过短：损失时间占比高(频繁启停)、通行效率低、行人过街时间不足。周期过长：延误增大。需优化。"},{id:764,type:"single",category:"交通管理与控制",difficulty:3,question:"最大绿灯时间在感应控制中的作用是？",options:["防止某相位绿灯时间过长导致其他相位等待过久","保证最小绿灯","控制周期","计算绿信比"],answer:[0],explanation:"最大绿灯时间是感应控制的保护上限：即使该方向一直有车请求，绿灯也不会无限延长，保证其他相位的最小服务时间。"},{id:765,type:"single",category:"公路交通安全",difficulty:2,question:"高速公路护栏防护等级选用表中，事故严重程度为低的护栏等级通常为？",options:["三(A)级或二(B)级(根据设计速度)","六(SS)级","八(HA)级","一(C)级"],answer:[0],explanation:"低严重程度：高速120/100/80km/h→三(A/Am)级；一级60km/h→二(B/Bm)级；二级80/60→二(B)级。"},{id:766,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"高速公路交通工程设施管理设施可如何实施？",options:["总体规划、一次设计、分期实施","必须一次建成","分区域独立建设","先建后规划"],answer:[0],explanation:"管理设施可总体规划、一次设计、分期实施——根据交通量增长情况逐步完善升级。"},{id:767,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道照明灯具的防护等级(IP)应满足什么要求？",options:["防尘防水等级应适应隧道潮湿多尘环境(通常IP65及以上)","无特殊要求","仅防水","仅防尘"],answer:[0],explanation:"隧道内潮湿、多尘、有腐蚀性气体，灯具防护等级通常要求IP65及以上(防尘+防水喷射)。"},{id:768,type:"single",category:"公路隧道设计规范",difficulty:1,question:"以下哪项不属于隧道通风方式？",options:["自然通风","纵向通风","半横向通风","全横向通风"],answer:[0],explanation:"所有均为隧道通风方式。自然通风利用交通风压和自然风压；纵向通风用射流风机沿隧道方向通风；半横向/全横向设风道。此题选项全部属于通风方式。"},{id:769,type:"single",category:"公路交通安全",difficulty:3,question:"缆索护栏的主要缺点是什么？",options:["碰撞后维修复杂，不适合小半径曲线","防护能力弱","成本高","不美观"],answer:[0],explanation:"缆索护栏缺点：碰撞后维修复杂(需重新张拉缆索)、不适合小半径曲线(张力难保持)、端部需坚固锚固。优点：弹性好、适合不均匀沉降。"},{id:770,type:"single",category:"公路交通安全",difficulty:2,question:"中央分隔带开口处应设置什么设施？",options:["活动护栏(便于紧急情况下开启)","固定混凝土护栏","无任何设施","绿篱"],answer:[0],explanation:"中央分隔带开口处设活动护栏：平时封闭分隔对向交通，紧急情况(事故/养护)时可开启供车辆调头或通行。"},{id:771,type:"single",category:"交通管理与控制",difficulty:2,question:"交通控制中，通道控制(Corridor Control)与主线控制的主要区别是？",options:["通道控制在更大范围(含相邻道路)协调控制","两者完全相同","通道控制仅控制通道本身","通道控制不需要检测器"],answer:[0],explanation:"通道控制将控制范围从单条道路扩展到包含相邻平行道路的交通走廊，在路网层次实现流量均衡和整体优化。"},{id:772,type:"single",category:"交通管理与控制",difficulty:1,question:"以下哪个不是交通需求管理(TDM)措施？",options:["拓宽道路增加车道数","错时上下班","停车收费","拥堵收费"],answer:[0],explanation:"拓宽道路属于增加供给(TSM/SSM)，非TDM。TDM通过价格杠杆(停车/拥堵收费)、行政手段(错时)、替代方式(公交)管理需求。"},{id:773,type:"single",category:"公路工程技术标准",difficulty:2,question:"公路路基宽度是指？",options:["行车道+路肩+中央分隔带(整体式)的总宽度","仅行车道宽度","仅路面宽度","仅土路肩外边缘距离"],answer:[0],explanation:"路基宽度=行车道宽度+路肩宽度+中央分隔带宽度(如有)。2014版取消了路基总宽度指标值的刚性规定。"},{id:774,type:"single",category:"交通管理与控制",difficulty:2,question:"信号交叉口左转专用车道长度的设计应根据什么？",options:["左转排队长度(防止排队溢出至直行车道)","仅左转车数量","仅信号周期","仅车道宽度"],answer:[0],explanation:"左转专用道长度应能容纳左转排队车辆(通常取95%或98%分位的排队长度)，防止溢出阻塞直行车道。"},{id:775,type:"single",category:"交通流理论",difficulty:2,question:"车辆通过无信号交叉口的可接受间隙模型中，次路通行能力主要取决于？",options:["主路车流的车头时距分布和次路车辆的临界间隙","次路车辆类型","交叉口大小","路面条件"],answer:[0],explanation:"次路通行能力=主路流量×P(间隙>tc且>tf)，由主路车头时距分布、临界间隙tc和随车时距tf共同决定。"},{id:776,type:"single",category:"交通流理论",difficulty:3,question:"在跟驰模型中，交通流的线性稳定性分析主要关注？",options:["小扰动(速度波动)在车队中的传播是否被放大","车辆的最大速度","道路的最小半径","交通量的最大值"],answer:[0],explanation:"线性稳定性分析：当引导车速度产生小扰动时，该扰动沿车队传播是否被放大。稳定的交通流扰动会衰减；不稳定的会放大导致走走停停。"},{id:777,type:"single",category:"公路工程技术标准",difficulty:2,question:"设计速度80km/h的二级公路，圆曲线最小半径(一般值)约为？",options:["250~400m","50m","100m","800m"],answer:[0],explanation:"80km/h时圆曲线最小半径一般值约为250~400m(取决于超高值)。极限值更小但仅在困难条件下使用。"},{id:778,type:"single",category:"公路工程技术标准",difficulty:2,question:"JTG B01-2014中车辆荷载等级分为？",options:["公路-I级和公路-II级","A级和B级","重级和轻级","I级和II级和III级"],answer:[0],explanation:"荷载等级：公路-I级(高速/一级/二级)和公路-II级(三四级)。2014版将二级公路从II级提高到I级。"},{id:779,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道交通工程设施不包括以下哪项？",options:["路面结构层","标志标线","监控设备","消防设施"],answer:[0],explanation:"路面结构层属于土建工程(第一册内容)，不属于交通工程与附属设施(第二册内容)。"},{id:780,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道横通道门在正常情况下应保持？",options:["常闭状态(但不应锁死)","常开状态","半开状态","由传感器自动控制"],answer:[0],explanation:"横通道门正常时关闭(维持隧道通风和防火分区)，但不应锁死，以确保紧急情况下人员能迅速推开。"},{id:781,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"收费车道数设计应根据什么确定？",options:["预测交通量和每车道服务时间","仅预测交通量","仅道路等级","仅车道宽度"],answer:[0],explanation:"收费车道数=设计小时交通量×服务时间/3600/每车道利用系数。需满足排队长度和等待时间的服务水平要求。"},{id:782,type:"single",category:"交通管理与控制",difficulty:2,question:"感应信号控制中的初始绿灯时间(Minimum Green)的作用是？",options:["保证停在检测器和停车线之间的车辆能全部通过","延长绿灯","缩短红灯","计算周期"],answer:[0],explanation:"初始最小绿灯保证从检测器位置(距停车线一定距离)到停车线之间的排队车辆能够全部通过交叉口。"},{id:783,type:"single",category:"交通管理与控制",difficulty:2,question:"感应信号控制中的单位绿灯延长时间(Unit Extension)的作用是？",options:["检测器检测到后续车辆到达时延长绿灯时间","缩短绿灯","增加红灯","控制周期"],answer:[0],explanation:"单位延长时间(Gap Time)：在最小绿灯之后，每检测到一辆到达车辆就将绿灯延长一段时间，直到达到最大绿灯或检测不到车辆。"},{id:784,type:"single",category:"公路交通安全",difficulty:1,question:"隔离栅的设置目的是实现高速公路的什么管理？",options:["全封闭管理，阻止人畜进入","半封闭管理","开放管理","仅限制动物"],answer:[0],explanation:"隔离栅实现高速公路全封闭，阻止行人、非机动车和动物进入高速公路范围，保障高速行车安全。"},{id:785,type:"single",category:"公路交通安全",difficulty:2,question:"桥梁护栏与路基护栏的过渡段设计关键是什么？",options:["刚度平缓过渡，避免出现防护薄弱环节","直接连接","断开连接","仅设警示标志"],answer:[0],explanation:"过渡段需将桥梁刚性护栏与路基半刚性护栏的刚度平缓过渡，确保碰撞时车辆不被绊阻或穿越。过渡段防护等级不低于两者中较低者。"},{id:786,type:"single",category:"交通流理论",difficulty:2,question:"道路通行能力手册(HCM)中，理想条件下的饱和车头时距约为？",options:["1.8~2.2秒","0.5~1.0秒","3.0~4.0秒","5.0~6.0秒"],answer:[0],explanation:"理想条件下(车道宽3.6m,无重型车,熟练驾驶员)饱和车头时距约1.8~2.2秒，对应饱和流率约1600~2000pcu/h/车道。"},{id:787,type:"single",category:"公路工程技术标准",difficulty:3,question:"高速公路设计速度为120km/h时，凸形竖曲线最小半径(一般值)约为？",options:["17000~20000m","5000m","3000m","40000m"],answer:[0],explanation:"120km/h时凸形竖曲线最小半径一般值约17000~20000m(满足停车视距要求)。设计速度越高，竖曲线半径要求越大。"},{id:788,type:"single",category:"高速公路交通工程通用规范",difficulty:3,question:"省界联合收费站服务时间最长(20~26s)的主要原因是？",options:["需要处理跨省收费标准和结算差异","车辆更多","人员效率低","设备更差"],answer:[0],explanation:"省界收费站需处理不同省份收费费率转换、费用拆分结算等复杂流程，因此服务时间比一般收费站长。"},{id:789,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道照明LED灯具相比传统高压钠灯的主要优势是？",options:["节能、长寿命、可调光、显色性好","亮度更低","成本更低","安装更复杂"],answer:[0],explanation:"LED优势：高效节能(节电40-60%)、寿命长(5-10万小时)、可无级调光(适应照明控制)、显色指数高(视觉清晰度好)。缺点是初期投资较高。"},{id:790,type:"single",category:"交通管理与控制",difficulty:2,question:"城市交通控制中，子区(Sub-area)划分的主要依据是？",options:["交叉口间的关联度(交通流相关性)","行政区划","道路名称","交通量"],answer:[0],explanation:"子区划分基于交叉口间交通流的相关程度(如上游出口流量与下游进口流量的关联)，关联度高的交叉口划入同一子区进行协调控制。"},{id:791,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道内CO浓度检测器通常采用什么原理？",options:["电化学或红外吸收原理","温度检测","压力检测","湿度检测"],answer:[0],explanation:"CO检测器常用电化学传感器或非分散红外(NDIR)原理，通过CO分子对特定波长红外光的吸收来测量浓度。"},{id:792,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道内能见度(VI)检测器的工作原理基于？",options:["光透过率测量(消光系数)","雷达反射","超声波","温度差"],answer:[0],explanation:"VI检测器通过测量光束在隧道内经过一定距离后的衰减(消光系数K)来评估能见度，单位m^-1。"},{id:793,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道风速风向检测器通常采用什么技术？",options:["超声波时差法","机械风速计","热电偶","压力计"],answer:[0],explanation:"隧道风速风向检测器常用超声波时差法(测量顺风和逆风方向声速差)，非接触式、精度高、免维护。"},{id:794,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道火灾工况下通风排烟的首要目标是？",options:["保障人员安全疏散","保护隧道结构","减少财产损失","维持交通"],answer:[0],explanation:"火灾通风排烟的首要目标是保障人员安全疏散(控制烟气不蔓延至疏散通道)，其次是保护结构和便于消防救援。"},{id:795,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道照明控制中，天气晴朗时洞外亮度过高应采取什么措施？",options:["适当提高入口段和过渡段亮度","降低所有照明","关闭照明","仅开启出口段照明"],answer:[0],explanation:"晴天洞外亮度L20(S)值高，入口段和过渡段亮度需相应提高以缓解黑洞效应，使驾驶员眼睛能够逐渐适应。"},{id:796,type:"single",category:"公路隧道设计规范",difficulty:3,question:"隧道内射流风机的推力与风机出口风速的关系是？",options:["推力与出口风速的平方成正比","推力与风速成正比","推力与风速无关","推力与风速成反比"],answer:[0],explanation:"射流风机推力F=ρ×Q×ΔV=ρ×A×V×(V-Vt)，近似与出口风速V的平方成正比。提高风速可显著增加推力。"},{id:797,type:"single",category:"公路隧道设计规范",difficulty:1,question:"以下哪个是隧道交通工程设施配置的最低等级？",options:["D级","C级","B级","A级"],answer:[0],explanation:"配置等级从高到低：A+→A→B→C→D。D级适用于短隧道+小交通量，设施配置最少。"},{id:798,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道火灾自动报警系统中，双波长火焰探测器的原理是？",options:["检测火焰特有的紫外和红外波段辐射","检测烟雾浓度","检测温度升高","检测CO浓度变化"],answer:[0],explanation:"双波长探测器同时监测紫外(UV)和红外(IR)波段，利用火焰特有的辐射频谱特征与干扰光源区分，减少误报。"},{id:799,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道洞口减光建筑(遮光棚)的主要作用是？",options:["降低洞口附近的亮度，减小洞内外亮度差","完全封闭洞口","增加照明","装饰洞口"],answer:[0],explanation:"遮光棚通过半透明材料或格栅降低洞口附近亮度，使驾驶员从高亮度的洞外逐渐过渡到暗环境，减轻黑洞效应。"},{id:800,type:"single",category:"公路隧道设计规范",difficulty:3,question:"隧道纵向通风的适用范围受什么因素限制？",options:["隧道长度——过长时污染物累积浓度超标","交通量","设计速度","路面类型"],answer:[0],explanation:"纵向通风利用隧道断面作为风道，随隧道增长污染物从入口到出口逐渐累积，过长隧道出口处空气品质可能不达标。"},{id:801,type:"single",category:"公路交通安全",difficulty:1,question:"交通标志的构造一般包括？",options:["标志板、支撑结构和基础","仅标志板","仅支撑结构","标志板和反光膜"],answer:[0],explanation:"交通标志构造由标志板(含反光面)、支撑结构(立柱/横梁等)和基础(混凝土基础)三部分组成。"},{id:802,type:"single",category:"公路交通安全",difficulty:2,question:"交通标线的反光原理是？",options:["标线中的玻璃珠将车灯光线反射回驾驶员方向","标线本身发光","标线荧光","标线吸光后发光"],answer:[0],explanation:"标线表面嵌入的玻璃珠具有回归反射特性，能将车灯入射光沿接近原方向反射回去，使驾驶员在夜间清晰看到标线。"},{id:803,type:"single",category:"公路交通安全",difficulty:2,question:"波形梁护栏立柱的埋入深度取决于？",options:["土基条件和设计防护等级","仅护栏高度","仅波形板厚度","仅立柱间距"],answer:[0],explanation:"立柱埋深由土基承载力(土质/压实度)和护栏防护等级(碰撞荷载)共同决定，保证碰撞时立柱不会拔出或过度倾斜。"},{id:804,type:"single",category:"公路交通安全",difficulty:1,question:"防眩板在凹形竖曲线路段的设置高度应？",options:["适当增加，以补偿线形造成的眩光暴露","降低","保持不变","取消设置"],answer:[0],explanation:"凹形竖曲线路段对向车灯可能越过防眩板顶部产生眩光，应适当增加防眩板高度以补偿线形变化。"},{id:805,type:"single",category:"公路交通安全",difficulty:2,question:"缆索护栏端部锚固的重要性在于？",options:["缆索需通过锚固系统保持张力以发挥防护功能","美观","降低成本","方便安装"],answer:[0],explanation:"缆索护栏依靠缆索的张力吸收碰撞能量，端部锚固系统必须足够坚固(通常为混凝土基础)，确保碰撞时缆索不会松脱。"},{id:806,type:"single",category:"公路交通安全",difficulty:2,question:"高速公路右侧路侧护栏的设置原则是？",options:["根据填土高度、边坡坡度和路侧危险程度综合判断","所有路段统一设置","仅在桥梁段设置","仅在弯道段设置"],answer:[0],explanation:"路侧护栏非全线统一设置，根据事故严重程度(低/中/高)按填土高度、边坡坡度、路侧障碍物等逐段判断是否需设。"},{id:807,type:"single",category:"公路交通安全",difficulty:2,question:"交通安全设施中，属于主动诱导的设施是？",options:["轮廓标和线形诱导标","护栏","防撞垫","隔离栅"],answer:[0],explanation:"主动诱导设施(轮廓标/线形诱导标等)通过光学引导帮助驾驶员预知道路走向，属于主动安全。护栏/防撞垫是被动防护。"},{id:808,type:"single",category:"公路交通安全",difficulty:2,question:"波形梁护栏的横梁中心高度设计主要考虑？",options:["与大多数车辆(尤其小客车)的重心高度匹配","仅与货车匹配","仅与护栏立柱匹配","任意高度"],answer:[0],explanation:"横梁中心高度(通常60-75cm)需与多数车辆重心/保险杠高度匹配，确保碰撞时能有效引导车辆而非绊阻或翻越。"},{id:809,type:"single",category:"公路交通安全",difficulty:2,question:"交通标志设置位置应满足什么要求？",options:["足够的视认距离和反应时间","任何位置均可","仅道路右侧","仅道路左侧"],answer:[0],explanation:"标志设置位置需保证驾驶员有足够的视认距离(发现→阅读→理解→反应→操作)，通常设置在行车方向右侧。"},{id:810,type:"single",category:"公路交通安全",difficulty:3,question:"在长大下坡路段，护栏防护等级应如何调整？",options:["至少提高1个等级","降低1个等级","保持不变","降低2个等级"],answer:[0],explanation:"纵坡等于或接近最大纵坡值的下坡路段，因车辆制动失效风险增大、碰撞速度和能量增加，护栏应提高至少1个等级。"},{id:811,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"高速公路通信管道中，干线管道预留管孔的内径为？",options:["≥φ90mm","≥φ50mm","≥φ110mm","≥φ200mm"],answer:[0],explanation:"干线管道应预留≥2孔内径φ90mm以上的管孔，用于未来通信扩容和其他管线布设需求。"},{id:812,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"监控系统外场设备的供电设计应满足什么要求？",options:["可靠供电(一级或二级负荷)，关键设备配UPS","仅普通市电","太阳能供电","仅蓄电池"],answer:[0],explanation:"外场设备供电应可靠，关键设备配UPS不间断电源，保证市电中断时仍能维持一定时间运行(通常≥30min)。"},{id:813,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"高速公路收费系统的数据管理要求不包括？",options:["收费数据可随意修改","数据自动备份","数据安全传输","数据完整保存"],answer:[0],explanation:"收费数据不得随意修改(财务数据需审计追踪)，必须自动备份、安全传输、完整保存≥40天。"},{id:814,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"高速公路交通工程设施的分期实施原则是？",options:["土建工程一次建成，机电设备可根据交通量增长分期配置","全部一次建成不得分期","仅收费系统可分期","仅监控系统可分期"],answer:[0],explanation:"土建基础设施(管道/基础/机房)按远期(第20年)一次建成，机电设备可按近期(第5年)配置，后期升级改造。"},{id:815,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"车速反馈标志(Speed Feedback Sign)属于什么设施？",options:["信息发布设施(属于监控系统)","收费设施","通信设施","安全设施"],answer:[0],explanation:"车速反馈标志检测过往车辆速度并实时显示，提醒驾驶员注意控制车速，属于监控系统的信息发布设施。"},{id:816,type:"single",category:"高速公路交通工程通用规范",difficulty:3,question:"收费系统ETC车道的地感线圈作用不包括？",options:["电子收费扣费","检测车辆到达和离开","触发天线通信","车型辅助分类"],answer:[0],explanation:"地感线圈(车辆检测器)检测车辆到来/离开触发ETC天线通信，并辅助车型分类和计数。电子扣费由天线和后台完成。"},{id:817,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"通信管道在穿越桥梁时通常应？",options:["预埋在桥梁结构中或设置管道过桥设施","直接从桥面跨越","不需要特殊处理","使用无线替代"],answer:[0],explanation:"通信管道需在桥梁结构施工时预埋穿桥管道或设置桥侧管箱，保证光电缆连续敷设不受桥梁伸缩影响。"},{id:818,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路监控中心的显示设备不包括？",options:["收费计算机终端","大屏幕显示墙","CCTV监视器","操作员工作站显示器"],answer:[0],explanation:"收费计算机终端属于收费系统。监控中心显示设备：大屏显示墙、CCTV监视器、工作站显示器、地图板等。"},{id:819,type:"single",category:"公路工程技术标准",difficulty:2,question:"设计速度120km/h的高速公路，最大纵坡一般值为？",options:["3%","4%","5%","2%"],answer:[0],explanation:"120→3%；100→4%；80→5%；60→6%；40→7%；30→8%；20→9%。设计速度越高要求纵坡越小。"},{id:820,type:"single",category:"公路工程技术标准",difficulty:2,question:"设计速度100km/h时，圆曲线最小半径(极限值)约为？",options:["400~700m(取决于超高)","100m","1000m","2000m"],answer:[0],explanation:"100km/h时圆曲线最小半径极限值约400~700m(采用最大超高时)。一般值为极限值的1.5~2倍，推荐使用一般值。"},{id:821,type:"single",category:"公路工程技术标准",difficulty:3,question:"公路纵断面设计中的合成坡度是指？",options:["纵坡和横坡(超高)的矢量和","仅纵坡","仅横坡","纵坡与横坡之差"],answer:[0],explanation:"合成坡度=sqrt(i纵^2+i横^2)，反映路面实际的最大坡度。弯道超高路段合成坡度可能大于纵坡或横坡单独值。"},{id:822,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路路基的基本形式不包括？",options:["隧道式路基","路堤(填方路基)","路堑(挖方路基)","半填半挖路基"],answer:[0],explanation:"路基形式：路堤(填方)、路堑(挖方)、半填半挖。隧道不属于路基形式。"},{id:823,type:"single",category:"公路工程技术标准",difficulty:2,question:"公路设计车辆中的中型车尺寸主要用于确定什么？",options:["一般道路的平面和纵断面设计","仅桥梁设计","仅隧道设计","仅收费站设计"],answer:[0],explanation:"中型车代表一般载重汽车，其尺寸用于确定一般公路(非客车或汽车列车专用道路)的平纵横设计参数。"},{id:824,type:"single",category:"公路工程技术标准",difficulty:2,question:"公路路面结构设计年限一般取？",options:["沥青路面15年，水泥路面30年","两者均为10年","两者均为50年","沥青30年水泥15年"],answer:[0],explanation:"沥青混凝土路面设计年限一般15年(高速/一级)或10年(二级及以下)；水泥混凝土路面一般30年。"},{id:825,type:"single",category:"公路工程技术标准",difficulty:2,question:"JTG B01-2014规定，高速公路的服务水平设计标准是在什么条件下？",options:["设计年限末年的预测交通量下不低于三级服务水平","任何条件下均为一级服务水平","施工期间的服务水平","开通初期的服务水平"],answer:[0],explanation:"高速公路在预测的设计年限末年交通量条件下，服务水平不应低于三级(一般为二级)。不是按开通初期确定。"},{id:826,type:"single",category:"交通管理与控制",difficulty:2,question:"快速路入口匝道汇入控制的目的是？",options:["防止匝道车辆无序汇入导致主线交通流紊乱和拥堵","加快匝道通行速度","增加匝道排队长度","减少匝道数量"],answer:[0],explanation:"入口匝道控制通过调节汇入流率，使主线交通流保持稳定(避免流量超过通行能力)，防止拥堵形成或恶化。"},{id:827,type:"single",category:"交通管理与控制",difficulty:2,question:"信号交叉口相位数增加会导致？",options:["损失时间增加，周期可能变长","通行能力大幅增加","延误减少","绿灯时间增加"],answer:[0],explanation:"相位越多，每个周期的总损失时间(各相位起动损失+全红时间)越多，周期可能变长，单个相位的有效绿灯时间减少。"},{id:828,type:"single",category:"交通管理与控制",difficulty:2,question:"道路交通噪声的主要来源是？",options:["车辆发动机、轮胎/路面接触噪声和空气动力噪声","行人交谈","交通信号灯","道路绿化"],answer:[0],explanation:"交通噪声主要来源：发动机噪声(低速时)、轮胎-路面噪声(中高速时)和空气动力噪声(高速时)。轮胎-路面噪声在>50km/h时占主导。"},{id:829,type:"single",category:"交通管理与控制",difficulty:2,question:"VMS(可变信息标志)在雾天的使用策略是？",options:["发布限速和雾天预警信息，提醒驾驶员减速","关闭VMS","正常显示","发布与天气无关的信息"],answer:[0],explanation:"雾天VMS应发布能见度预警和临时限速信息，配合雾区诱导设施(如雾灯)使用，提高低能见度下的行车安全性。"},{id:830,type:"single",category:"交通管理与控制",difficulty:2,question:"信号交叉口评价中，平均停车率是指？",options:["每辆车通过交叉口时平均停车次数","停车车辆占总车辆的比例","每周期停车车辆数","平均停车时间"],answer:[0],explanation:"平均停车率=总停车次数/总车流量，取值0~1。理想绿波带时停车率接近0(车队连续通过)，过饱和时接近1(每车都停)。"},{id:831,type:"single",category:"交通流理论",difficulty:1,question:"第30位小时交通量的另一种表示方式是？",options:["DHV(Design Hourly Volume)","AADT","PHV","MADT"],answer:[0],explanation:"30HV=DHV=K×AADT。是道路设计中最常用的设计小时交通量指标。"},{id:832,type:"single",category:"交通流理论",difficulty:2,question:"排队论在交通工程中常用于分析？",options:["交叉口延误和排队长度","自由流速度","道路线形设计","路面结构设计"],answer:[0],explanation:"排队论用于分析信号交叉口、收费站、服务区等处的车辆排队行为(M/M/1、M/D/1等模型)，计算平均排队长度和延误。"},{id:833,type:"single",category:"交通流理论",difficulty:3,question:"M/M/1排队模型中，第一个M表示车辆到达服从什么分布？",options:["泊松分布(负指数到达间隔)","正态分布","均匀分布","确定型分布"],answer:[0],explanation:"M/M/1：M=马尔可夫(泊松到达/负指数车头时距)，M=服务时间服从负指数分布(马尔可夫)，1=单服务台。"},{id:834,type:"single",category:"交通流理论",difficulty:2,question:"高速公路基本路段通行能力分析中，15分钟流率用于？",options:["与小时通行能力比较，分析短期过载情况","代替小时交通量","计算日交通量","计算月交通量"],answer:[0],explanation:"用15分钟流量×4折算小时流率，与小时通行能力比较。即使小时流量未超通行能力，15分钟流率可能超限导致短期拥堵。"},{id:835,type:"single",category:"交通流理论",difficulty:2,question:"匝道连接处的通行能力通常低于基本路段，原因是？",options:["匝道区域存在交织、合流和分流等复杂驾驶行为","匝道路面较窄","匝道设计速度低","匝道长度不足"],answer:[0],explanation:"匝道连接处(合流区/分流区/交织区)因车辆频繁换道、速度调整和相互干扰，通行能力低于基本路段。"},{id:841,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道内人行横通道门应具有什么功能？",options:["防火和易于开启","防盗","美观","隔音"],answer:[0],explanation:"横通道门应具有防火性能(防止火灾蔓延)且易于人力推开(不应锁死)，确保紧急疏散时畅通。"},{id:842,type:"single",category:"公路隧道设计规范",difficulty:3,question:"特长隧道(>3000m)通常需要设置什么特殊通风方式？",options:["分段纵向通风+竖井或斜井排风","仅入口设置风机","自然通风","仅出口设置风机"],answer:[0],explanation:"特长隧道采用分段纵向通风：通过竖井或斜井将隧道分为若干通风段，利用竖井分段送风排风，控制每段长度在允许范围内。"},{id:843,type:"single",category:"公路交通安全",difficulty:1,question:"交通标志的夜间视认性主要通过什么方式保证？",options:["反光膜(被动反光)或内部/外部照明","仅靠车灯照亮","标志本身发光","依靠路灯"],answer:[0],explanation:"标志通过高等级反光膜(被动反射车灯光线)实现夜间视认。重要标志可采用主动发光(LED内部照明或外部投射照明)。"},{id:844,type:"single",category:"公路交通安全",difficulty:2,question:"波形梁护栏最小结构长度(二级公路)为？",options:["48m","70m","28m","100m"],answer:[0],explanation:"波形梁护栏最小长度：高速/一级70m，二级48m，三四级28m。小于此长度时护栏端部效应影响整体防护。"},{id:845,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"监控系统外场设备数据传输通常采用什么方式？",options:["光纤通信或无线通信","人工抄送","邮寄","语音通报"],answer:[0],explanation:"外场设备通过光缆(主要)或无线(辅助)将数据传输至监控中心。光缆传输稳定可靠、带宽大，是主要方式。"},{id:846,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路上设置服务区的主要目的是？",options:["为驾驶员和乘客提供休息、加油、餐饮等服务","增加收入","展示广告","设置收费站"],answer:[0],explanation:"服务区为长途行驶的驾驶员提供休息(防疲劳驾驶)、车辆加油/充电、餐饮、卫生间等基本服务。"},{id:847,type:"single",category:"交通管理与控制",difficulty:2,question:"交叉口左转车道长度不足时会导致？",options:["左转排队溢出阻塞直行车道","左转车流量减少","直行车流量增加","信号周期缩短"],answer:[0],explanation:"左转专用道长度不足时，左转排队车辆超出专用道尾端，阻塞相邻直行车道，降低交叉口整体通行效率。"},{id:848,type:"single",category:"交通管理与控制",difficulty:2,question:"干线协调控制中关键交叉口的概念是？",options:["限制绿波带宽度的瓶颈交叉口","交通量最大的交叉口","车道最多的交叉口","离控制中心最近的交叉口"],answer:[0],explanation:"关键交叉口是系统内对绿波带宽度形成瓶颈的交叉口(通常绿信比最小)，其通行时间窗口决定了整个绿波系统的带宽。"},{id:849,type:"single",category:"公路工程技术标准",difficulty:2,question:"设计速度60km/h时最大纵坡一般值为？",options:["6%","4%","5%","8%"],answer:[0],explanation:"设计速度与最大纵坡关系：120→3%,100→4%,80→5%,60→6%,40→7%,30→8%,20→9%。"},{id:850,type:"single",category:"公路工程技术标准",difficulty:2,question:"公路路基宽度不包括以下哪个部分？",options:["边沟以外的用地","行车道","路肩","中央分隔带(如有)"],answer:[0],explanation:"路基宽度=行车道+路肩+中央分隔带(如有)。边沟及边沟以外的用地不属于路基宽度范围。"},{id:851,type:"single",category:"交通流理论",difficulty:2,question:"交通量的时变特性中，高峰小时系数在城区道路通常？",options:["0.8~0.95(较均匀)","0.25~0.5","0.95~1.0","0.5~0.6"],answer:[0],explanation:"城区道路由于出行时间较分散，PHF通常在0.8~0.95(较均匀)。旅游公路和郊区公路PHF可能较低。"},{id:852,type:"single",category:"交通管理与控制",difficulty:1,question:"黄灯时间设置的目的是？",options:["为即将到达停车线的驾驶员提供停车或通过的决策时间","增加通行能力","减少延误","延长周期"],answer:[0],explanation:"黄灯提供过渡——驾驶员根据距停车线距离和车速决定安全停车还是继续通过，避免急刹车或闯红灯。"},{id:853,type:"single",category:"公路交通安全",difficulty:1,question:"高速公路护栏立柱间距一般为？",options:["1~4m(根据防护等级和设计)","0.5m","10m","20m"],answer:[0],explanation:"波形梁护栏立柱间距通常1~4m(防护等级越高间距越小)。标准间距一般为2m或4m。"},{id:854,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道内紧急电话设置间距一般不大于？",options:["200m","50m","500m","1000m"],answer:[0],explanation:"隧道内紧急电话间距不宜大于200m(比路侧1~2km密集)，确保人员在紧急情况下能快速到达并报警。"},{id:855,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"高速公路监控系统视频图像保存时间一般不少于？",options:["7~30天(根据存储容量和规范)","1天","1年","永久"],answer:[0],explanation:"监控视频图像保存时间根据规范要求和存储容量，一般不少于7~30天。事件相关图像应长期保存。"},{id:856,type:"single",category:"交通管理与控制",difficulty:2,question:"交叉口饱和度大于1.0时，说明？",options:["交叉口处于过饱和状态，车辆无法在一个周期内全部通过","交叉口运行良好","交叉口空闲","需要减小周期"],answer:[0],explanation:"x>1.0为过饱和，到达流量超过通行能力，排队持续增长。此时Webster周期公式不再适用。"},{id:857,type:"single",category:"交通管理与控制",difficulty:2,question:"城市道路设计中，交叉口间距过小会导致？",options:["车辆频繁启停，通行效率降低","通行效率提高","安全性提高","延误减少"],answer:[0],explanation:"交叉口过密导致车辆频繁减速、停车、起动，延误增加，通行效率降低。合理的交叉口间距平衡可达性和通行效率。"},{id:858,type:"single",category:"公路工程技术标准",difficulty:2,question:"JTG B01-2014中，公路服务水平一级的特征是？",options:["自由流状态，驾驶员可以自由选择行驶速度","稳定流，稍有延误","不稳定流，速度受限","强制流，走走停停"],answer:[0],explanation:"一级(自由流)：交通量小，驾驶员可自由选择速度和车道，不受交通流中其他车辆的影响。是服务水平的最优状态。"},{id:859,type:"single",category:"交通管理与控制",difficulty:1,question:"道路上的车道指示箭头(直行/左转/右转)属于？",options:["导向箭头(指示标线)","禁止标线","警告标线","减速标线"],answer:[0],explanation:"导向箭头(路面箭头)指示车辆行驶方向(直行/转向)，属于指示标线，车辆应按箭头指示方向行驶。"},{id:860,type:"single",category:"交通流理论",difficulty:3,question:"三相交通流理论中，F→S相变(自由流→同步流)通常发生在？",options:["瓶颈路段(如匝道合流处)容量被突破时","任何位置","仅交叉口","仅下坡路段"],answer:[0],explanation:"F→S相变通常发生在瓶颈处：当到达流量超过瓶颈通行能力时，自由流崩溃为同步流(车速降低但未完全停止)。"},{id:861,type:"single",category:"公路交通安全",difficulty:3,question:"护栏防撞等级选取时，需要综合考虑的因素不包括？",options:["路面颜色","公路等级","设计速度","事故严重程度"],answer:[0],explanation:"护栏等级选取综合考虑：公路等级、设计速度、事故严重程度(低/中/高)、交通量、大型车比例、线形条件等。路面颜色不是考虑因素。"},{id:862,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"收费系统中的车型自动分类(AVC)通常基于什么原理？",options:["车辆几何尺寸(车长/车高/轴数)检测","仅重量检测","仅车牌识别","人工判断"],answer:[0],explanation:"AVC通过检测车辆外形尺寸(长/宽/高)和轴数来判别车型，辅以车重(动态称重WIM)和车牌信息进行收费分类。"},{id:863,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道内发生交通事故时，监控系统首先应？",options:["自动或人工判断事件类型并启动相应预案","关闭所有设备","仅录像","仅报警"],answer:[0],explanation:"事件检测后，监控系统应判断事件类型(事故/火灾/拥堵)，自动或人工启动相应预案：调整信号、发布信息、通知救援等。"},{id:864,type:"single",category:"交通管理与控制",difficulty:2,question:"高峰时段采取的交通管理措施不包括？",options:["降低道路限速值","潮汐车道","临时单向交通","匝道控制"],answer:[0],explanation:"高峰时段措施：潮汐车道、匝道控制、信号配时优化、临时交通管制等。降低限速值不是高峰专项措施(除非有特殊需要)。"},{id:865,type:"single",category:"公路工程技术标准",difficulty:1,question:"四级公路(单车道)路基宽度一般不小于？",options:["4.5m(双车道6.5m)","3.0m","8.5m","12.0m"],answer:[0],explanation:"四级公路双车道路基宽一般6.5m，单车道路基宽一般4.5m。是最低技术等级的最小路基宽度。"},{id:866,type:"single",category:"公路工程技术标准",difficulty:2,question:"JTG B01-2014要求的设计车辆中，铰接客车的车身长度约为？",options:["13.7m","6m","18m","25m"],answer:[0],explanation:"铰接客车是2014版新增设计车辆类型，车身长约13.7m，主要用于客运站和机场道路等客车集中场景的设计验证。"},{id:867,type:"single",category:"交通管理与控制",difficulty:2,question:"路侧停车带对道路通行能力的影响是？",options:["减小有效车道宽度和侧向净空，降低通行能力","增加通行能力","无影响","仅影响速度不影响通行能力"],answer:[0],explanation:"路侧停车占用行车道空间或减小有效侧向净空，且车辆进出停车位干扰车流，降低路段通行能力。"},{id:868,type:"single",category:"交通流理论",difficulty:2,question:"交通量预测中，增长率法的基本假设是？",options:["未来交通量按一定增长率在现状基础上增长","交通量不变","交通量随机变化","交通量与人口无关"],answer:[0],explanation:"增长率法假设未来交通量=现状交通量×(1+r)^n，是最简单的预测方法。但未考虑增长率变化、土地利用变化等因素。"},{id:869,type:"single",category:"公路交通安全",difficulty:1,question:"路面标线的白色和黄色在使用上有什么区别？",options:["白色用于同向车道分隔，黄色用于对向车道分隔","没有区别","白色用于高速公路，黄色用于一般公路","白色用于白天，黄色用于夜间"],answer:[0],explanation:"白色标线分隔同向车流或指示同向车道；黄色标线分隔对向车流或禁止跨越。这是国际通用规则。"},{id:870,type:"single",category:"公路交通安全",difficulty:3,question:"护栏实际碰撞试验中，评价指标不包括？",options:["护栏颜色美观度","护栏是否有效阻挡车辆穿过","碰撞后车辆是否保持直立","碰撞减速度是否在可接受范围"],answer:[0],explanation:"护栏碰撞试验评价指标：①结构完整性(不穿透) ②车辆行为(不翻车/直立) ③乘员风险(减速度)。颜色不属安全评价指标。"},{id:871,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"可变限速标志显示的限速值在什么条件下具有法律效力？",options:["依据法规授权并按规定程序设置时","任何条件下","仅晴天","仅高速公路"],answer:[0],explanation:"可变限速标志依据交通法规授权并按规范设置和运行时，其显示的限速值具有法律约束力，驾驶员须遵守。"},{id:872,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道入口前的路面通常设计为？",options:["抗滑性能较高的路面(减少洞口前制动打滑)","光滑路面","普通路面","彩色路面"],answer:[0],explanation:"隧道入口前路面宜采用抗滑性能较好的材料(如抗滑沥青层)，确保车辆在进入隧道前安全减速，避免因制动力不足引发事故。"},{id:873,type:"single",category:"交通管理与控制",difficulty:2,question:"信号灯设置的视认性要求不包括？",options:["信号灯颜色必须五彩斑斓吸引注意","有足够的亮度和对比度","不被其他光源混淆","有适当的安装高度和角度"],answer:[0],explanation:"信号灯视认性要求：足够亮度/对比度(阳光下可见)、避免假显示(幻影效应)、合理安装位置、不被遮挡。颜色五彩斑斓不是要求。"},{id:874,type:"single",category:"交通管理与控制",difficulty:3,question:"Web ster周期公式推导中的总延误模型假设车辆到达服从什么分布？",options:["均匀到达","泊松随机到达","正态分布","分批到达"],answer:[0],explanation:"Webster模型的均匀延误项假设车辆均匀到达(非随机)，随机延误项为修正项。这是模型的一个简化假设。"},{id:875,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路工程施工完成后应进行什么工作？",options:["交工验收和竣工验收","直接开放交通","仅进行试运营","仅进行质量检查"],answer:[0],explanation:"公路完工后须经交工验收(检查工程质量是否满足设计和规范要求)和竣工验收(综合评定建设项目)，合格后方可正式运营。"},{id:876,type:"single",category:"交通管理与控制",difficulty:1,question:"停车让行标志(Stop Sign)在无信号交叉口的作用是？",options:["要求驾驶员在进入交叉口前完全停车观察后再通行","仅减速即可","可直接通过","仅夜间使用"],answer:[0],explanation:"停车让行标志要求车辆在停止线前完全停车(车轮停止转动)，确认安全后再通行。与减速让行(Yield)不同，必须完全停止。"},{id:877,type:"single",category:"交通流理论",difficulty:2,question:"高速公路瓶颈路段通行能力下降(Capacity Drop)现象是指？",options:["瓶颈处排队形成后，流出瓶颈的流量低于瓶颈本身的最大通行能力","瓶颈处通行能力增加","瓶颈处通行能力不变","瓶颈消失"],answer:[0],explanation:"通行能力下降：当瓶颈处形成排队后，释放流量通常低于瓶颈理论最大通行能力(可能低5-15%)，原因是拥挤条件下车头时距增大。"},{id:878,type:"single",category:"公路交通安全",difficulty:2,question:"防眩板的遮光角(偏转角)设计应？",options:["既有效遮挡对向眩光又不过度遮挡视线","最大化遮光","最小化遮光","不考虑角度"],answer:[0],explanation:"防眩板遮光角需平衡：既要阻挡对向车灯直射光线(眩光控制)，又不能过度遮挡导致驾驶员视距受限或产生压抑感。"},{id:879,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道照明中，加强照明和基本照明的主要区别是？",options:["加强照明亮度高，设置在入口/过渡/出口段；基本照明亮度低，设在中间段","两者亮度相同","加强照明仅用于隧道入口","基本照明仅用于白天"],answer:[0],explanation:"加强照明(入口段、过渡段、出口段)亮度较高以适应视觉过渡；基本照明(中间段)亮度低且恒定，满足基本行车视认要求。"},{id:880,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"监控中心大屏幕显示系统的主要功能是？",options:["综合显示全线交通状态、设备运行状态和事件信息","仅显示地图","仅显示CCTV图像","仅显示数据报表"],answer:[0],explanation:"大屏幕显示墙综合展示：全线交通流状态(地图/速度/流量)、CCTV图像、设备运行状态、事件处置情况等，提供全局监控视野。"},{id:881,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"收费车道黄色闪光灯的作用是？",options:["警示驾驶员注意前方收费车道","装饰","照明","引导车辆"],answer:[0],explanation:"收费车道上方黄色闪光灯(或红叉/绿箭)提醒驾驶员注意收费岛存在和车道通行状态，尤其夜间和恶劣天气条件下。"},{id:882,type:"single",category:"交通管理与控制",difficulty:1,question:"行人过街安全岛的作用是？",options:["为一次绿灯无法完全通过宽马路的行人提供中途安全等候区","禁止行人过街","加速行人过街","仅供自行车使用"],answer:[0],explanation:"安全岛(交通岛)设置在较宽道路中央，供行人分两次过街(一个周期走到安全岛，下个周期继续通过)，提高行人过街安全性。"},{id:883,type:"single",category:"公路工程技术标准",difficulty:2,question:"公路桥梁设计荷载中的汽车荷载分为车道荷载和车辆荷载，两者的适用场景是？",options:["车道荷载用于整体计算(主梁)，车辆荷载用于局部计算(桥面板)","两者完全相同","车道荷载仅用于小桥","车辆荷载仅用于大桥"],answer:[0],explanation:"车道荷载(均布力+集中力)用于桥梁整体结构计算；车辆荷载(轴重车队)用于桥面板、伸缩缝等局部构件验算。"},{id:884,type:"single",category:"公路隧道设计规范",difficulty:1,question:"以下哪项是隧道标志标线的特点？",options:["隧道内标志通常采用内部照明或高等级反光材料以适应暗环境","与洞外标志完全相同","隧道内不需要标志","仅隧道入口设标志"],answer:[0],explanation:"隧道内环境暗且有汽车尾气(降低反光效率)，标志通常采用内部照明(灯箱式)或超高等级反光膜，标线增加突起路标辅助。"},{id:885,type:"single",category:"交通管理与控制",difficulty:2,question:"绿波控制中，绿波速度通常设定为？",options:["路段设计速度或略低于设计速度的值","车辆最高速度","最低限速","任意速度"],answer:[0],explanation:"绿波速度通常设定为设计速度的80%~100%，或等于区间实际平均速度，确保按该速度行驶的车辆能连续通过各交叉口。"},{id:886,type:"single",category:"交通流理论",difficulty:3,question:"瓶颈处通行能力下降现象产生的主要原因是？",options:["拥挤时驾驶员行为变化(增大车距、降低速度)导致流率降低","路面损坏","天气变化","车辆故障"],answer:[0],explanation:"通行能力下降主因是拥挤条件下驾驶员改变行为：增大安全跟车距离、加速不如自由流果断、换道更加频繁导致流率下降。"},{id:887,type:"single",category:"公路交通安全",difficulty:2,question:"波形梁护栏的防阻块(垫块)的作用是？",options:["防止车辆碰撞时车轮被立柱绊阻，保持护栏导向功能","增加护栏高度","减少材料用量","美观"],answer:[0],explanation:"防阻块安装在波形板和立柱之间，碰撞时防止车辆车轮直接撞击立柱(导致翻车)，同时保持护栏梁的连续导向作用。"},{id:888,type:"single",category:"公路交通安全",difficulty:1,question:"道路交通标线的厚度一般为？",options:["1.5~3.0mm(热熔型)","1cm","0.1mm","5cm"],answer:[0],explanation:"热熔型标线厚度通常1.5~3.0mm(含玻璃珠)。溶剂型和双组分型略薄。标线太厚易剥落，太薄不耐磨。"},{id:889,type:"single",category:"交通管理与控制",difficulty:2,question:"倒计时信号灯的优点是？",options:["让驾驶员预知绿灯剩余时间，减少犹豫和急刹车","增加信号周期","减少通行能力","仅用于行人"],answer:[0],explanation:"倒计时显示帮助驾驶员判断是否能安全通过交叉口(绿灯剩余秒数)，减少黄灯期间的急刹车和闯红灯行为。"},{id:890,type:"single",category:"公路隧道设计规范",difficulty:3,question:"隧道火灾时纵向临界风速与什么因素有关？",options:["隧道断面尺寸、火源热释放率和隧道纵坡","仅隧道长度","仅交通量","仅设计速度"],answer:[0],explanation:"临界风速取决于：隧道断面(水力直径)、火源热释放率(HRR，通常取20-100MW)、隧道纵坡(坡度越大临界风速越大)等。"},{id:891,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道内壁装饰材料的颜色应选择？",options:["浅色(提高照明效率，降低能耗)","深色","红色","任意颜色"],answer:[0],explanation:"浅色墙面反射率高，可提高照明利用效率降低能耗。深色吸收光线会降低隧道内亮度。"},{id:892,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道入口的标志应包括？",options:["隧道名称、长度、限高、限速等信息","仅隧道名称","仅限速","无标志"],answer:[0],explanation:"隧道入口前应设标志标牌，告知隧道名称、长度、限高限制、限速值等信息，帮助驾驶员做好进入隧道的准备。"},{id:893,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道内紧急疏散指示标志的颜色是？",options:["绿色(安全出口)","红色","黄色","蓝色"],answer:[0],explanation:"紧急疏散标志采用绿色(国际通用安全色)，指示逃生方向和横通道位置。"},{id:894,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道内的消防设备箱通常涂成什么颜色？",options:["红色","绿色","蓝色","黑色"],answer:[0],explanation:"消防设备箱(灭火器、消火栓)通常为红色，醒目易识别，符合消防设施通用标识规范。"},{id:895,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道内发生火灾时，驾驶员首先应该？",options:["立即停车并使用最近的灭火器或报警装置","加速驶出隧道","倒车退出隧道","弃车逃跑"],answer:[0],explanation:"隧道火灾初期：尽量将车辆靠边停下，使用最近的灭火器尝试扑灭小火灾或按手动报警按钮报警，疏散至横通道。"},{id:896,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道内禁止的行为不包括？",options:["按规定速度行驶","随意停车","掉头","倒车"],answer:[0],explanation:"隧道内禁止停车、掉头、倒车，应按规定的速度和车道行驶。遵守交通规则是允许的。"},{id:897,type:"single",category:"公路隧道设计规范",difficulty:3,question:"隧道火灾临界风速计算中，火源热释放率HRR通常取值为？",options:["20~100 MW(根据隧道类型和保守设计)","1~5 MW","200~500 MW","0.1~1 MW"],answer:[0],explanation:"隧道火灾设计HRR根据车辆类型取值：小客车约5MW，货车约20-30MW，油罐车可达100MW以上。设计通常取保守值20-100MW。"},{id:898,type:"single",category:"公路隧道设计规范",difficulty:3,question:"隧道用射流风机在火灾工况下应能承受多少温度？",options:["250~400°C持续一定时间(通常1~2小时)","50°C","100°C","1000°C"],answer:[0],explanation:"隧道火灾用射流风机需耐高温(250-400°C)持续运行1-2小时，保证排烟功能在火灾期间不失效。普通风机不耐高温。"},{id:899,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路出口预告标志一般设置在出口前多少米？",options:["2km、1km、500m处逐级预告","仅出口处","5km处","10km处"],answer:[0],explanation:"出口预告采用三级预告：距出口2km、1km、500m处分别设置，逐级提醒驾驶员提前做好驶出准备。"},{id:900,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路紧急停车带(港湾式)的设置间距一般为？",options:["约2~3km","500m","10km","5km"],answer:[0],explanation:"紧急停车带(港湾式紧急停车带)沿高速路侧每隔2~3km设置一处，供故障车辆临时停靠检修。"},{id:901,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路上ETC车道通常用什么颜色标识？",options:["黄色或紫色(ETC专用标识色)","红色","蓝色","绿色"],answer:[0],explanation:"ETC车道天棚和路面标识通常采用黄色或紫色(国家ETC标识标准色)，与MTC车道区分。"},{id:902,type:"single",category:"高速公路交通工程通用规范",difficulty:3,question:"省界ETC门架系统的作用是？",options:["实现跨省车辆不停车计费和路径识别","仅提供照明","仅检测车速","仅发布信息"],answer:[0],explanation:"省界ETC门架(虚拟收费站)通过天线读取车载OBU/CPC卡，实现跨省车辆分段计费和路径识别，替代实体省界收费站。"},{id:903,type:"single",category:"高速公路交通工程通用规范",difficulty:3,question:"高速公路监控系统交通事件自动检测(AID)算法的误报率通常应控制在？",options:["<5%(高可靠性要求)","<50%","<20%","<10%"],answer:[0],explanation:"AID误报率需控制在5%以下(高可靠性)，误报太多会导致操作人员忽视真实事件(狼来了效应)，降低系统可用性。"},{id:904,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路服务区停车位的最小设置数量根据什么确定？",options:["主线设计交通量和车辆停留率","服务区面积","餐厅座位数","加油站数量"],answer:[0],explanation:"服务区停车位数量=主线交通量×停留率×平均停车时间/周转率。大型服务区一般大型车位50-100个，小型车100-300个。"},{id:905,type:"single",category:"高速公路交通工程通用规范",difficulty:3,question:"高速公路通信系统SDH传输网的环网保护方式一般采用？",options:["二纤双向复用段保护环(MS-SPRing)或通道保护环","无保护","仅单链传输","无线备份"],answer:[0],explanation:"SDH环网常用二纤双向复用段共享保护环或通道保护环，任一节点间光缆中断时自动切换至备用路径，倒换时间≤50ms。"},{id:906,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路上用于分隔主线和加减速车道的标线是？",options:["宽虚线(出入口标线)","白色实线","黄色实线","双白线"],answer:[0],explanation:"出入口(加减速车道)与主线的分隔使用宽虚线(比一般车道线宽)，提示驾驶员此处可变换车道进入或离开主线。"},{id:907,type:"single",category:"公路交通安全",difficulty:1,question:"波形梁护栏由哪些部件组成？",options:["波形梁板、立柱、防阻块(托架)、端头","仅波形梁板","仅立柱","仅端头"],answer:[0],explanation:"波形梁护栏系统=波形梁板(横梁)+立柱(支撑)+防阻块(连接板与柱)+端头(端部处理)+拼接螺栓等。"},{id:908,type:"single",category:"公路交通安全",difficulty:1,question:"交通标志中，限速标志属于哪类标志？",options:["禁令标志","警告标志","指示标志","指路标志"],answer:[0],explanation:"最高限速标志为红色圆圈黑字，属于禁令标志(禁止超过标示速度)。最低限速为蓝色圆圈白字，属于指示标志。"},{id:909,type:"single",category:"公路交通安全",difficulty:1,question:"路面标线用反光玻璃珠的粒径一般为？",options:["0.1~2.0mm","5~10mm","10~20mm","<0.01mm"],answer:[0],explanation:"玻璃珠粒径通常0.1~2.0mm(不同配比混合)，嵌入标线表面约50%-60%深度，保证反光效果和耐久性。"},{id:910,type:"single",category:"公路交通安全",difficulty:1,question:"交通标志安装高度(下缘距地面)一般不小于？",options:["1.8~2.5m(路侧式)","0.5m","5m","10m"],answer:[0],explanation:"路侧式标志下缘距地面高度一般1.8~2.5m(人行道上方2.5m以上)，悬臂式和门架式距路面5.5m以上。"},{id:911,type:"single",category:"公路交通安全",difficulty:3,question:"防撞垫的碰撞试验标准中，评价乘员风险的主要指标是？",options:["碰撞减速度(加速度值g)和乘员碰撞速度","护栏变形量","车辆损坏程度","护栏位移"],answer:[0],explanation:"乘员风险评价核心指标：①乘员碰撞减速度(Occupant Impact Velocity)≤12m/s ②车辆10ms平均减速度≤20g。"},{id:912,type:"single",category:"公路交通安全",difficulty:3,question:"缆索护栏端部锚固混凝土基础的尺寸通常由什么决定？",options:["缆索张力和土基承载力的计算","仅缆索数量","仅土质条件","美观要求"],answer:[0],explanation:"端部锚固基础的尺寸需根据缆索设计张力(几吨至十几吨)、土基承载力、抗倾覆和抗滑移要求进行结构计算确定。"},{id:913,type:"single",category:"公路交通安全",difficulty:1,question:"高速公路中央分隔带开口活动护栏平时应保持什么状态？",options:["关闭锁紧状态","常开状态","半开状态","移除"],answer:[0],explanation:"中央分隔带开口活动护栏平时关闭并锁紧(防止车辆穿越)，紧急情况(事故救援/养护)时由授权人员开启。"},{id:914,type:"single",category:"公路交通安全",difficulty:3,question:"护栏防护等级的评价通过什么试验进行？",options:["实车足尺碰撞试验","计算机仿真","缩小模型试验","仅理论计算"],answer:[0],explanation:"护栏防护等级通过实车足尺碰撞试验(Full-scale Crash Test)验证，使用不同质量的车辆以规定速度和角度碰撞护栏，检验防护性能。"},{id:915,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路限高标志设置的目的是？",options:["提示前方桥梁或隧道的净高限制，防止超高车辆碰撞","限制车速","指引方向","美观"],answer:[0],explanation:"限高标志提醒驾驶员前方净空不足(桥梁/隧道/管线)，超高车辆需提前绕行，防止碰撞事故。"},{id:916,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路里程桩(里程碑)的作用是？",options:["标识公路的里程位置(从起点开始的距离)","指示方向","限速","地名"],answer:[0],explanation:"里程桩(里程碑)沿公路每公里设置，标识从公路起点开始的公里数，用于定位、养护管理、应急救援等。"},{id:917,type:"single",category:"公路工程技术标准",difficulty:3,question:"JTG B01-2014规定的货车停车视距比小客车停车视距长的主要原因是什么？",options:["货车制动性能(制动减速度)比小客车差","货车速度更高","货车质量更轻","货车驾驶员反应更快"],answer:[0],explanation:"货车制动距离更长(制动减速度通常3-4m/s^2,小客车约5-6m/s^2)，且货车重心高、下坡时制动易热衰退，所需停车视距更长。"},{id:918,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路百米桩的作用是？",options:["标识每100m的位置，用于精确里程定位","每100km标识","限速标志","地名标志"],answer:[0],explanation:"百米桩(百米标)在两个里程桩之间每100m设置一个，用于精确标识位置(如K123+500表示123公里500米处)。"},{id:919,type:"single",category:"公路工程技术标准",difficulty:3,question:"公路设计运行速度与设计速度不一致时，应如何进行视距检验？",options:["以运行速度(通常高于设计速度)验算视距是否满足要求","以设计速度验算","以最低限速验算","不需要检验"],answer:[0],explanation:"JTG B01-2014要求以运行速度(实际行驶速度，通常V85)进行视距和线形指标的检验，确保实际使用条件下的安全性。"},{id:920,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路用地范围一般指？",options:["路堤坡脚或路堑坡顶以外一定距离的范围","仅路面范围","仅路基范围","仅桥涵范围"],answer:[0],explanation:"公路用地范围包括路堤坡脚/路堑坡顶外一定距离(通常1-3m)内的土地，用于排水、防护、绿化和管理。"},{id:921,type:"single",category:"公路工程技术标准",difficulty:1,question:"公路排水边沟的作用是？",options:["汇集和排除路面及路基范围内的地表水和地下水","提供灌溉用水","养鱼","景观"],answer:[0],explanation:"边沟沿公路两侧设置，汇集路面雨水和路基渗水，排入天然水体或排水系统，防止水损害路基。"},{id:922,type:"single",category:"公路工程技术标准",difficulty:3,question:"公路路线设计中，导向线(Guide Line)是指？",options:["为选线人员在实地或图上标出的理想线位走向参考线","路面中心线","路基边缘线","用地界线"],answer:[0],explanation:"导向线是在地形图上根据控制点和地形走势(等高线)绘制的理想路线走向参考线，指导选线人员在合理范围内布设路线。"},{id:923,type:"single",category:"交通管理与控制",difficulty:1,question:"黄网格线(禁停网格线)的作用是？",options:["禁止车辆在网格区域内停车(保持交叉口或出入口通畅)","允许停车","仅供行人使用","仅供非机动车"],answer:[0],explanation:"黄网格线(黄色网状线)表示禁止车辆以任何理由在网格内停车，确保交叉口、消防通道等关键区域不被堵塞。"},{id:924,type:"single",category:"交通管理与控制",difficulty:1,question:"路口人行横道前的菱形标志表示什么？",options:["前方有人行横道","前方有学校","前方有交叉口","前方有减速带"],answer:[0],explanation:"菱形预告标线(人行横道预告标线)设于人行横道前30~50m，提醒驾驶员减速注意行人。"},{id:925,type:"single",category:"交通管理与控制",difficulty:3,question:"交叉口信号配时中的临界车道组分析(Critical Lane Analysis)的目的是？",options:["确定每个相位所需的最小有效绿灯时间","计算周期长度","确定全红时间","计算黄灯时间"],answer:[0],explanation:"临界车道分析找出每个相位中流量比(q/S)最大的车道组，以该车道的需求确定该相位的最短绿灯时间。"},{id:926,type:"single",category:"交通管理与控制",difficulty:3,question:"定时信号控制与感应控制的适用条件区别主要在于？",options:["交通流的时间波动性：波动大宜用感应控制，稳定宜用定时","道路等级","车道数","交叉口大小"],answer:[0],explanation:"交通流时间波动性大(各方向变化不可预测)时感应控制能更好适应；交通流稳定(可预测)时定时控制简单可靠。"},{id:927,type:"single",category:"交通管理与控制",difficulty:1,question:"公交专用道在时段内通常？",options:["仅允许公交车和某些特定车辆(如校车)通行","所有车辆均可使用","仅允许出租车使用","仅允许非机动车使用"],answer:[0],explanation:"公交专用道在规定时段内仅允许公交车及特定授权车辆(紧急车辆、校车等)通行，社会车辆不得占用。"},{id:928,type:"single",category:"交通流理论",difficulty:1,question:"交通调查中，人工计数法通常以什么为最小记录时间单位？",options:["5分钟或15分钟","1小时","1天","1秒"],answer:[0],explanation:"人工计数通常以5分钟或15分钟为记录间隔，既能反映流量波动又便于人工操作。更短间隔人工难以完成。"},{id:929,type:"single",category:"交通流理论",difficulty:3,question:"交通流微观仿真中，车辆换道模型(Lane Changing Model)通常区分哪两类换道行为？",options:["强制性换道(MLC)和自由性换道(DLC)","左换道和右换道","快速换道和慢速换道","白天换道和夜间换道"],answer:[0],explanation:"微观仿真中：①强制性换道MLC(Mandatory)——必须换道(如驶离高速、避开障碍)；②自由性换道DLC(Discretionary)——为获取更好行驶条件而换道。"},{id:930,type:"single",category:"交通流理论",difficulty:1,question:"交通工程中使用车辆检测器最多的类型是？",options:["环形线圈检测器","视频检测器","雷达检测器","超声波检测器"],answer:[0],explanation:"环形线圈检测器是最传统、最成熟、使用最广的车辆检测器。虽然施工需切割路面，但精度高、成本低。视频检测器近年增长迅速。"},{id:931,type:"single",category:"交通流理论",difficulty:3,question:"被动式跟驰模型中，后车反应强度与前车刺激的关系通常假设为？",options:["刺激-反应框架：反应=敏感度×刺激(前车相对速度/间距变化)","固定延迟","固定加速度","随机反应"],answer:[0],explanation:"跟驰模型采用刺激-反应框架：后车加速度(反应)=敏感系数(λ)×刺激(前后车速差或间距变化)，反应滞后于刺激一个时间T。"},{id:932,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道内壁上安装的突起路标(道钉)的作用是？",options:["辅助车道分隔和视线诱导，尤其在标线被污染时","代替照明","代替标志","代替信号灯"],answer:[0],explanation:"突起路标(反光道钉)增强夜间和潮湿条件下的车道可视性，当路面标线被水膜覆盖或污染时仍能清晰显示车道边界。"},{id:933,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道入口的遮光过渡设施常见形式不包括？",options:["全封闭隧道","格栅式遮光棚","百叶式遮光结构","绿植遮光"],answer:[0],explanation:"遮光过渡有：遮光棚(格栅/百叶)、减光照明(洞口加强)、洞门形式优化等。全封闭是最极端的形式但成本极高。"},{id:934,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道照明设计中，中间段亮度的最小值受什么限制？",options:["必须保证驾驶员能看清前方至少一个停车视距范围内的障碍物","仅能源消耗","照明设备寿命","美观程度"],answer:[0],explanation:"中间段最低亮度由停车视距和障碍物对比度要求确定：确保驾驶员能在停车视距距离内识别出路面上20cm×20cm的障碍物。"},{id:935,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道消防设施中灭火器的主要灭火对象是？",options:["初期小型火灾(如车辆电路起火)","大型油罐火灾","隧道结构火灾","电线起火"],answer:[0],explanation:"灭火器(干粉或CO2)用于扑灭初期小型火灾(A/B/C类火灾)，是隧道最基本的消防设备。大型火灾需消火栓和消防救援。"},{id:936,type:"single",category:"公路隧道设计规范",difficulty:2,question:"公路隧道运营中，CO浓度检测值超过限值时系统应？",options:["自动增加通风量(启动或加速风机)","关闭隧道","仅记录数据","仅报警不动作"],answer:[0],explanation:"CO浓度超限→监控系统自动启动或加速风机增加通风量降低浓度→浓度降至安全水平后降低风机运行。实现自动闭环控制。"},{id:937,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道照明灯具的安装间距主要取决于？",options:["灯具的配光曲线、安装高度和所需路面亮度均匀度","隧道长度","交通量","设计速度"],answer:[0],explanation:"灯具间距由灯具配光特性(光束分布)、安装高度和路面亮度均匀度要求(总均匀度Uo≥0.4，纵向均匀度Ul≥0.6)计算确定。"},{id:938,type:"single",category:"公路隧道设计规范",difficulty:1,question:"隧道内摄像机通常安装在什么位置？",options:["隧道侧壁或顶部，紧急停车带和横通道处加密","隧道入口外","隧道出口外","仅监控中心"],answer:[0],explanation:"摄像机沿隧道纵向一定间距(100-200m)安装在侧壁或顶部，在关键位置(紧急停车带、横通道)加密布设，实现全覆盖。"},{id:939,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路收费车道上方红叉/绿箭指示灯的作用是？",options:["指示该车道是否开放通行","装饰","照明","指示方向"],answer:[0],explanation:"红叉(X)=车道关闭/禁止通行；绿箭(↓)=车道开放允许通行。是收费车道的基本交通控制设施。"},{id:940,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路通信管道通常采用什么材料？",options:["PVC-U或HDPE(塑料管)或钢管","仅钢管","仅混凝土管","仅铸铁管"],answer:[0],explanation:"通信管道常用PVC-U(硬聚氯乙烯)或HDPE(高密度聚乙烯)塑料管(耐腐蚀/重量轻/施工方便)，穿越道路时采用钢管保护。"},{id:941,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"高速公路通信光缆的纤芯数量通常如何确定？",options:["满足当前业务需求+扩展备用(至少8芯)+省际联网预留(至少4芯)","仅满足当前需求","统一为24芯","统一为48芯"],answer:[0],explanation:"光缆芯数=当前业务所需+备用(≥8芯)+省际联网预留(≥4芯)，考虑远期发展需求。主干光缆通常48-96芯。"},{id:942,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"可变信息标志(CMS/VMS)的显示技术不包括？",options:["喷绘布(静态广告)","LED(发光二极管)","光纤显示","磁翻板显示"],answer:[0],explanation:"VMS显示技术：LED(全彩/双基色，主流)、光纤显示、磁翻板等。喷绘布是静态的不可变信息，不属于可变信息标志。"},{id:943,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路入口处应设置的标志是？",options:["高速公路入口标志(绿底白字)","禁止通行","施工标志","让行标志"],answer:[0],explanation:"高速公路入口处设入口标志(绿底白字，含高速名称和方向)，提醒驶入高速公路的驾驶员。"},{id:944,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"高速公路匝道收费站入口车道发卡方式不包括？",options:["人工检查车辆证件","人工发卡(CPC卡)","自动发卡机","ETC自动抬杆"],answer:[0],explanation:"入口车道方式：人工发CPC卡、自动发卡机(自助取卡)、ETC自动抬杆。入口不进行人工证件检查(那是交警执法的范围)。"},{id:945,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"高速公路紧急电话系统现在多被什么替代？",options:["手机普及后逐渐被替代，但隧道内仍保留","卫星电话","对讲机","互联网"],answer:[0],explanation:"随着手机普及，路侧紧急电话使用率大幅下降，新建高速可能减少设置。但隧道(手机信号可能弱)仍必须设紧急电话。"},{id:946,type:"single",category:"公路交通安全",difficulty:1,question:"突起路标(道钉)按反光颜色区分，白色用于？",options:["同向车道分隔(与白色标线配合)","对向车道分隔","路侧边缘","禁止跨越"],answer:[0],explanation:"反光道钉颜色与标线对应：白色=同向车道分隔/边缘，黄色=对向车道分隔，红色=禁止通行/路侧边缘警告。"},{id:947,type:"single",category:"公路交通安全",difficulty:1,question:"轮廓标(反光轮廓标)的间距一般为？",options:["直线段约24~50m，曲线段加密","100m","500m","1km"],answer:[0],explanation:"轮廓标间距：直线段24~50m(高速/一级)，曲线段加密(根据半径，最小可至4~8m)以清晰显示线形变化。"},{id:948,type:"single",category:"公路交通安全",difficulty:2,question:"防眩板在平曲线路段的设置角度应？",options:["随曲线线形偏转一定角度，保持有效遮挡对向眩光","始终保持垂直道路中心线","保持不变","取消设置"],answer:[0],explanation:"平曲线路段对向车灯的相对角度发生变化，防眩板需根据曲线半径偏转一定角度(斜角)，以持续有效遮挡对向眩光。"},{id:949,type:"single",category:"公路交通安全",difficulty:1,question:"高速公路防撞护栏上安装的反光轮廓标，夜间可显示什么？",options:["道路线形轮廓和护栏走向","限速值","方向指示","距离信息"],answer:[0],explanation:"护栏上安装的轮廓标(反光片/反光膜)夜间反射车灯光线，显示道路边缘和线形走向，帮助驾驶员预判前方道路弯曲情况。"},{id:950,type:"single",category:"公路交通安全",difficulty:1,question:"交通标志板常用的基材不包括？",options:["普通纸张","铝合金板","钢板","塑料板"],answer:[0],explanation:"标志板基材常用铝合金板(轻/耐腐蚀)、钢板(强度高)、工程塑料等。普通纸张不耐候、强度低，不能用于户外交通标志。"},{id:951,type:"single",category:"公路交通安全",difficulty:2,question:"柔性护栏(缆索护栏)与半刚性护栏的防护机理主要区别是？",options:["柔性护栏通过缆索拉伸变形吸收能量(位移大)，半刚性通过横梁弯曲变形吸收能量(位移中)","完全相同","柔性刚性互换","没有区别"],answer:[0],explanation:"柔性护栏碰撞时缆索拉伸产生大变形吸收能量(车辆减速较缓但位移大)；半刚性护栏通过钢梁弯曲变形吸收能量(变形适中)；刚性护栏几乎不变形。"},{id:952,type:"single",category:"公路交通安全",difficulty:3,question:"护栏设计中的最大动态位移(W)的意义是？",options:["护栏在碰撞过程中向外侧的最大动态位移量，用于确定护栏后方的安全距离","护栏高度","护栏长度","护栏重量"],answer:[0],explanation:"W是护栏碰撞时横向最大动态位移(护栏面外移量)。护栏后方若有障碍物，护栏面距障碍物的距离必须>W，否则碰撞时护栏可能撞击障碍物。"},
