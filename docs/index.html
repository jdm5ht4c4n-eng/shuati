.map(x1);await yt.transaction("rw",yt.questions,async()=>{await yt.questions.bulkAdd(n)})}const gy=[{id:1,type:"single",category:"交通流理论",difficulty:1,question:"交通量Q、速度V和密度K三参数的基本关系式为？",options:["Q=KV","Q=K/V","Q=V/K","Q=K+V"],answer:[0],explanation:"流量Q=密度K×速度V(Q=KV)，是交通流理论中最基本的关系式。"},{id:2,type:"single",category:"交通流理论",difficulty:1,question:"Greenshields速度-密度线性模型中，当密度K=0时，速度V等于？",options:["自由流速度Vf","0","阻塞密度Kj","最佳速度Vm"],answer:[0],explanation:"Greenshields模型V=Vf(1-K/Kj)，K=0时V=Vf，车辆以自由流速度行驶。"},{id:3,type:"single",category:"交通流理论",difficulty:1,question:"Greenshields模型中，当密度达到阻塞密度Kj时，速度和流量分别为？",options:["V=0, Q=0","V=Vf, Q=Qmax","V=Vf/2, Q=Qmax","V=0, Q=Qmax"],answer:[0],explanation:"密度达Kj时车辆无法移动，V=0，因此Q=KV=0。"},{id:4,type:"single",category:"交通流理论",difficulty:2,question:"Greenshields模型中，流量达到最大Qmax时的密度和速度分别为？",options:["K=Kj/2, V=Vf/2","K=Kj, V=Vf","K=0, V=Vf","K=Kj/2, V=Vf"],answer:[0],explanation:"Km=Kj/2，Vm=Vf/2，Qmax=Vf×Kj/4。"},{id:5,type:"single",category:"交通流理论",difficulty:2,question:"根据JTG B01-2014，中型货车的车辆折算系数(pcu)通常取？",options:["1.5","2.0","2.5","1.0"],answer:[1],explanation:"JTG B01-2014：小客车1.0，中型货车2.0，大型客车2.5，汽车列车4.0。"},{id:6,type:"single",category:"交通流理论",difficulty:1,question:"高峰小时系数(PHF)的计算公式为？",options:["高峰小时交通量/(4×高峰15分钟流量)","高峰小时交通量/12小时交通量","(4×高峰15分钟流量)/高峰小时交通量","高峰15分钟流量/高峰小时交通量"],answer:[0],explanation:"PHF=高峰小时交通量/(4×高峰15分钟交通量)，越接近1越均匀。"},{id:7,type:"single",category:"交通流理论",difficulty:1,question:"第30位小时交通量(30HV)通常被用作？",options:["设计小时交通量","年平均日交通量","高峰小时交通量","日最大交通量"],answer:[0],explanation:"30HV将全年8760小时从大到小排列取第30位，作为设计小时交通量DHV。"},{id:8,type:"single",category:"交通流理论",difficulty:1,question:"AADT的含义是？",options:["年平均日交通量","月平均日交通量","周平均日交通量","年平均小时交通量"],answer:[0],explanation:"AADT(Annual Average Daily Traffic)即年平均日交通量。"},{id:9,type:"single",category:"交通流理论",difficulty:2,question:"交通密度K的定义是？",options:["某一瞬间单位长度道路上存在的车辆数","单位时间内通过道路某断面的车辆数","车辆通过某段路程的平均速度","某段时间内通过某断面的车辆总数"],answer:[0],explanation:"交通密度K(veh/km)是某一瞬间单位长度道路上存在的车辆数。"},{id:10,type:"single",category:"交通流理论",difficulty:1,question:"交通量是指？",options:["单位时间内通过道路某一断面的车辆数","某一瞬间单位长度道路上的车辆数","车辆通过某段路程所需的时间","单位长度道路上的车辆密度"],answer:[0],explanation:"交通量Q是在选定时间段内通过道路某一断面的车辆数，通常以veh/h为单位。"},{id:11,type:"single",category:"交通流理论",difficulty:2,question:"Greenshields模型中流量-密度关系曲线的形状是？",options:["抛物线","直线","双曲线","指数曲线"],answer:[0],explanation:"Q=Vf(K-K^2/Kj)，Q-K为开口向下的抛物线，在K=Kj/2处取得最大值。"},{id:12,type:"single",category:"交通流理论",difficulty:2,question:"空间平均速度Vs和时间平均速度Vt的关系通常为？",options:["Vs ≤ Vt","Vs > Vt","Vs = Vt","没有固定关系"],answer:[0],explanation:"通常Vs≤Vt，二者之差随速度离散程度增大而增大。"},{id:13,type:"single",category:"交通流理论",difficulty:1,question:"交通流三参数中，反映拥挤程度最直接的指标是？",options:["密度","速度","流量","车头时距"],answer:[0],explanation:"密度K直接反映道路上车辆的密集程度，是衡量交通拥挤最直接的指标。"},{id:14,type:"single",category:"交通流理论",difficulty:2,question:"当交通量较小时，车头时距通常服从什么分布？",options:["负指数分布","正态分布","均匀分布","二项分布"],answer:[0],explanation:"低流量自由流状态下车辆到达具有随机性，车头时距服从负指数分布。"},{id:15,type:"single",category:"交通流理论",difficulty:2,question:"交通波理论中，波速ω的计算公式为？",options:["ω=(q2-q1)/(k2-k1)","ω=(q2+q1)/(k2+k1)","ω=(q2-q1)×(k2-k1)","ω=(q2/q1)/(k2/k1)"],answer:[0],explanation:"波速ω=(q2-q1)/(k2-k1)，流量差与密度差的比值。ω>0向下游传播。"},{id:16,type:"single",category:"交通流理论",difficulty:3,question:"上游q1=1200veh/h,k1=20veh/km;下游q2=1500veh/h,k2=50veh/km。波速和方向为？",options:["10km/h，向下游","10km/h，向上游","-10km/h，向上游","30km/h，向下游"],answer:[0],explanation:"ω=(1500-1200)/(50-20)=300/30=10km/h，ω>0向下游传播，为集结波。"},{id:17,type:"single",category:"交通流理论",difficulty:3,question:"停车波产生的条件及其传播方向是？",options:["遇到红灯停车，波向上游传播","绿灯亮车辆启动，波向下游传播","自由行驶，波向下游传播","稳定行驶，波速为零"],answer:[0],explanation:"停车时k2=Kj，ω=(0-Qm)/(Kj-Km)<0，向上游传播，排队向上游延伸。"},{id:18,type:"single",category:"交通流理论",difficulty:2,question:"起动波在信号交叉口绿灯亮起后的传播方向是？",options:["向下游传播","向上游传播","静止不动","向两侧传播"],answer:[0],explanation:"绿灯亮起，k1=Kj→k2=Km，ω>0向下游传播。"},{id:19,type:"single",category:"交通流理论",difficulty:1,question:"浮动车法(Floating Car Method)主要用于测定？",options:["区间平均速度和交通量","地点速度","交通密度","饱和流率"],answer:[0],explanation:"浮动车法通过测试车往返行驶，记录对向车数、超越车数等推算交通量和区间平均速度。"},{id:20,type:"single",category:"交通流理论",difficulty:2,question:"OD调查中O和D分别代表？",options:["Origin(起点)和Destination(终点)","Occupation和Distribution","Operation和Delay","Observation和Data"],answer:[0],explanation:"OD调查即起讫点调查：O=Origin，D=Destination，是四阶段法的基础数据。"},{id:21,type:"single",category:"交通流理论",difficulty:1,question:"交通规划四阶段法的正确顺序是？",options:["出行发生→出行分布→方式划分→交通分配","出行分布→出行发生→方式划分→交通分配","方式划分→出行发生→出行分布→交通分配","交通分配→出行分布→方式划分→出行发生"],answer:[0],explanation:"四阶段法：Trip Generation→Trip Distribution→Mode Split→Traffic Assignment。"},{id:22,type:"single",category:"交通流理论",difficulty:2,question:"重力模型(Gravity Model)用于四阶段法中的哪个阶段？",options:["出行分布","出行发生","方式划分","交通分配"],answer:[0],explanation:"重力模型用于出行分布阶段，模拟小区间出行量，借鉴牛顿万有引力定律。"},{id:23,type:"single",category:"交通流理论",difficulty:2,question:"Wardrop第一原理(用户均衡原理)的含义是？",options:["每个用户选择使自己出行时间最短的路径，最终所有被使用路径的出行时间相等且不大于未被使用路径的时间","系统总出行时间最小","所有用户选择相同的路径","每个OD对之间只选择一条路径"],answer:[0],explanation:"UE：路网均衡时，同一OD对间所有被使用路径出行时间相等，且不大于未被使用路径的时间。"},{id:24,type:"single",category:"交通流理论",difficulty:3,question:"Wardrop第二原理(系统最优原理)的目标是？",options:["使路网总出行时间最小","使用户个人出行时间最小","使道路利用率最高","使交通流量均衡分布"],answer:[0],explanation:"SO：系统最优条件下路网总出行时间最小。通常UE≠SO。"},{id:25,type:"single",category:"交通流理论",difficulty:2,question:"BPR函数在交通分配中描述什么关系？",options:["路段行驶时间与交通量的关系","速度与密度的关系","流量与密度的关系","出行量与人口的关系"],answer:[0],explanation:"BPR路阻函数t=t0[1+α(q/C)^β]，描述行驶时间随饱和度增大的关系，常用α=0.15,β=4。"},{id:26,type:"single",category:"交通流理论",difficulty:1,question:"基本通行能力、可能通行能力和设计通行能力的大小关系为？",options:["基本>可能>设计","设计>可能>基本","可能>基本>设计","三者相等"],answer:[0],explanation:"基本通行能力是理想条件最大值，可能通行能力经实际条件修正，设计通行能力再限以服务水平，依次递减。"},{id:27,type:"single",category:"交通流理论",difficulty:1,question:"一条车道在理想条件下的基本通行能力约为？",options:["1500~2200pcu/h","500~1000pcu/h","3000~4000pcu/h","5000~6000pcu/h"],answer:[0],explanation:"理想条件下(设计速度≥100km/h,车道宽3.75m,无侧向干扰)基本通行能力约1500~2200pcu/h。"},{id:28,type:"single",category:"交通流理论",difficulty:2,question:"根据JTG B01-2014，服务水平(LOS)分为几个等级？",options:["六级","四级","五级","三级"],answer:[0],explanation:"JTG B01-2014将服务水平分为六级(一至六级)，一级为自由流，六级为强制流。"},{id:29,type:"single",category:"交通流理论",difficulty:1,question:"服务水平(LOS)的主要评价指标是？",options:["V/C比(饱和度)","交通量","速度","密度"],answer:[0],explanation:"服务水平通常以V/C比(饱和度=交通量/通行能力)为主要评价指标。"},{id:30,type:"single",category:"交通流理论",difficulty:2,question:"高速公路基本路段的设计服务水平通常采用？",options:["二级","一级","三级","四级"],answer:[0],explanation:"根据JTG B01-2014，高速公路基本路段设计服务水平通常采用二级。"},{id:31,type:"single",category:"交通流理论",difficulty:2,question:"跟驰模型(Car-following Model)描述的是？",options:["后车跟随前车行驶的加速/减速规律","单车自由行驶速度选择","车辆换道决策过程","交叉口排队消散过程"],answer:[0],explanation:"跟驰模型是微观交通流理论核心，描述后车根据前车运动状态调整自身车速和车距的规律。"},{id:32,type:"single",category:"交通流理论",difficulty:2,question:"GM跟驰模型中，后车加速度与前车速度差成什么关系？",options:["正比","反比","无关","二次方关系"],answer:[0],explanation:"GM模型：a_n(t+T)=λ[v_{n-1}(t)-v_n(t)]，后车加速度与速度差成正比。"},{id:33,type:"single",category:"交通流理论",difficulty:3,question:"稳定跟驰状态下，流率q(veh/h)与车头时距h(s)的关系为？",options:["q=3600/h","q=h/3600","q=3600h","q=1/h"],answer:[0],explanation:"q=3600/h。如h=2s时q=1800veh/h。"},{id:34,type:"single",category:"交通流理论",difficulty:2,question:"可接受间隙理论主要用于分析？",options:["无信号交叉口的通行能力","高速公路基本路段的通行能力","信号交叉口的延误","公交站点的停靠能力"],answer:[0],explanation:"可接受间隙理论用于无信号交叉口：主路出现大于临界间隙tc的间隙时，次路车辆才能汇入或穿越。"},{id:35,type:"single",category:"交通流理论",difficulty:2,question:"无信号交叉口中，临界间隙tc的含义是？",options:["次路车辆汇入主路所需的最小主路车头时距","主路车流平均车头时距","次路车流平均车头时距","两车间最小安全距离"],answer:[0],explanation:"临界间隙tc是次路车辆安全穿越或汇入主路车流所需的主路最小车头时距。"},{id:36,type:"single",category:"交通流理论",difficulty:1,question:"30HV与AADT的关系用哪种系数表示？",options:["设计小时交通量系数K","高峰小时系数PHF","方向不均匀系数D","月不均匀系数M"],answer:[0],explanation:"设计小时交通量系数K=30HV/AADT，通常K值0.12~0.18，DHV=K×AADT。"},{id:37,type:"single",category:"交通流理论",difficulty:1,question:"方向分布系数D用于描述？",options:["主要方向交通量占总交通量的比例","高峰小时交通量占日交通量的比例","第30位小时系数","车辆类型分布比例"],answer:[0],explanation:"方向分布系数D=主要方向交通量/双向总交通量，通常D在0.5~0.7之间。"},{id:38,type:"single",category:"交通流理论",difficulty:2,question:"地点车速通常采用什么方法测量？",options:["雷达测速仪或地磁线圈","浮动车法","跟车法","车牌识别法"],answer:[0],explanation:"地点车速在道路特定断面测得，常用雷达测速仪、地磁线圈、激光测速仪等。"},{id:39,type:"single",category:"交通流理论",difficulty:2,question:"交叉口延误调查中，停车线法的基本操作是？",options:["在停车线处统计停车数和通过数，按一定时间间隔记录","用测试车在交叉口往返行驶","通过GPS定位跟踪车辆","在交叉口上游记录到达车辆数"],answer:[0],explanation:"停车线法在停车线处按固定时间间隔(通常15s或30s)记录停车数和通过数，计算总延误。"},{id:40,type:"single",category:"交通流理论",difficulty:1,question:"15分钟高峰小时系数PHF15的取值范围是？",options:["0.25~1.0","0~0.5","1.0~2.0","0~0.25"],answer:[0],explanation:"PHF最大为1(完全均匀)，最小为0.25(所有车集中在一个15分钟)。"},{id:41,type:"single",category:"交通流理论",difficulty:2,question:"下列哪项不是路段设计通行能力的影响因素？",options:["路面颜色","车道宽度","侧向净空","纵坡坡度"],answer:[0],explanation:"主要因素：车道宽度、侧向净空、纵坡坡度、大型车比例、驾驶员特征。路面颜色不属修正因素。"},{id:42,type:"single",category:"交通流理论",difficulty:1,question:"交织区(Weaving Area)是指？",options:["两股或多股交通流在较长路段上不靠控制设施进行交叉换道的区域","交叉口范围内各方向车流交汇的区域","高速公路上的服务区进出口","立交桥上的匝道区域"],answer:[0],explanation:"交织是方向相同的交通流在相当长的路段上不借助控制设施进行的交叉换道。"},{id:43,type:"single",category:"交通流理论",difficulty:3,question:"交织区长度对通行能力的影响是？",options:["长度越长，通行能力越大","长度越短，通行能力越大","长度与通行能力无关","长度只影响速度"],answer:[0],explanation:"交织区越长，车辆换道时间和空间越充裕，对主线干扰越小，通行能力越大。"},{id:44,type:"single",category:"交通流理论",difficulty:2,question:"双车道公路的服务水平主要依据哪项指标划分？",options:["跟车时间百分率和平均行程速度","V/C比","交通密度","平均延误"],answer:[0],explanation:"双车道公路主要根据跟车时间百分率和平均行程速度划分服务水平。"},{id:45,type:"single",category:"交通流理论",difficulty:2,question:"Greenshields模型中，最大流量Qmax等于？",options:["Vf×Kj/4","Vf×Kj/2","Vf×Kj","Vf×Kj/8"],answer:[0],explanation:"Qmax=Vf×Kj/4。K=Kj/2时Q最大：Qmax=Vf×(Kj/2)×(1-1/2)=Vf×Kj/4。"},{id:46,type:"single",category:"交通流理论",difficulty:3,question:"Greenberg对数模型V=Vm×ln(Kj/K)的适用条件是？",options:["高密度拥挤状态","低密度自由流状态","中等密度状态","所有密度状态"],answer:[0],explanation:"Greenberg模型适用于高密度拥挤流。K→0时V→∞不符合实际。"},{id:47,type:"single",category:"交通流理论",difficulty:3,question:"Underwood指数模型V=Vf×e^(-K/Km)的主要特点？",options:["可拟合低密度自由流，但不适用于高密度","适用于拥挤状态","适用于所有密度","与Greenshields完全相同"],answer:[0],explanation:"Underwood模型在K→0时V→Vf符合实际，但K→Kj时V不为0，不适用于高密度。"},{id:48,type:"single",category:"交通流理论",difficulty:1,question:"从发现障碍物到开始制动这段时间车辆行驶的距离称为？",options:["反应距离","制动距离","停车视距","安全距离"],answer:[0],explanation:"反应距离是驾驶员在反应时间(一般2.5s)内行驶的距离。停车视距=反应距离+制动距离。"},{id:49,type:"single",category:"交通流理论",difficulty:1,question:"85%位车速(V85)在交通工程中常用于？",options:["确定道路的最高限速值","计算平均车速","评价交通拥堵程度","设计交叉口信号配时"],answer:[0],explanation:"85%位车速表示85%的车辆速度等于或低于此值，常用作设置最高限速的参考。"},{id:50,type:"single",category:"交通流理论",difficulty:1,question:"15%位车速在交通工程中的用途是？",options:["确定最低限速值","确定最高限速值","计算平均速度","评价道路服务水平"],answer:[0],explanation:"15%位车速表示15%的车辆速度等于或低于此值，常用作设置最低限速的参考。"},{id:51,type:"single",category:"交通流理论",difficulty:2,question:"双车道公路上表征超车需求得不到满足的指标是？",options:["跟车时间百分率","平均速度","交通密度","超车率"],answer:[0],explanation:"跟车时间百分率是车辆在跟驰状态下行驶时间占总行程时间的百分比。"},{id:52,type:"single",category:"交通流理论",difficulty:2,question:"车头时距与车头间距的关系为？",options:["车头时距=车头间距/速度","车头时距=车头间距×速度","车头时距=速度/车头间距","车头时距=车头间距+速度"],answer:[0],explanation:"h_t=h_s/v。车头时距单位秒(s)，车头间距单位米(m)。"},{id:53,type:"single",category:"交通流理论",difficulty:1,question:"AADT与MADT的关系用哪种系数表示？",options:["月不均匀系数","高峰小时系数","方向不均匀系数","周日不均匀系数"],answer:[0],explanation:"月不均匀系数=MADT/AADT，反映交通量在各月份间的波动。"},{id:54,type:"single",category:"交通流理论",difficulty:2,question:"速度随密度增大而降低、流量呈抛物线形变化的模型是？",options:["Greenshields线性模型","Greenberg对数模型","Underwood指数模型","Pipe模型"],answer:[0],explanation:"Greenshields模型V-K为线性，Q-K为抛物线，是最经典的宏观交通流模型。"},{id:55,type:"single",category:"交通流理论",difficulty:2,question:"Kerner三相交通流理论的三种相态是？",options:["自由流(F)、同步流(S)、宽运动堵塞(J)","自由流、拥挤流、阻塞流","稳定流、不稳定流、强制流","低密度、中密度、高密度"],answer:[0],explanation:"Kerner三相位：自由流(低密度自由行驶)、同步流(高密度速度同步降低)、宽运动堵塞(完全停止的波)。"},{id:56,type:"single",category:"交通流理论",difficulty:1,question:"PCE的含义是？",options:["小客车当量换算系数","大型车排放系数","车辆轴载换算系数","车辆安全等级"],answer:[0],explanation:"PCE(Passenger Car Equivalent)是将不同类型车辆统一换算为标准小客车的当量系数。"},{id:57,type:"single",category:"交通流理论",difficulty:2,question:"大型车混入率对通行能力的影响是？",options:["大型车比例越大，通行能力越小","大型车比例越大，通行能力越大","与通行能力无关","只影响速度"],answer:[0],explanation:"大型车占用更多空间且性能差，混入会降低通行能力。修正系数f_HV<1。"},{id:58,type:"single",category:"交通流理论",difficulty:1,question:"除Q、V、K外，常用哪个参数替代密度？",options:["占有率(Occupancy)","车头时距","平均速度","交通量"],answer:[0],explanation:"占有率是车辆通过某断面的时间占观测总时间的百分比，与密度有良好正相关关系。"},{id:59,type:"single",category:"交通流理论",difficulty:2,question:"可能通行能力需要考虑以下哪个修正因素？",options:["车道宽度和侧向净空修正","路面颜色修正","路龄修正","施工方法修正"],answer:[0],explanation:"可能通行能力=基本通行能力×f_W×f_HV×f_P等修正系数。"},{id:60,type:"single",category:"交通流理论",difficulty:1,question:"交通工程学的研究对象是？",options:["人、车、路、环境及其相互关系","道路设计方法","交通信号控制技术","车辆制造技术"],answer:[0],explanation:"交通工程学研究人、车、路、环境及它们之间的相互关系。"},{id:61,type:"single",category:"交通流理论",difficulty:2,question:"双车道公路交通量接近通行能力时，超车难度如何？",options:["超车极其困难，大部分车辆跟驰行驶","超车变得更容易","超车难度不变","完全无法超车"],answer:[0],explanation:"双车道公路需借对向车道超车。交通量大时对向间隙少，超车机会大大降低。"},{id:62,type:"single",category:"交通流理论",difficulty:1,question:"设计小时交通量DHV通常取一年中的？",options:["第30位最高小时交通量","年平均小时交通量","日最大小时交通量","日最小小时交通量"],answer:[0],explanation:"全年8760小时从大到小排列，第30位DHV。仅29小时超设计值，经济性合理。"},{id:63,type:"single",category:"交通流理论",difficulty:1,question:"车速频率分布直方图中出现频率最高的速度值称为？",options:["众数车速","中位车速","平均车速","85%位车速"],answer:[0],explanation:"众数车速(Modal Speed)是出现频率最高的速度值，反映大多数驾驶员选择的行车速度。"},{id:64,type:"single",category:"交通流理论",difficulty:2,question:"下列哪种状态对应Greenshields模型的非拥挤区(稳定流)？",options:["K≤Kj/2且V≥Vf/2","K>Kj/2","V<Vf/2且K>Kj/2","所有K值范围"],answer:[0],explanation:"非拥挤区(稳定流)：K≤Kj/2,V≥Vf/2,Q随K增大而增大。K>Kj/2为拥挤区。"},{id:65,type:"single",category:"交通流理论",difficulty:3,question:"泊松分布适用于描述什么状态下的车辆到达规律？",options:["低流量、自由流状态","高流量、拥挤状态","饱和流状态","阻塞状态"],answer:[0],explanation:"泊松分布适用于低流量自由流状态下的随机到达。高密度时更适用二项或负二项分布。"},{id:66,type:"single",category:"交通流理论",difficulty:2,question:"环形线圈检测器不能检测以下哪个参数？",options:["车辆颜色","交通量","占有率","速度"],answer:[0],explanation:"环形线圈通过电磁感应可检测交通量、占有率和速度，但无法检测车辆颜色。"},{id:67,type:"single",category:"交通流理论",difficulty:1,question:"交通密度K与交通量Q、区间平均速度Vs的关系为？",options:["K=Q/Vs","K=Q×Vs","K=Vs/Q","K=Q+Vs"],answer:[0],explanation:"由Q=K×Vs变形得K=Q/Vs。"},{id:68,type:"single",category:"交通流理论",difficulty:2,question:"跟驰行驶时，后车反应滞后时间通常取？",options:["1.0~2.5秒","0.1~0.5秒","3.0~5.0秒","5.0~10.0秒"],answer:[0],explanation:"跟驰理论中驾驶员反应滞后时间T通常取1.0~2.5秒。"},{id:69,type:"single",category:"交通流理论",difficulty:2,question:"交通波理论最经典的应用是？",options:["信号交叉口的排队形成与消散分析","高速公路自由流速度分析","停车场车位周转率计算","公交站点停靠时间分析"],answer:[0],explanation:"交通波理论经典应用：红灯期停车波向上游传播(排队形成)，绿灯期起动波向下游传播(消散)。"},{id:70,type:"single",category:"交通流理论",difficulty:2,question:"时间占有率越高，说明交通流状态为？",options:["密度越高，交通越拥挤","密度越低，交通越畅通","速度越高","交通量越大"],answer:[0],explanation:"占有率=车辆通过检测器断面的总时间/观测时间。占有率越高反映密度越大越拥挤。"},{id:71,type:"single",category:"交通流理论",difficulty:1,question:"安全跟车距离通常采用几秒规则？",options:["2~3秒","5~10秒","0.5~1秒","10~15秒"],answer:[0],explanation:"安全跟车的两秒或三秒规则：与前车至少保持2~3秒时距以应对前车突然制动。"},{id:72,type:"single",category:"交通流理论",difficulty:2,question:"饱和流率是指？",options:["绿灯期间以最小车头时距通过停车线的最大流率","整个周期内的平均流率","高峰小时内的最大到达流率","自由流状态下的最大流率"],answer:[0],explanation:"饱和流率S是绿灯期间车辆以稳定的最小车头时距连续通过停车线的最大流率。"},{id:73,type:"single",category:"交通流理论",difficulty:3,question:"饱和流率S与饱和车头时距h_sat的关系为？",options:["S=3600/h_sat","S=h_sat/3600","S=3600×h_sat","S=h_sat×q"],answer:[0],explanation:"S(veh/h)=3600/h_sat(s)。通常h_sat约2.0~2.5秒，S约1440~1800veh/h。"},{id:74,type:"single",category:"交通流理论",difficulty:1,question:"影响城市快速路通行能力最主要的结构因素是？",options:["车道数量和宽度","路面颜色","路灯形式","标志字体"],answer:[0],explanation:"车道数量和宽度是影响快速路通行能力的核心结构因素。"},{id:75,type:"single",category:"交通流理论",difficulty:2,question:"出行发生模型通常用什么指标预测出行量？",options:["土地利用强度、人口、就业岗位等","道路网密度","公交线路数量","停车位数量"],answer:[0],explanation:"出行发生模型通过小区出行量与社会经济变量的关系预测未来出行量。"},{id:76,type:"single",category:"交通流理论",difficulty:2,question:"全有或全无法(AON)交通分配的主要缺点是？",options:["不考虑路网容量限制","计算过于复杂","不能用于大型路网","需要OD数据"],answer:[0],explanation:"AON将OD间所有交通量分配到最短路径，不考虑道路容量限制。"},{id:77,type:"single",category:"交通流理论",difficulty:2,question:"增量分配法相比AON法的改进在于？",options:["分步加载流量，逐步更新路段阻抗","速度更快","不需要路网","不需要OD数据"],answer:[0],explanation:"增量分配法将OD流量分成若干份逐次分配，每次分配后更新路段阻抗，部分反映拥挤效应。"},{id:78,type:"single",category:"交通流理论",difficulty:1,question:"车头时距2秒时单车道理论最大通行能力约为？",options:["1800 veh/h","3600 veh/h","1200 veh/h","900 veh/h"],answer:[0],explanation:"S=3600/2=1800veh/h。理想条件下单条车道的最大通过流量。"},{id:79,type:"single",category:"交通流理论",difficulty:2,question:"高速公路自由流速度FFS的影响因素不包括？",options:["路面材料类型","车道宽度","侧向净空","立交间距"],answer:[0],explanation:"FFS影响因素：车道宽度、侧向净空、立交间距、车道数。路面材料类型不直接修正FFS。"},{id:80,type:"single",category:"交通流理论",difficulty:1,question:"交通调查中人工计数法最大的优点是？",options:["可获取详细的车辆类型和行驶方向信息","精度最高","成本最低","适用范围最广"],answer:[0],explanation:"人工计数法可同时记录车辆类型、行驶方向、车牌号等多种信息，灵活性强。"},{id:81,type:"single",category:"交通流理论",difficulty:3,question:"VISSIM属于哪类交通仿真模型？",options:["微观仿真模型","中观仿真模型","宏观仿真模型","混合仿真模型"],answer:[0],explanation:"VISSIM是典型的微观交通仿真软件，以单个车辆为基本单元，适用于交叉口详细分析。"},{id:82,type:"single",category:"交通流理论",difficulty:3,question:"NaSch元胞自动机模型每个元胞长度通常设为？",options:["7.5米","2.5米","15米","50米"],answer:[0],explanation:"NaSch模型每个元胞7.5m，对应堵塞状态下每辆车的平均占用空间。"},{id:83,type:"single",category:"交通流理论",difficulty:2,question:"设计小时交通量系数K通常的取值范围是？",options:["0.12~0.18","0.01~0.05","0.30~0.50","0.50~0.80"],answer:[0],explanation:"K=30HV/AADT，一般公路K值约0.12~0.18，旅游公路K值可能更高。"},{id:84,type:"single",category:"交通流理论",difficulty:3,question:"Greenshields、Greenberg和Underwood模型都属于？",options:["宏观稳态模型(V-K关系模型)","微观跟驰模型","元胞自动机模型","排队论模型"],answer:[0],explanation:"三者都是描述V-K关系的宏观稳态模型。Greenshields线性，Greenberg对数，Underwood指数。"},{id:85,type:"single",category:"交通流理论",difficulty:2,question:"双车道公路二级服务水平下最大服务交通量(双向合计)一般不超过？",options:["1700 pcu/h","1000 pcu/h","3000 pcu/h","5000 pcu/h"],answer:[0],explanation:"根据规范，双车道公路二级服务水平下最大服务交通量约1700pcu/h。"},{id:86,type:"multi",category:"交通流理论",difficulty:2,question:"交通流理论的三个宏观基本参数包括？",options:["交通量Q","速度V","密度K","车头时距","占有率"],answer:[0,1,2],explanation:"三参数为Q、V、K。Q=KV是基本关系式。"},{id:87,type:"multi",category:"交通流理论",difficulty:2,question:"以下哪些属于常用的速度-密度关系模型？",options:["Greenshields线性模型","Greenberg对数模型","Underwood指数模型","BPR函数模型","Webster模型"],answer:[0,1,2],explanation:"前三种是经典V-K模型。BPR是路阻函数，Webster用于信号配时。"},{id:88,type:"multi",category:"交通流理论",difficulty:1,question:"通行能力可分为以下哪几个层次？",options:["基本通行能力","可能通行能力","设计通行能力","最大通行能力","极限通行能力"],answer:[0,1,2],explanation:"三个层次：基本(理想)、可能(实际条件修正)、设计(考虑服务水平限值)。"},{id:89,type:"multi",category:"交通流理论",difficulty:2,question:"交通规划四阶段法包括以下哪些阶段？",options:["出行发生","出行分布","方式划分","交通分配","交通仿真"],answer:[0,1,2,3],explanation:"四阶段法：发生→分布→方式划分→分配。交通仿真不属于四阶段法。"},{id:90,type:"multi",category:"交通流理论",difficulty:2,question:"以下哪些因素影响高速公路基本路段通行能力？",options:["车道宽度","侧向净空","大型车比例","驾驶员特征","路面颜色"],answer:[0,1,2,3],explanation:"前四项均为修正因素。路面颜色不属于通行能力修正因素。"},{id:91,type:"judge",category:"交通流理论",difficulty:1,question:"交通量Q=速度V×密度K是交通流理论的基本关系式。",options:["正确","错误"],answer:[0],explanation:"正确。Q=KV适用于任何交通流状态，是宏观交通流理论的基石。"},{id:92,type:"judge",category:"交通流理论",difficulty:1,question:"Greenshields模型中当K=Kj/2时流量达到最大值。",options:["正确","错误"],answer:[0],explanation:"正确。Km=Kj/2时Qmax=Vf×Kj/4。"},{id:93,type:"judge",category:"交通流理论",difficulty:1,question:"设计小时交通量通常取第1位(最大)小时交通量。",options:["正确","错误"],answer:[1],explanation:"错误。DHV取第30位小时交通量(30HV)，取第1位会造成严重浪费。"},{id:94,type:"judge",category:"交通流理论",difficulty:1,question:"车头时距是前后两车车头通过同一断面的时间差，单位为秒。",options:["正确","错误"],answer:[0],explanation:"正确。车头时距描述前后车通过同一断面的时间间隔。"},{id:95,type:"judge",category:"交通流理论",difficulty:1,question:"交通波波速为正时表示波向下游方向传播。",options:["正确","错误"],answer:[0],explanation:"正确。ω>0向下游传播，ω<0向上游传播。"},{id:96,type:"judge",category:"交通流理论",difficulty:2,question:"自由流状态下车辆到达服从正态分布。",options:["正确","错误"],answer:[1],explanation:"错误。自由流状态下车辆到达服从泊松分布，车头时距服从负指数分布。"},{id:97,type:"judge",category:"交通流理论",difficulty:1,question:"空间平均速度总是大于或等于时间平均速度。",options:["正确","错误"],answer:[1],explanation:"错误。通常Vs≤Vt，二者之差随速度离散程度增大而增大。"},{id:98,type:"judge",category:"交通流理论",difficulty:1,question:"PHF值越大说明高峰小时内交通分布越不均匀。",options:["正确","错误"],answer:[1],explanation:"错误。PHF越接近1越均匀，PHF越小(接近0.25)越不均匀。"},{id:99,type:"judge",category:"交通流理论",difficulty:2,question:"Wardrop第一原理与第二原理在无拥挤路网中分配结果一致。",options:["正确","错误"],answer:[0],explanation:"正确。无拥挤时阻抗不随流量变化，UE与SO等价。"},{id:100,type:"judge",category:"交通流理论",difficulty:2,question:"可接受间隙理论主要用于分析高速公路基本路段通行能力。",options:["正确","错误"],answer:[1],explanation:"错误。可接受间隙理论主要用于分析无信号交叉口的通行能力。"},{id:101,type:"single",category:"交通流理论",difficulty:1,question:"PHF值通常用于衡量？",options:["高峰小时内交通流的不均匀性","日交通量的波动","月交通量的变化","年交通量的增长"],answer:[0],explanation:"PHF(Peak Hour Factor)高峰小时系数衡量高峰小时内各时段交通量分布均匀程度。"},{id:102,type:"single",category:"交通流理论",difficulty:3,question:"某道路高峰小时交通量4000veh/h，四个连续15分钟流量为1200,1100,900,800。PHF为？",options:["0.833","0.750","0.909","1.200"],answer:[0],explanation:"PHF=4000/(4×1200)=4000/4800=0.833。"},{id:103,type:"single",category:"交通流理论",difficulty:2,question:"30HV概念中，将全年8760小时从大到小排列，第30位意味着？",options:["全年仅29个小时交通量超过设计值","全年30个小时超过设计值","全年全部小时低于设计值","每天有30个小时超过设计值"],answer:[0],explanation:"全年仅前29个小时交通量超过30HV，约占总时间的0.33%，兼顾需求和经济性。"},{id:104,type:"single",category:"交通流理论",difficulty:2,question:"浮动车法中测试车往返行驶需记录的数据不包括？",options:["驾驶员姓名","对向来车数","超越测试车的车辆数","被测试车超越的车辆数"],answer:[0],explanation:"浮动车法需记录：对向来车数X、超越测试车数Y、被测试车超越数Z以及行程时间，无需记录驾驶员信息。"},{id:105,type:"single",category:"交通流理论",difficulty:3,question:"浮动车法测交通量公式Q=(X+Y-Z)/(ta+tw)中，Y的含义是？",options:["超越测试车的同向车辆数","对向来车数","被测试车超越的车辆数","测试车行程时间"],answer:[0],explanation:"Y是行驶中超越测试车的同方向车辆数。Q=(X+Y-Z)/(ta+tw)。"},{id:106,type:"single",category:"交通流理论",difficulty:2,question:"Greenshields模型中Q-K曲线在K=0处的切线斜率等于？",options:["Vf","0","-Vf","Vf/2"],answer:[0],explanation:"dQ/dK=Vf(1-2K/Kj)，K=0时斜率为Vf。"},{id:107,type:"single",category:"交通流理论",difficulty:2,question:"Greenshields模型中，流量最大时的速度(临界速度)与Vf的关系是？",options:["V=Vf/2","V=Vf","V=0","V=Vf/4"],answer:[0],explanation:"最佳状态时Km=Kj/2，Vm=Vf(1-1/2)=Vf/2。"},{id:108,type:"single",category:"交通流理论",difficulty:2,question:"我国高速公路自由流速度FFS的典型范围是？",options:["100~120 km/h","60~80 km/h","40~60 km/h","140~160 km/h"],answer:[0],explanation:"我国高速公路设计速度通常80、100、120km/h，FFS与之相近约100~120km/h。"},{id:109,type:"single",category:"交通流理论",difficulty:3,question:"移位负指数分布中最小车头时距τ的含义是？",options:["车辆之间必须保持的最小安全时间间隔","车头时距的算术平均值","车头时距的方差","最大车头时距"],answer:[0],explanation:"移位负指数分布f(t)=λe^{-λ(t-τ)}(t≥τ)，τ是最小安全时距(约0.5-1.0s)。"},{id:110,type:"single",category:"交通流理论",difficulty:3,question:"爱尔朗分布(Erlang distribution)适用于描述什么交通状态下的车头时距？",options:["中等流量至较高流量，车辆间有一定相互影响","极低流量完全自由流","阻塞状态","超高流量"],answer:[0],explanation:"爱尔朗分布适用于中等至较高流量状态，车辆间有一定相互影响但未完全跟驰的情况。"},{id:111,type:"single",category:"交通流理论",difficulty:2,question:"交通流由自由流变为拥挤流时出现的交通波称为？",options:["集结波","消散波","停车波","起动波"],answer:[0],explanation:"集结波是交通流从低密度区向高密度区过渡时产生的波，波速为正(向下游)或负(向上游)取决于密度差。"},{id:112,type:"single",category:"交通流理论",difficulty:3,question:"排队溢出(Queue Spillback)会产生什么影响？",options:["影响上游交叉口的正常运行","提高下游交叉口的通行能力","减少总延误","对交通流无影响"],answer:[0],explanation:"排队溢出指排队长度超过路段长度，延伸到上游交叉口，导致上游交叉口车辆无法正常通过，产生连锁拥堵。"},{id:113,type:"single",category:"交通流理论",difficulty:2,question:"交通工程中MADT的含义是？",options:["月平均日交通量","年平均日交通量","周平均日交通量","日最大交通量"],answer:[0],explanation:"MADT(Monthly Average Daily Traffic)即月平均日交通量，等于某月交通量总和除以该月天数。"},{id:114,type:"single",category:"交通流理论",difficulty:1,question:"速度标准差越大，说明交通流速度的离散程度如何？",options:["离散程度越大","离散程度越小","离散程度不变","无法判断"],answer:[0],explanation:"速度标准差是衡量速度离散程度的统计指标，标准差越大车速差异越大，交通安全性越低。"},{id:115,type:"single",category:"交通流理论",difficulty:2,question:"在双车道公路上，跟车时间百分率超过多少时认为服务水平较差？",options:["超过60%~70%","超过10%~20%","超过90%~100%","超过30%~40%"],answer:[0],explanation:"跟车时间百分率超过60%-70%表明超车机会极少，大部分车辆被迫跟驰，服务水平明显下降。"},{id:116,type:"single",category:"交通管理与控制",difficulty:1,question:"交通管理与控制的主要目标不包括？",options:["增加车辆保有量","提高交通安全","提高运行效率","减少交通拥堵"],answer:[0],explanation:"交通管理与控制的目标是提高安全、效率和环保水平，减少拥堵，而非增加车辆保有量。"},{id:117,type:"single",category:"交通管理与控制",difficulty:1,question:"信号配时的三个基本参数是？",options:["周期时长、绿信比、相位差","红灯时间、黄灯时间、绿灯时间","流量、速度、密度","周期、相位、相序"],answer:[0],explanation:"信号配时三要素：周期时长(C)、绿信比(λ)和相位差(offset)，是城市交通信号控制的基础。"},{id:118,type:"single",category:"交通管理与控制",difficulty:2,question:"Webster最佳周期时长公式的主要目标是？",options:["使交叉口总延误最小","使通行能力最大","使排队长度最短","使停车次数最少"],answer:[0],explanation:"Webster公式C0=(1.5L+5)/(1-Y)旨在使信号交叉口总延误最小，是最经典的定时信号配时方法。"},{id:119,type:"single",category:"交通管理与控制",difficulty:2,question:"Webster公式中，Y值的含义是？",options:["各相位最大流量比之和","绿灯时间总和","周期总损失时间","饱和度"],answer:[0],explanation:"Y=∑max(y_i)，是各相位关键车道流量比(y=q/S)的最大值之和。Y<1是配时可行的前提条件。"},{id:120,type:"single",category:"交通管理与控制",difficulty:2,question:"信号周期中的损失时间L主要包括？",options:["起动损失时间和全红清空时间","绿灯时间","黄灯时间","红灯时间"],answer:[0],explanation:"损失时间L=各相位的起动损失时间+全红清空时间之和，是信号周期中未被有效利用的时间。"},{id:121,type:"single",category:"交通管理与控制",difficulty:1,question:"绿信比的定义是？",options:["有效绿灯时间与周期时长之比","绿灯时间与红灯时间之比","绿灯时间与黄灯时间之比","有效绿灯时间与红灯时间之比"],answer:[0],explanation:"绿信比λ=有效绿灯时间/周期时长，决定各相位分配到的通行时间比例。"},{id:122,type:"single",category:"交通管理与控制",difficulty:2,question:"饱和流量S通常约为多少？",options:["1500~2000 pcu/h/车道","500~1000 pcu/h/车道","3000~4000 pcu/h/车道","5000~6000 pcu/h/车道"],answer:[0],explanation:"饱和流量S约1500~2000pcu/h/车道(理想条件)，具体值受车道宽度、纵坡、转向比例等影响。"},{id:123,type:"single",category:"交通管理与控制",difficulty:2,question:"饱和度x的定义是？",options:["实际到达流量与通行能力之比","绿灯时间与周期之比","实际流量与饱和流量之比","延误与周期之比"],answer:[0],explanation:"饱和度x=q/C=q/(λ×S)，是衡量交叉口运行质量的关键指标，通常要求x<0.9。"},{id:124,type:"single",category:"交通管理与控制",difficulty:3,question:"某交叉口周期120s，某相位绿信比0.25，饱和流量1800pcu/h，相位实际流量400pcu/h。该相位饱和度为？",options:["0.89","0.75","0.50","1.20"],answer:[0],explanation:"通行能力=λ×S=0.25×1800=450pcu/h。饱和度x=q/C=400/450=0.889≈0.89。"},{id:125,type:"single",category:"交通管理与控制",difficulty:2,question:"感应信号控制与定时信号控制的主要区别是？",options:["感应控制根据实际交通需求调整绿灯时长","感应控制周期固定","感应控制不需要检测器","感应控制只适用于单交叉口"],answer:[0],explanation:"感应控制通过车辆检测器实时检测交通需求，动态调整绿灯时间，适应交通流波动。"},{id:126,type:"single",category:"交通管理与控制",difficulty:2,question:"干线协调控制(绿波控制)中，相位差的作用是？",options:["使车辆沿干线连续通过多个交叉口","增加各交叉口的周期时长","提高单个交叉口的通行能力","减少行人过街时间"],answer:[0],explanation:"相位差(offset)是相邻交叉口之间绿灯起始时刻的时间差，通过合理设置实现车辆连续通过多个路口形成绿波。"},{id:127,type:"single",category:"交通管理与控制",difficulty:2,question:"实现双向绿波控制需要满足什么条件？",options:["相邻交叉口间距和行驶速度满足特定关系","所有交叉口采用相同周期","所有交叉口采用相同绿信比","交通量在各方向相等"],answer:[0],explanation:"双向绿波要求交叉口间距、行驶速度和周期时长满足一定关系(如同步式或交互式协调)，对条件要求较高。"},{id:128,type:"single",category:"交通管理与控制",difficulty:1,question:"交通标志中，警告标志的颜色通常为？",options:["黄底黑字黑边框","红底白字","蓝底白字","绿底白字"],answer:[0],explanation:"警告标志为黄底、黑字、黑色边框，用于提醒驾驶员注意前方危险或特殊情况。"},{id:129,type:"single",category:"交通管理与控制",difficulty:1,question:"禁止标志的颜色通常为？",options:["红圈白底黑图案","黄底黑图案","蓝底白图案","绿底白图案"],answer:[0],explanation:"禁止标志(禁令标志)为红色圆圈、白底、黑色图案，表示禁止或限制车辆、行人的交通行为。"},{id:130,type:"single",category:"交通管理与控制",difficulty:1,question:"指路标志的颜色通常为？",options:["蓝底白字(一般道路)或绿底白字(高速公路)","红底白字","黄底黑字","白底黑字"],answer:[0],explanation:"指路标志：一般道路用蓝底白字，高速公路用绿底白字，传递方向、地点、距离等信息。"},{id:131,type:"single",category:"交通管理与控制",difficulty:1,question:"交通标线中，白色虚线表示？",options:["允许车辆跨越","禁止车辆跨越","仅供行人使用","仅供非机动车使用"],answer:[0],explanation:"白色虚线分隔同向车流，允许车辆在安全情况下跨越或变换车道。"},{id:132,type:"single",category:"交通管理与控制",difficulty:1,question:"黄色实线在道路中心表示？",options:["禁止车辆跨越","允许车辆跨越","仅供临时停车","表示车道边缘"],answer:[0],explanation:"黄色实线(单黄实线或双黄实线)表示禁止车辆跨越超车或压线行驶。"},{id:133,type:"single",category:"交通管理与控制",difficulty:2,question:"交叉口交通冲突点中，最危险的是？",options:["交叉冲突点","分流点","合流点","交织点"],answer:[0],explanation:"交叉冲突点是不同方向车流以交叉方式相遇的点，危险性最高。分流点和合流点危险程度相对较低。"},{id:134,type:"single",category:"交通管理与控制",difficulty:2,question:"环形交叉口(环岛)的优点不包括？",options:["通行能力大，适合高流量","减少交叉冲突点","车辆连续运行减少停车","降低事故严重程度"],answer:[0],explanation:"环岛适用于中低流量，当交通量过大时会产生锁死现象。大流量交叉口通常需信号灯控制。"},{id:135,type:"single",category:"交通管理与控制",difficulty:1,question:"交叉口信号灯由绿灯变为红灯之前，通常设置什么过渡信号？",options:["黄灯","全红","闪烁绿灯","白灯"],answer:[0],explanation:"黄灯(amber/yellow)作为绿灯到红灯的过渡信号，提醒驾驶员信号即将变为红灯，清空交叉口。"},{id:136,type:"single",category:"交通管理与控制",difficulty:2,question:"全红时间(All-red Time)的作用是？",options:["清空交叉口内滞留车辆","增加通行能力","减少停车次数","延长绿灯时间"],answer:[0],explanation:"全红时间是所有方向均为红灯的时间，用于清空上一个相位进入交叉口尚未驶离的车辆，防止冲突。"},{id:137,type:"single",category:"交通管理与控制",difficulty:3,question:"某交叉口两相位控制，总损失时间L=10s，总流量比Y=0.7。Webster最佳周期为？",options:["C0=50s","C0=100s","C0=150s","C0=200s"],answer:[0],explanation:"C0=(1.5L+5)/(1-Y)=(1.5×10+5)/(1-0.7)=20/0.3=66.7s，取整约70s。"},{id:138,type:"single",category:"交通管理与控制",difficulty:2,question:"交通需求管理(TDM)的主要手段不包括？",options:["增加道路供给","拥堵收费","停车管理","公交优先"],answer:[0],explanation:"TDM旨在管理交通需求而非增加供给。增加道路供给属于交通系统管理(TSM)中的供给策略。"},{id:139,type:"single",category:"交通管理与控制",difficulty:2,question:"公交优先信号控制的主要策略是？",options:["为公交车提供优先通行权，减少延误","增加公交车班次","提高公交车票价","减少公交车站"],answer:[0],explanation:"公交优先信号通过延长绿灯、提前开启绿灯或插入专用相位等方式减少公交车在交叉口的延误。"},{id:140,type:"single",category:"交通管理与控制",difficulty:2,question:"单行道交通组织的优点是？",options:["提高通行能力，减少冲突点","增加车辆绕行距离","减少商业活力","增加交通标志"],answer:[0],explanation:"单行道可简化交叉口相位、减少冲突点、提高通行能力，但对周边出行有一定影响。"},{id:141,type:"single",category:"交通管理与控制",difficulty:3,question:"区域交通信号控制系统(如SCOOT、SCATS)的工作原理是？",options:["根据区域交通流实时数据动态优化信号配时","所有交叉口使用固定配时","各交叉口独立运行","仅采集数据不进行控制"],answer:[0],explanation:"SCOOT和SCATS等系统通过检测器采集实时交通数据，在区域层面优化各交叉口信号配时参数。"},{id:142,type:"single",category:"交通管理与控制",difficulty:2,question:"可变信息标志(VMS)的主要功能是？",options:["向驾驶员发布实时交通信息","取代交通警察","替代交通标志","自动扣费"],answer:[0],explanation:"可变信息标志(VMS/Variable Message Signs)实时发布前方路况、事故、拥堵、天气等信息引导驾驶员合理选择路线。"},{id:143,type:"single",category:"交通管理与控制",difficulty:1,question:"最低限速标志属于哪类交通标志？",options:["禁令标志","警告标志","指示标志","指路标志"],answer:[0],explanation:"最低限速标志为蓝色圆形，属于指示标志(有些分类归入禁令标志的限速解除)，规定车辆最低行驶速度。"},{id:144,type:"single",category:"交通管理与控制",difficulty:2,question:"信号交叉口的通行能力分析中，关键车道(Critical Lane)是指？",options:["每个相位中流量比最大的车道","交通量最大的车道","车道数最多的车道","速度最快的车道"],answer:[0],explanation:"关键车道是每个相位中流量比(q/S)最大的车道，其流量比决定了该相位所需的最小绿灯时间。"},{id:145,type:"single",category:"交通管理与控制",difficulty:1,question:"停车让行标志的形状为？",options:["八角形(正八边形)","三角形","圆形","方形"],answer:[0],explanation:"停车让行(Stop)标志为红色八角形(正八边形)，是唯一一个八角形的交通标志。"},{id:146,type:"single",category:"交通管理与控制",difficulty:1,question:"减速让行标志的形状为？",options:["倒三角形","圆形","正三角形","方形"],answer:[0],explanation:"减速让行(Yield)标志为倒置的等边三角形(顶点向下)，表示车辆应减速让行。"},{id:147,type:"single",category:"交通管理与控制",difficulty:2,question:"高速公路入口匝道控制(Ramp Metering)的主要目的是？",options:["控制进入主线的流量，维持主线畅通","增加匝道通行能力","减少匝道排队","加快匝道车辆通行"],answer:[0],explanation:"匝道控制通过信号灯调节进入高速公路主线的车辆流率，防止主线因流量过大而拥堵。"},{id:148,type:"single",category:"交通管理与控制",difficulty:2,question:"交通事故现场的安全防护措施不包括？",options:["立即拖走所有车辆","设置警示标志","摆放锥形桶","开启警灯"],answer:[0],explanation:"事故现场应先保护现场、设置警示标志确保安全，不应未勘查即拖走车辆(需先固定证据)。"},{id:149,type:"single",category:"交通管理与控制",difficulty:1,question:"城市道路交通噪声的主要控制措施不包括？",options:["增加道路车道数","设置声屏障","控制车速","使用低噪声路面"],answer:[0],explanation:"增加车道数不能有效降低噪声，反而可能吸引更多交通量。声屏障、限速、低噪声路面是有效的降噪措施。"},{id:150,type:"single",category:"交通管理与控制",difficulty:2,question:"在平面交叉口，左转专用相位的设置条件是？",options:["左转交通量较大且对向冲突严重","所有交叉口均应设置","只有大型交叉口才需要","仅当有左转专用车道时"],answer:[0],explanation:"当左转交通量超过一定阈值(通常100-300veh/h)且与对向直行车流冲突严重时，应设置左转专用相位。"},{id:201,type:"single",category:"交通管理与控制",difficulty:2,question:"干线协调控制中，交互式协调方式是指？",options:["相邻交叉口绿灯起始时刻错开半个周期","相邻交叉口绿灯起始时刻相同","所有交叉口使用不同周期","各交叉口独立运行"],answer:[0],explanation:"交互式协调：相邻交叉口绿灯起始时刻错开半个周期(C/2)，适用于交叉口间距较短的干线。"},{id:202,type:"single",category:"交通管理与控制",difficulty:2,question:"干线协调控制中，同步式协调方式是指？",options:["相邻交叉口绿灯起始时刻相同","相邻交叉口绿灯起始时刻错开半个周期","各交叉口周期不同","各交叉口独立运行"],answer:[0],explanation:"同步式协调：相邻交叉口绿灯起始时刻相同(相位差=0)，适用于交叉口间距接近1/2波长倍数时。"},{id:203,type:"single",category:"交通管理与控制",difficulty:3,question:"绿波带的带宽受哪项因素制约最大？",options:["关键交叉口的绿信比","交通流量","天气条件","路面颜色"],answer:[0],explanation:"绿波带带宽由关键交叉口(瓶颈交叉口)的最小绿信比决定，该交叉口限制了整个绿波系统可通过的时间窗口。"},{id:204,type:"single",category:"交通管理与控制",difficulty:1,question:"交叉口的相位(Phase)是指？",options:["信号灯在周期内分配给一股或多股交通流的通行权","信号灯的颜色变化","信号灯的一个完整循环","每种交通流的方向"],answer:[0],explanation:"相位是信号周期内分配给一股或多股交通流(同时获得通行权)的时间段。"},{id:205,type:"single",category:"交通管理与控制",difficulty:2,question:"两相位信号控制适用于什么类型的交叉口？",options:["左转交通量较小的简单交叉口","所有类型交叉口","大型多路交叉口","立交桥"],answer:[0],explanation:"两相位控制适用于左转交通量较小、冲突不严重的简单交叉口。左转交通量大时需设置左转专用相位。"},{id:206,type:"single",category:"交通管理与控制",difficulty:3,question:"四相位信号控制中，典型相序方案不包括？",options:["同时放行所有方向","对向左转先行，对向直行后行","单口放行(各方向依次放行)","先直行后左转，分向放行"],answer:[0],explanation:"四相位控制常见方案：对向左转+直行组合、单口轮放等。同时放行所有方向会导致严重冲突，不可行。"},{id:207,type:"single",category:"交通管理与控制",difficulty:2,question:"交通标志的支撑方式不包括？",options:["地下式","柱式","悬臂式","门架式"],answer:[0],explanation:"交通标志支撑方式有：柱式(单柱/双柱)、悬臂式、门架式、附着式(附着于其他结构)。没有地下式。"},{id:208,type:"single",category:"交通管理与控制",difficulty:1,question:"我国城市道路交通信号灯，红灯亮时表示？",options:["禁止通行","允许通行","警示注意","准备通行"],answer:[0],explanation:"红灯表示禁止通行，车辆应当在停止线以外停车等待。"},{id:209,type:"single",category:"交通管理与控制",difficulty:2,question:"交通标线的分类按功能可分为？",options:["指示标线、禁止标线、警告标线","白色标线和黄色标线","纵向标线和横向标线","热熔型和溶剂型"],answer:[0],explanation:"按功能：指示标线(允许)、禁止标线(禁止)、警告标线(提醒)。按颜色分为白色和黄色。"},{id:210,type:"single",category:"交通管理与控制",difficulty:3,question:"SCOOT城市交通信号控制系统的核心优化算法是？",options:["小步长逐步调整绿信比、周期和相位差","一次性大幅调整所有参数","仅调整周期","仅调整绿信比"],answer:[0],explanation:"SCOOT(Split Cycle Offset Optimisation Technique)以小步长(几秒)逐步优化周期、绿信比和相位差，避免大幅波动。"},{id:211,type:"single",category:"交通管理与控制",difficulty:2,question:"SCATS系统与SCOOT系统的主要区别在于？",options:["SCATS使用战略控制和战术控制分层结构","SCATS不使用检测器","SCATS不能协调控制","SCATS不调整周期"],answer:[0],explanation:"SCATS采用分层控制：战略层选择方案(周期和相位差)，战术层根据实时需求微调绿信比。"},{id:212,type:"single",category:"交通管理与控制",difficulty:2,question:"高速公路主线控制(Mainline Control)的主要手段不包括？",options:["增加主线车道数","可变限速控制","车道使用控制","驾驶员信息发布"],answer:[0],explanation:"主线控制通过速度控制、车道管理、信息发布等手段调节主线交通流。增加车道数属于工程措施而非控制手段。"},{id:213,type:"single",category:"交通管理与控制",difficulty:1,question:"可变限速控制的主要目的是？",options:["根据实时交通和天气条件调整限速以提高安全和效率","提高车辆通行速度","减少道路维护","增加罚款收入"],answer:[0],explanation:"可变限速根据交通流量、天气、事故等实时条件动态调整限速值，平滑交通流，减少追尾事故。"},{id:214,type:"single",category:"交通管理与控制",difficulty:2,question:"高速公路通道控制(Corridor Control)的含义是？",options:["将拥挤路段的交通量转移到相邻平行道路上","仅控制主线交通","仅控制匝道交通","增加主线车道"],answer:[0],explanation:"通道控制通过协调主线、匝道和相邻平行道路的信号和信息系统，在路网层面实现交通流均衡分布。"},{id:215,type:"single",category:"交通管理与控制",difficulty:2,question:"交通信号控制中，半感应控制的检测器通常设置在？",options:["次要道路入口","主要道路入口","所有入口","交叉口出口"],answer:[0],explanation:"半感应控制在次要道路入口设置检测器，主要道路保持常绿，次路有车请求时才给予通行权。"},{id:216,type:"single",category:"交通管理与控制",difficulty:2,question:"全感应控制中，检测器应设置在？",options:["所有进口道","仅主要道路","仅次要道路","交叉口中心"],answer:[0],explanation:"全感应控制在所有进口道设置检测器，各方向根据实际到达车辆动态分配绿灯时间。"},{id:217,type:"single",category:"交通管理与控制",difficulty:1,question:"交叉口人行横道信号灯的绿灯持续时间通常如何确定？",options:["按行人过街速度(1.2m/s)和路宽计算","按车辆通行时间确定","固定为30秒","按高峰期车辆数确定"],answer:[0],explanation:"行人绿灯时间=路宽/行人步行速度(通常取1.2m/s)，确保行人能安全通过。"},{id:218,type:"single",category:"交通管理与控制",difficulty:2,question:"潮汐车道(可变车道)适用于什么交通特征的道路？",options:["早晚高峰方向交通量明显不均衡","全天交通量均衡分布","交通量很低","单向道路"],answer:[0],explanation:"潮汐车道(Reversible Lane)适用于早晚高峰方向分布严重不平衡(如D>0.67)的道路，通过改变车道方向适应潮汐交通。"},{id:219,type:"single",category:"交通管理与控制",difficulty:2,question:"HOV车道(高承载率车道)一般要求车辆乘坐人数不少于？",options:["2~3人","1人","5人","10人"],answer:[0],explanation:"HOV(High-Occupancy Vehicle)车道一般要求2人(2+)或3人(3+)以上，鼓励合乘以减少单人驾车。"},{id:220,type:"single",category:"交通管理与控制",difficulty:1,question:"交通宁静化(Traffic Calming)措施不包括？",options:["拓宽道路增加车道","减速丘","路面窄化","抬高人行横道"],answer:[0],explanation:"交通宁静化旨在降低车速、减少穿越交通。减速丘、路面窄化、抬高人行横道、交叉口窄化等是典型措施。"},{id:221,type:"single",category:"交通管理与控制",difficulty:2,question:"停车管理策略中，路内停车与路外停车的根本区别是？",options:["路内停车占用道路通行空间","路内停车是免费的","路外停车是收费的","路内停车限时"],answer:[0],explanation:"路内停车占用道路空间影响交通运行，路外停车利用专门停车场库不影响道路通行。路内停车应根据道路条件进行管理。"},{id:222,type:"single",category:"交通管理与控制",difficulty:2,question:"交通诱导系统中的行程时间预测通常采用什么方法？",options:["基于历史数据和实时检测数据的融合预测","仅使用历史数据","仅使用当前数据","随机猜测"],answer:[0],explanation:"行程时间预测通常采用历史数据模式匹配与实时数据修正相融合的方法，如卡尔曼滤波、神经网络等。"},{id:223,type:"single",category:"交通管理与控制",difficulty:2,question:"城市道路交通拥堵指数(Traffic Performance Index, TPI)的计算基础是？",options:["路段行程时间与自由流行程时间的比值","交通量","事故数量","道路长度"],answer:[0],explanation:"TPI基于行程时间比(Travel Time Index=实际时间/自由流时间)计算，反映道路网络的拥堵程度。"},{id:224,type:"single",category:"交通管理与控制",difficulty:1,question:"道路交通标线中，导流线(V型线)的作用是？",options:["引导车辆按规定的路线行驶","禁止车辆通行","仅供行人使用","划分停车位"],answer:[0],explanation:"导流线(鱼肚纹)引导车辆按规定的路线行驶，压线行驶属于违规行为。常见于交叉口和匝道。"},{id:225,type:"single",category:"交通管理与控制",difficulty:1,question:"人行横道预告标线(菱形标志)的作用是？",options:["提示驾驶员前方有人行横道","禁止行人通过","表示行人专用区","指示前方学校"],answer:[0],explanation:"菱形标线(人行横道预告标线)设置在人行横道前30~50m处，提醒驾驶员前方有人行横道需减速。"},{id:226,type:"single",category:"交通管理与控制",difficulty:3,question:"某信号交叉口四个进口道的流量比分别为0.22, 0.28, 0.18, 0.32，采用两相位(对向配对)。总Y值为？",options:["0.60","0.50","1.00","0.32"],answer:[0],explanation:"两相位：相位1取max(0.22,0.28)=0.28+max(0.18,0.32)=0.32=0.60为总Y值。"},{id:227,type:"single",category:"交通管理与控制",difficulty:3,question:"有效绿灯时间与显示绿灯时间的关系为？",options:["有效绿灯=显示绿灯+黄灯-损失时间","有效绿灯=显示绿灯","有效绿灯=显示绿灯-黄灯","有效绿灯=显示绿灯+损失时间"],answer:[0],explanation:"有效绿灯时间=显示绿灯时间+黄灯时间-起动损失时间，是被有效利用于通行的绿灯时间。"},{id:228,type:"single",category:"交通管理与控制",difficulty:2,question:"交通安全设施中，护栏按结构形式可分为？",options:["刚性、半刚性和柔性护栏","混凝土护栏和钢护栏","路侧护栏和中央护栏","波形梁护栏和缆索护栏"],answer:[0],explanation:"护栏按结构形式分：刚性护栏(混凝土)、半刚性护栏(波形梁钢护栏)、柔性护栏(缆索护栏)三种。"},{id:229,type:"single",category:"交通管理与控制",difficulty:1,question:"道路交通标线中，减速标线的设置目的是？",options:["使驾驶员产生车道变窄的视觉感受从而自然减速","强制车辆停车","分隔对向车流","引导车辆转弯"],answer:[0],explanation:"减速标线(横向或纵向减速标线)通过视觉错觉使驾驶员感到车道在变窄，从而自觉降低车速。"},{id:230,type:"single",category:"交通管理与控制",difficulty:3,question:"区域交通信号控制评价指标中，通常不包括？",options:["车辆油耗量(精确值)","总延误","停车次数","通行量"],answer:[0],explanation:"区域信号控制主要评价指标：总延误、停车次数、通行量、排队长度。精确油耗难以实时测量，通常用延误和停车次数间接反映。"},{id:231,type:"multi",category:"交通管理与控制",difficulty:2,question:"信号配时的三个基本参数是？",options:["周期时长","绿信比","相位差","红灯时长","黄灯时长"],answer:[0,1,2],explanation:"信号配时三要素：周期时长(C)、绿信比(λ)和相位差(offset)。"},{id:232,type:"multi",category:"交通管理与控制",difficulty:2,question:"以下哪些属于交通需求管理(TDM)措施？",options:["拥堵收费","停车管理","公交优先","增加道路车道","合乘激励"],answer:[0,1,2,4],explanation:"TDM措施包括拥堵收费、停车管理、公交优先、合乘激励、出行替代等。增加道路车道属于供给管理。"},{id:233,type:"multi",category:"交通管理与控制",difficulty:1,question:"交通标志按功能可分为哪些类型？",options:["警告标志","禁令标志","指示标志","指路标志","施工标志"],answer:[0,1,2,3],explanation:"交通标志主要类型：警告(黄底)、禁令(红圈)、指示(蓝圆)、指路(蓝/绿底)以及旅游区、施工等辅助标志。"},{id:234,type:"multi",category:"交通管理与控制",difficulty:2,question:"以下哪些属于高速公路入口匝道控制策略？",options:["定时控制","感应控制","匝道关闭","不停车收费"],answer:[0,1,2],explanation:"匝道控制策略包括定时匝道控制、感应(动态)匝道控制和匝道关闭。不停车收费属于收费系统非匝道控制。"},{id:235,type:"multi",category:"交通管理与控制",difficulty:2,question:"交叉口需要设置左转专用相位的条件通常包括？",options:["左转交通量较大(>100-300veh/h)","对向直行冲突严重","发生过左转相关事故","任何情况下都应设置"],answer:[0,1,2],explanation:"左转专用相位设置条件：左转量超过阈值、对向冲突严重、安全记录差等。并非所有交叉口都需要。"},{id:236,type:"multi",category:"交通管理与控制",difficulty:2,question:"以下哪些属于交通宁静化(Traffic Calming)措施？",options:["减速丘","抬高人行横道","交叉口窄化","拓宽道路","曲折车道"],answer:[0,1,2,4],explanation:"交通宁静化措施：减速丘、抬高人行横道/交叉口、曲折车道(Chicane)、路面窄化等。拓宽道路会鼓励加速。"},{id:237,type:"multi",category:"交通管理与控制",difficulty:2,question:"交通信号灯的颜色通常包括？",options:["红色","绿色","黄色","蓝色","白色"],answer:[0,1,2],explanation:"标准交通信号灯颜色为红(禁止)、黄(警告/过渡)、绿(允许)。蓝和白不用于常规车辆信号灯。"},{id:238,type:"multi",category:"交通管理与控制",difficulty:3,question:"区域交通信号控制系统的典型代表包括？",options:["SCOOT","SCATS","ACTRA","VMS","GPS"],answer:[0,1,2],explanation:"SCOOT(英国)、SCATS(澳大利亚)、ACTRA(美国)是主流区域信号控制系统。VMS是信息发布系统，GPS是导航定位系统。"},{id:239,type:"multi",category:"交通管理与控制",difficulty:2,question:"以下哪些属于单点信号控制方式？",options:["定时控制","感应控制","半感应控制","干线协调控制","区域自适应控制"],answer:[0,1,2],explanation:"单点控制包括定时、全感应、半感应。干线协调和区域自适应属于系统控制层面。"},{id:240,type:"multi",category:"交通管理与控制",difficulty:2,question:"交通标线按功能可分为哪些类型？",options:["指示标线","禁止标线","警告标线","装饰标线","导向标线"],answer:[0,1,2],explanation:"按功能分：指示标线(虚白线可跨越)、禁止标线(实黄线禁止跨越)、警告标线(减速标线等)。"},{id:241,type:"judge",category:"交通管理与控制",difficulty:1,question:"绿灯亮时表示允许车辆通行。",options:["正确","错误"],answer:[0],explanation:"正确。绿灯表示允许通行，但转弯车辆不得妨碍直行车辆和行人。"},{id:242,type:"judge",category:"交通管理与控制",difficulty:1,question:"黄灯亮起时，已越过停止线的车辆可以继续通行。",options:["正确","错误"],answer:[0],explanation:"正确。黄灯时已越过停止线的车辆可以继续通过，未越过停止线的应当停车。"},{id:243,type:"judge",category:"交通管理与控制",difficulty:2,question:"Webster最佳周期公式适用于任何饱和度的交叉口。",options:["正确","错误"],answer:[1],explanation:"错误。Webster公式要求Y<1(未饱和)，当Y接近1(过饱和)时公式不再适用，周期趋于无穷。"},{id:244,type:"judge",category:"交通管理与控制",difficulty:1,question:"相位差是相邻交叉口之间信号绿灯起始时刻的时间差。",options:["正确","错误"],answer:[0],explanation:"正确。相位差(offset)是实现干线协调绿波控制的核心参数。"},{id:245,type:"judge",category:"交通管理与控制",difficulty:1,question:"警告标志的形状通常为等边三角形。",options:["正确","错误"],answer:[0],explanation:"正确。我国警告标志为黄色背景的等边三角形，顶点向上。"},{id:246,type:"judge",category:"交通管理与控制",difficulty:2,question:"交通需求管理(TDM)的核心是增加道路基础设施供给。",options:["正确","错误"],answer:[1],explanation:"错误。TDM核心是管理和引导交通需求(减少或转移)，而非增加供给。增加供给属于TSM策略。"},{id:247,type:"judge",category:"交通管理与控制",difficulty:1,question:"单行交通可以提高道路通行能力减少冲突点。",options:["正确","错误"],answer:[0],explanation:"正确。单行道可减少对向冲突，简化交叉口信号相位，提高通行能力。"},{id:248,type:"judge",category:"交通管理与控制",difficulty:2,question:"所有信号交叉口都应设置左转专用相位。",options:["正确","错误"],answer:[1],explanation:"错误。左转专用相位在左转交通量较大或安全需要时才设置，不是所有交叉口的标配。"},{id:249,type:"judge",category:"交通管理与控制",difficulty:1,question:"菱形标线是人行横道预告标线，提醒驾驶员前方有人行横道。",options:["正确","错误"],answer:[0],explanation:"正确。菱形预告标线设于人行横道前30~50m处，用于提前警示。"},{id:250,type:"judge",category:"交通管理与控制",difficulty:2,question:"绿波带可以在任何间距的交叉口之间实现。",options:["正确","错误"],answer:[1],explanation:"错误。绿波带实现需要交叉口间距、行驶速度和周期满足特定关系，不是任意间距都能实现有效绿波。"},{id:251,type:"judge",category:"交通管理与控制",difficulty:1,question:"环形交叉口(环岛)不需要信号控制。",options:["正确","错误"],answer:[1],explanation:"错误。环岛适用于中低流量。当交通量过大时环岛可能锁死，需要信号控制或改为信号交叉口。"},{id:252,type:"judge",category:"交通管理与控制",difficulty:2,question:"黄灯时间通常设置为3秒。",options:["正确","错误"],answer:[0],explanation:"正确。我国城市道路黄灯时间通常为3秒(设计速度≤60km/h)，高速道路可延长至4~5秒。"},{id:253,type:"judge",category:"交通管理与控制",difficulty:1,question:"停车让行标志是唯一一个八角形的交通标志。",options:["正确","错误"],answer:[0],explanation:"正确。停车让行(Stop)为红色八角形，减速让行(Yield)为倒三角形。"},{id:254,type:"judge",category:"交通管理与控制",difficulty:2,question:"可变信息标志(VMS)可以在任何位置随意设置。",options:["正确","错误"],answer:[1],explanation:"错误。VMS应根据路网结构、关键决策点和视认性要求合理设置，不能随意布设。"},{id:255,type:"judge",category:"交通管理与控制",difficulty:2,question:"半感应控制通常在次要道路上设置检测器。",options:["正确","错误"],answer:[0],explanation:"正确。半感应控制在次要道路入口设检测器，主路保持常绿，次路有车请求时给绿灯。"},{id:256,type:"judge",category:"交通管理与控制",difficulty:1,question:"匝道控制(Ramp Metering)通过信号灯调节进入主线的流量。",options:["正确","错误"],answer:[0],explanation:"正确。匝道控制通过设置信号灯控制进入主线的车辆流率，防止主线拥堵。"},{id:257,type:"judge",category:"交通管理与控制",difficulty:2,question:"潮汐车道适用于全天双向交通量均衡的道路。",options:["正确","错误"],answer:[1],explanation:"错误。潮汐车道适用于早晚高峰方向分布严重不均衡的道路，而非双向均衡道路。"},{id:258,type:"judge",category:"交通管理与控制",difficulty:1,question:"导流线(V型线)禁止车辆压线或越线行驶。",options:["正确","错误"],answer:[0],explanation:"正确。导流线区域为禁止标线区域，车辆不得压线或越线行驶。"},{id:259,type:"judge",category:"交通管理与控制",difficulty:2,question:"HOV车道仅允许公交车使用。",options:["正确","错误"],answer:[1],explanation:"错误。HOV车道允许满足最低乘坐人数要求(通常2人或3人以上)的所有车辆使用，不限于公交车。"},{id:260,type:"judge",category:"交通管理与控制",difficulty:1,question:"绿信比是有效绿灯时间与周期时长之比。",options:["正确","错误"],answer:[0],explanation:"正确。λ=有效绿灯时间/周期时长，是各相位分配通行时间的比例。"},{id:261,type:"single",category:"公路工程技术标准",difficulty:1,question:"根据JTG B01-2014，公路按技术等级分为几个等级？",options:["五个","三个","四个","六个"],answer:[0],explanation:"公路技术等级：高速公路、一级公路、二级公路、三级公路、四级公路五个等级。"},{id:262,type:"single",category:"公路工程技术标准",difficulty:1,question:"高速公路的设计速度不包括以下哪项？",options:["140km/h","120km/h","100km/h","80km/h"],answer:[0],explanation:"JTG B01-2014规定高速公路设计速度：120、100、80km/h。140km/h不在规定范围内。"},{id:263,type:"single",category:"公路工程技术标准",difficulty:2,question:"JTG B01-2014中，公路功能分类将公路分为几类？",options:["五类","三类","四类","六类"],answer:[0],explanation:"按交通功能分为：主要干线公路、次要干线公路、主要集散公路、次要集散公路、支线公路五类。"},{id:264,type:"single",category:"公路工程技术标准",difficulty:2,question:"设计速度为120km/h的高速公路，车道宽度应为？",options:["3.75m","3.50m","3.25m","4.00m"],answer:[0],explanation:"高速/一级公路设计速度≥80km/h时，车道宽度为3.75m。八车道以上内侧车道主要通行小客车可为3.5m。"},{id:265,type:"single",category:"公路工程技术标准",difficulty:1,question:"设计速度120km/h时，停车视距应为？",options:["210m","160m","110m","75m"],answer:[0],explanation:"JTG B01-2014：120km/h停车视距210m；100km/h→160m；80km/h→110m；60km/h→75m。"},{id:266,type:"single",category:"公路工程技术标准",difficulty:2,question:"设计速度100km/h时，停车视距应为？",options:["160m","210m","110m","75m"],answer:[0],explanation:"100km/h→160m。停车视距=反应距离+制动距离，随速度增加而大幅增加。"},{id:267,type:"single",category:"公路工程技术标准",difficulty:2,question:"设计速度80km/h时，停车视距应为？",options:["110m","160m","210m","75m"],answer:[0],explanation:"80km/h→110m停车视距。"},{id:268,type:"single",category:"公路工程技术标准",difficulty:1,question:"三级公路的设计速度可取？",options:["40km/h或30km/h","60km/h或80km/h","120km/h或100km/h","20km/h"],answer:[0],explanation:"三级公路设计速度：40km/h、30km/h。四级公路：30km/h、20km/h。"},{id:269,type:"single",category:"公路工程技术标准",difficulty:2,question:"JTG B01-2014中，汽车列车的车辆折算系数(PCE)为？",options:["4.0","2.0","2.5","3.0"],answer:[0],explanation:"JTG B01-2014：小客车1.0，中型货车2.0，大型客车2.5，汽车列车4.0。较2003版新增汽车列车分类。"},{id:270,type:"single",category:"公路工程技术标准",difficulty:2,question:"JTG B01-2014相比2003版，服务水平分级从四级变为？",options:["六级","五级","三级","不变(四级)"],answer:[0],explanation:"2014版标准将服务水平从四级细化为六级(一至六级)，一级最优(自由流)，六级最差(强制流)。"},{id:271,type:"single",category:"公路工程技术标准",difficulty:2,question:"八车道及以上高速公路，内侧1、2车道主要通行小型车辆时车道宽度可采用？",options:["3.50m","3.75m","3.25m","4.00m"],answer:[0],explanation:"根据JTG B01-2014，八车道及以上高速内侧车道主要通行小客车时车道宽度可采用3.5m。"},{id:272,type:"single",category:"公路工程技术标准",difficulty:1,question:"四级公路的设计速度可取？",options:["30km/h或20km/h","40km/h或60km/h","80km/h或100km/h","120km/h"],answer:[0],explanation:"四级公路设计速度：30km/h、20km/h，为最低技术等级道路。"},{id:273,type:"single",category:"公路工程技术标准",difficulty:2,question:"JTG B01-2014规定，二级及以上干线公路应进行什么评价？",options:["安全性评价","经济评价","美学评价","政治评价"],answer:[0],explanation:"2014版标准首次要求二级及以上干线公路强制进行运行速度检验和安全性评价。"},{id:274,type:"single",category:"公路工程技术标准",difficulty:2,question:"高速公路特殊困难局部路段经论证可采用60km/h设计速度，但其长度不宜大于？",options:["15km","5km","10km","20km"],answer:[0],explanation:"JTG B01-2014：特殊困难路段经论证可采用60km/h，但长度不宜大于15km，且相邻路段设计速度不应大于80km/h。"},{id:275,type:"single",category:"公路工程技术标准",difficulty:3,question:"JTG B01-2014新增的设计车辆类型不包括？",options:["摩托车","大型客车","铰接客车","铰接列车"],answer:[0],explanation:"2014版设计车辆从三类增加到五类：小客车、中型车、大型车(新增大型客车)、汽车列车(新增铰接列车)。摩托车不在设计车辆类型中。"},{id:276,type:"single",category:"公路工程技术标准",difficulty:2,question:"设计速度60km/h的二级公路，停车视距为？",options:["75m","110m","40m","160m"],answer:[0],explanation:"60km/h停车视距75m；40km/h→40m；30km/h→30m；20km/h→20m。"},{id:277,type:"single",category:"公路工程技术标准",difficulty:1,question:"一级公路作为干线公路时，设计速度不宜低于？",options:["100km/h","80km/h","60km/h","120km/h"],answer:[0],explanation:"一级公路作为干线、横向干扰小时宜采用100km/h或80km/h。作为集散公路时宜用60km/h或80km/h。"},{id:278,type:"single",category:"公路工程技术标准",difficulty:2,question:"高速公路和干线一级公路右侧硬路肩的一般值为？",options:["3.0m","1.5m","2.0m","5.0m"],answer:[0],explanation:"高速公路和干线一级公路右侧硬路肩一般值3.0m，最小值1.5m。主要通行小客车时可取2.5m。"},{id:279,type:"single",category:"公路工程技术标准",difficulty:3,question:"JTG B01-2014中，二级公路的汽车荷载等级提高至？",options:["公路-I级","公路-II级","与2003版相同","城市-A级"],answer:[0],explanation:"2014版将二级公路荷载标准从公路-II级提高到公路-I级，与高速公路和一级公路相同。"},{id:280,type:"single",category:"公路工程技术标准",difficulty:1,question:"主要干线公路连接人口规模至少为？",options:["20万以上","5万以上","1万以上","50万以上"],answer:[0],explanation:"主要干线公路连接20万人口以上大中城市、交通枢纽、重要口岸，期望速度≥80km/h。"},{id:281,type:"multi",category:"公路工程技术标准",difficulty:2,question:"根据JTG B01-2014，以下哪些属于公路技术等级？",options:["高速公路","一级公路","二级公路","三级公路","四级公路"],answer:[0,1,2,3,4],explanation:"五个技术等级。原标准部分分类有调整，但全部五个等级均为公路技术等级。"},{id:282,type:"multi",category:"公路工程技术标准",difficulty:1,question:"高速公路的设计速度可取？",options:["120km/h","100km/h","80km/h","60km/h","140km/h"],answer:[0,1,2],explanation:"高速公路设计速度：120、100、80km/h。60km/h仅用于特殊困难路段经论证。140km/h不在标准中。"},{id:283,type:"multi",category:"公路工程技术标准",difficulty:2,question:"JTG B01-2014相比2003版的主要变化包括？",options:["服务水平从四级变为六级","新增设计车辆类型","二级公路荷载等级提高","强制运行速度检验","车辆折算系数调整"],answer:[0,1,2,3,4],explanation:"2014版主要变化涵盖以上所有方面：LOS六级、设计车辆五类、二级公路提高至公路-I级、强制安全评价、PCE调整。"},{id:284,type:"multi",category:"公路工程技术标准",difficulty:2,question:"以下哪些是公路的功能分类？",options:["主要干线公路","次要集散公路","支线公路","高速公路","一级公路"],answer:[0,1,2],explanation:"功能分类：主要干线、次要干线、主要集散、次要集散、支线。高速公路和一级公路是技术等级而非功能分类。"},{id:285,type:"multi",category:"公路工程技术标准",difficulty:1,question:"以下哪些属于公路横断面的组成部分？",options:["行车道","路肩","中央分隔带","人行道","边坡"],answer:[0,1,2,3],explanation:"公路横断面由行车道、路肩、中央分隔带、人行道(城市道路)、边沟、边坡等组成。"},{id:286,type:"multi",category:"公路工程技术标准",difficulty:2,question:"JTG B01-2014中，影响停车视距的主要因素包括？",options:["设计速度","反应时间","路面附着系数","纵坡坡度","驾驶员性别"],answer:[0,1,2,3],explanation:"停车视距取决于设计速度、反应时间(2.5s)、路面附着系数和纵坡坡度。驾驶员性别不是设计考虑因素。"},{id:287,type:"multi",category:"公路工程技术标准",difficulty:2,question:"三级和四级公路的设计速度分别为？",options:["40km/h","30km/h","20km/h","60km/h","100km/h"],answer:[0,1,2],explanation:"三级：40和30km/h。四级：30和20km/h。合计40、30、20km/h。"},{id:288,type:"multi",category:"公路工程技术标准",difficulty:2,question:"JTG B01-2014的设计车辆类型包括？",options:["小客车","中型车","大型客车","铰接列车","摩托车"],answer:[0,1,2,3],explanation:"设计车辆五类：小客车、中型车、大型客车、铰接客车、铰接列车。摩托车不是设计车辆类型。"},{id:289,type:"multi",category:"公路工程技术标准",difficulty:3,question:"以下哪些情况需要进行运行速度检验？",options:["设计速度变化路段","爬坡车道","超高受限路段","直线路段","平坦路段"],answer:[0,1,2],explanation:"运行速度检验应在设计速度变化路段、爬坡车道、超高受限路段等进行，以动态速度检验线形协调性。"},{id:290,type:"multi",category:"公路工程技术标准",difficulty:2,question:"各级公路停车视距与设计速度的关系是？",options:["设计速度越高，视距要求越大","设计速度越低，视距要求越小","视距与速度的平方成正比","视距与速度无关"],answer:[0,1,2],explanation:"停车视距随设计速度增加而增大，大致与速度平方成正比(反应距离+制动距离)。"},{id:291,type:"judge",category:"公路工程技术标准",difficulty:1,question:"JTG B01-2014公路按技术等级分为五个等级。",options:["正确","错误"],answer:[0],explanation:"正确。高速公路、一级公路、二级公路、三级公路、四级公路共五个等级。"},{id:292,type:"judge",category:"公路工程技术标准",difficulty:1,question:"设计速度120km/h时停车视距为210m。",options:["正确","错误"],answer:[0],explanation:"正确。120km/h→210m，是最高设计速度对应的最长停车视距。"},{id:293,type:"judge",category:"公路工程技术标准",difficulty:2,question:"JTG B01-2014中车辆折算系数与2003版完全相同。",options:["正确","错误"],answer:[1],explanation:"错误。2014版将大型车折算系数由2.0调整为2.5，新增汽车列车系数4.0。"},{id:294,type:"judge",category:"公路工程技术标准",difficulty:2,question:"八车道及以上高速公路所有车道宽度均为3.75m。",options:["正确","错误"],answer:[1],explanation:"错误。内侧1、2车道主要通行小型车辆时可采用3.5m。"},{id:295,type:"judge",category:"公路工程技术标准",difficulty:1,question:"四级公路的设计速度可取30km/h或20km/h。",options:["正确","错误"],answer:[0],explanation:"正确。四级公路是最低技术等级，设计速度30km/h或20km/h。"},{id:296,type:"judge",category:"公路工程技术标准",difficulty:2,question:"JTG B01-2014不要求进行运行速度检验。",options:["正确","错误"],answer:[1],explanation:"错误。2014版首次要求二级及以上干线公路进行运行速度检验和安全性评价。"},{id:297,type:"judge",category:"公路工程技术标准",difficulty:2,question:"二级公路的汽车荷载等级与高速公路相同。",options:["正确","错误"],answer:[0],explanation:"正确。2014版将二级公路荷载等级从公路-II级提高到公路-I级，与高速和一级公路相同。"},{id:298,type:"judge",category:"公路工程技术标准",difficulty:1,question:"三级公路的设计速度可取40km/h。",options:["正确","错误"],answer:[0],explanation:"正确。三级公路设计速度：40km/h和30km/h。"},{id:299,type:"judge",category:"公路工程技术标准",difficulty:2,question:"高速公路硬路肩一般值为3.0m。",options:["正确","错误"],answer:[0],explanation:"正确。高速公路和干线一级公路右侧硬路肩一般值3.0m，最小值1.5m。"},{id:300,type:"judge",category:"公路工程技术标准",difficulty:1,question:"公路功能分类中的主要干线公路对应高速公路技术等级。",options:["正确","错误"],answer:[0],explanation:"正确。主要干线公路服务20万人口以上城市，期望速度≥80km/h，对应高速公路。"},{id:301,type:"single",category:"公路工程技术标准",difficulty:1,question:"JTG B01-2014发布和实施日期分别为？",options:["2014年9月发布，2015年1月实施","2013年发布，2014年实施","2015年发布，2015年实施","2014年1月发布，2014年6月实施"],answer:[0],explanation:"JTG B01-2014于2014年9月30日发布，2015年1月1日起施行。"},{id:302,type:"single",category:"公路工程技术标准",difficulty:2,question:"公路等级选用的基本原则是？",options:["功能→交通量→技术等级→设计速度→横断面","交通量→功能→技术等级→设计速度","设计速度→功能→交通量→技术等级","横断面→设计速度→技术等级→功能"],answer:[0],explanation:"JTG B01-2014以公路功能为主导，选用流程：功能定位→预测交通量→确定技术等级→设计速度→横断面及构造物指标。"},{id:303,type:"single",category:"公路工程技术标准",difficulty:2,question:"次要干线公路连接人口规模至少为？",options:["10万以上","20万以上","5万以上","50万以上"],answer:[0],explanation:"次要干线公路连接10万人口以上城市和区域经济中心，期望速度≥60km/h，对应二级及以上公路。"},{id:304,type:"single",category:"公路工程技术标准",difficulty:2,question:"主要集散公路的期望速度不低于？",options:["40km/h","60km/h","80km/h","30km/h"],answer:[0],explanation:"主要集散公路连接5万人口以上县市，期望速度≥40km/h，对应一、二级公路。"},{id:305,type:"single",category:"公路工程技术标准",difficulty:1,question:"设计速度40km/h时，停车视距为？",options:["40m","75m","30m","110m"],answer:[0],explanation:"40km/h停车视距40m。各级停车视距：120→210, 100→160, 80→110, 60→75, 40→40, 30→30, 20→20。"},{id:306,type:"single",category:"公路工程技术标准",difficulty:3,question:"货车停车视距与普通停车视距的关系是？",options:["货车停车视距通常大于普通停车视距","两者完全相同","货车停车视距小于普通停车视距","没有规律"],answer:[0],explanation:"货车因制动性能较差(尤其长大下坡)，所需停车视距大于小客车。JTG B01-2014附录B给出货车停车视距和识别视距。"},{id:307,type:"single",category:"公路工程技术标准",difficulty:2,question:"识别视距(Decision Sight Distance)与停车视距的关系是？",options:["识别视距通常大于停车视距","两者相等","识别视距小于停车视距","没有关系"],answer:[0],explanation:"识别视距是驾驶员发现前方障碍物并作出判断所需的距离，比停车视距长(多了判断决策时间)，JTG B01-2014附录B有具体规定。"},{id:308,type:"single",category:"公路工程技术标准",difficulty:2,question:"2014版标准取消了以下哪项指标？",options:["路基总宽度指标值","车道宽度","停车视距","设计速度"],answer:[0],explanation:"2014版取消了路基总宽度指标值，不再进行刚性约束，给予设计更大灵活性。"},{id:309,type:"single",category:"公路工程技术标准",difficulty:3,question:"JTG B01-2014标准共包含多少章和多少条文？",options:["10章135个条文","8章100个条文","12章150个条文","10章200个条文"],answer:[0],explanation:"全标准共10章135个条文+附录A(服务水平分级)+附录B(货车停车视距和识别视距)。"},{id:310,type:"single",category:"公路工程技术标准",difficulty:2,question:"一级公路作为集散公路时，设计速度宜采用？",options:["60km/h或80km/h","100km/h","120km/h","40km/h"],answer:[0],explanation:"一级公路作为集散公路时横向干扰较大，宜采用60km/h或80km/h。作为干线时宜用100km/h或80km/h。"},{id:311,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"JTG D80-2006是哪个规范的标准号？",options:["高速公路交通工程及沿线设施设计通用规范","公路工程技术标准","公路隧道设计规范","公路交通安全设施设计规范"],answer:[0],explanation:"JTG D80-2006全称为《高速公路交通工程及沿线设施设计通用规范》。"},{id:312,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"JTG D80-2006中，交通安全设施设计必须采用什么速度进行安全性评价？",options:["运行速度","设计速度","步行速度","自由流速度"],answer:[0],explanation:"JTG D80-2006明确要求采用运行速度(非设计速度)进行全线安全性评价，通过调整线形或设施增进安全。"},{id:313,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"高速公路交通标志中，红色表示？",options:["禁止","警告","指路","指示"],answer:[0],explanation:"标准颜色体系：红色=禁止，黄色=警告，蓝色=指示，绿色=指路(高速公路)，棕色=旅游区。"},{id:314,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"高速公路反光标线的设计应满足什么条件？",options:["白天、雨天和夜间的视认性","仅白天的视认性","仅夜间的视认性","仅晴天的视认性"],answer:[0],explanation:"JTG D80-2006要求反光标线必须满足白天、雨天、夜间等多种天气条件下的视认性要求。"},{id:315,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"设计速度120km/h或100km/h时，高速公路车行道边缘线宽度为？",options:["20cm","15cm","10cm","25cm"],answer:[0],explanation:"120/100km/h时：车行道边缘线宽20cm，分界线宽15cm。80km/h时边缘线宽20cm或15cm。"},{id:316,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"防眩设施的主要功能是？",options:["防止对向车灯眩光","防止车辆冲出道路","引导车辆行驶","美化道路环境"],answer:[0],explanation:"防眩设施(防眩板、防眩网、植物防眩)用于防止对向车辆前照灯造成的眩光，保障夜间行车安全。"},{id:317,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"隔离栅的主要作用是？",options:["防止行人、动物进入高速公路","防止车辆冲出道路","美化道路","降低噪声"],answer:[0],explanation:"隔离栅用于实现高速公路的全封闭管理，阻止行人、动物等进入高速公路范围。"},{id:318,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"高速公路监控系统按配置等级从低到高分为？",options:["A22、A21、A12、A11","A1、A2、A3、A4","B1、B2、B3、B4","I、II、III、IV"],answer:[0],explanation:"监控系统配置等级：A22(最低)→A21→A12→A11(最高)。等级按服务水平和车道数综合确定。"},{id:319,type:"single",category:"高速公路交通工程通用规范",difficulty:3,question:"监控系统最高配置等级A11适用的条件是？",options:["八车道高速(二级下限)或六车道高速(低于二级)","四车道高速(二级)","六车道高速(二级)","所有高速公路"],answer:[0],explanation:"A11(最高)适用于八车道高速(服务水平二级下限)或六车道高速(低于二级水平)，需最完善监控设施。"},{id:320,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"监控系统信息采集设备不包括？",options:["收费计算机","车辆检测器","摄像机(CCTV)","气象检测器"],answer:[0],explanation:"信息采集：车辆检测器、摄像机、气象检测器、紧急报警设施。收费计算机属于收费系统。"},{id:321,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"A11级监控系统应具备什么特殊功能？",options:["交通异常自动判断功能","手动巡查功能","仅视频监控功能","仅数据记录功能"],answer:[0],explanation:"A11最高等级应具备交通异常自动判断功能，能够自动检测事故、拥堵等事件。各级均应备有应急处理预案。"},{id:322,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"监控系统信息发布设备不包括？",options:["车辆检测器","可变信息标志(CMS)","可变限速标志","车道控制标志"],answer:[0],explanation:"信息发布：可变信息标志、可变限速标志、车道控制标志。车辆检测器属于信息采集设备。"},{id:323,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"高速公路收费制式中，联网收费通常采用？",options:["封闭式","开放式","混合式","人工式"],answer:[0],explanation:"封闭式收费适用于联网收费区域、里程长、行驶距离差别大、出入交通量大的高速公路。"},{id:324,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"独立收费的桥梁和隧道通常采用什么收费制式？",options:["开放式","封闭式","混合式","ETC专用"],answer:[0],explanation:"开放式收费适用于独立收费的桥梁、隧道等，在主线某一位置设置收费站。"},{id:325,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"半自动收费方式(MTC)的组成是？",options:["人工收费+计算机管理+CCTV监视","全自动机器收费","仅人工收费","全ETC收费"],answer:[0],explanation:"MTC(Manual Toll Collection)半自动收费：人工收费+计算机辅助管理+CCTV闭路电视监视，是一般情况下的首选方式。"},{id:326,type:"single",category:"高速公路交通工程通用规范",difficulty:3,question:"封闭式出口收费车道服务时间为？",options:["14~20s","6~8s","20~26s","30~40s"],answer:[0],explanation:"JTG D80-2006：封闭式入口6~8s，出口14~20s；开放式/混合式12~14s；省界联合收费站20~26s。"},{id:327,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"收费车道宽度通常为？",options:["3.2m","3.75m","2.5m","4.5m"],answer:[0],explanation:"收费车道宽度3.2m，超宽车道4.0m。收费岛宽度2.2m，侧面高度0.30m。"},{id:328,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"主线收费岛长度通常为？",options:["28~36m","10~20m","40~50m","50~60m"],answer:[0],explanation:"JTG D80-2006：主线收费岛28~36m，匝道收费岛18~36m。收费天棚净高≥5.5m。"},{id:329,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"收费车道数达到多少条时必须设置地下专用通道？",options:["8条","4条","6条","10条"],answer:[0],explanation:"收费车道数≥8条时，必须设置地下专用通道，保障收费人员通行安全。"},{id:330,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"收费车道计算机应具备什么能力？",options:["≥48小时独立工作和降级使用功能","≥24小时独立工作","≥72小时独立工作","≥12小时独立工作"],answer:[0],explanation:"车道计算机应具备≥48h独立工作和降级使用功能，当通信中断时仍能独立运行和存储数据。"},{id:331,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"收费站数据保存时间要求为？",options:["≥40天","≥7天","≥90天","≥365天"],answer:[0],explanation:"收费站数据保存≥40天，须采用数据自动备份机制。收费中心服务器采用双机热备工作方式。"},{id:332,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"高速公路通信系统以什么方式为主？",options:["光纤通信","卫星通信","微波通信","无线电通信"],answer:[0],explanation:"JTG D80-2006规定以光纤通信为主，有条件地区可配合移动通信。"},{id:333,type:"single",category:"高速公路交通工程通用规范",difficulty:3,question:"通信系统干线网基于什么传输平台？",options:["SDH多业务传输平台(STM-4/STM-16)","PDH平台","ATM平台","IP平台"],answer:[0],explanation:"干线网基于SDH多业务传输平台，采用STM-4(622Mbps)或STM-16(2.5Gbps)。接入网采用STM-1/STM-4。"},{id:334,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"通信系统光纤标准为？",options:["ITU-T G.652或G.655","ITU-T G.651","IEEE 802.3","ISO 11801"],answer:[0],explanation:"光纤采用ITU-T G.652(标准单模光纤)或G.655(非零色散位移光纤)标准。"},{id:335,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"通信管道应布设在什么位置？",options:["中央分隔带内","路肩外侧","行车道下方","边坡上"],answer:[0],explanation:"JTG D80-2006规定通信管道宜布设在中央分隔带内，必须与土建工程同步实施。"},{id:336,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"通信系统用电负荷等级为？",options:["一级负荷","二级负荷","三级负荷","无特殊要求"],answer:[0],explanation:"通信系统用电为一级负荷，必须保证不间断供电，通常配置UPS和备用发电机组。"},{id:337,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"通信机房采用联合接地方式，接地电阻不大于？",options:["1Ω","4Ω","10Ω","0.5Ω"],answer:[0],explanation:"通信机房设备采用联合接地，接地电阻≤1Ω。会议电视系统≤0.5Ω。路侧紧急报警设施≤10Ω。"},{id:338,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"监控外场设备管道设计交通量按照预测第多少年的交通量确定？",options:["20年","5年","10年","15年"],answer:[0],explanation:"管道和基础设计交通量按照预测第20年确定，机电设备按预测第5年交通量确定。"},{id:339,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"高速公路交通工程设施的设计应遵循什么原则？",options:["安全、环保、可持续发展","追求最大通行能力","最低成本","最先进技术"],answer:[0],explanation:"JTG D80-2006核心理念：安全、服务、管理，遵循安全、环保、可持续发展原则。"},{id:340,type:"single",category:"高速公路交通工程通用规范",difficulty:3,question:"通信系统干线管道应预留多少个以上内径φ90mm的管孔？",options:["2孔","1孔","4孔","6孔"],answer:[0],explanation:"干线管道应预留≥2孔内径φ90mm以上的管孔，用于未来发展需要。"},{id:341,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"扩展备用光纤至少预留多少芯？",options:["≥8芯","≥4芯","≥16芯","≥2芯"],answer:[0],explanation:"扩展备用光纤≥8芯。省际联网预留光纤≥4芯。通信光电缆必须敷设在通信管道内。"},{id:342,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"防撞垫(缓冲垫)通常设置在？",options:["分流端、出口等处","曲线路段","直线路段","隧道入口"],answer:[0],explanation:"防撞垫设置在主线分流端、匝道出口三角端等处，用于吸收碰撞能量，保护失控车辆。"},{id:343,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"视线诱导标的用途是？",options:["指示公路线形和方向","限制车速","分隔车流","控制交通量"],answer:[0],explanation:"视线诱导标(轮廓标、线形诱导标等)用于指示公路线形走向、方向和边界，帮助驾驶员预知道路走向。"},{id:344,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"不停车收费(ETC)适用于什么条件？",options:["需要提高服务水平且经常性用户较多时","所有收费站","仅大型收费站","仅小型收费站"],answer:[0],explanation:"ETC适用于需提高服务水平(减少排队)且经常性用户较多的情况，可大幅提高收费效率。"},{id:345,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"收费广场路面材料的要求是？",options:["收费岛前后应为水泥混凝土路面","全部采用沥青路面","全部采用水泥混凝土路面","无特殊要求"],answer:[0],explanation:"收费岛前后路面应为水泥混凝土路面，以适应车辆的频繁制动和起动造成的路面损坏。"},{id:346,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"交通标志设计风速取多少年一遇？",options:["30年一遇10min平均最大风速","50年一遇","10年一遇","100年一遇"],answer:[0],explanation:"交通标志结构设计风速取30年一遇10min平均最大风速，确保标志结构安全。"},{id:347,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"图像传输采用的压缩标准为？",options:["MPEG II或MPEG IV","JPEG","H.261","MP3"],answer:[0],explanation:"图像传输采用MPEG II或MPEG IV数字压缩标准，采用IP组播技术实现多点同时观看。"},{id:348,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"通信系统同步方式为？",options:["主从同步","准同步","全同步","异步"],answer:[0],explanation:"通信系统采用主从同步方式：一级节点设PRC(基准时钟)，二级节点设LPR，三级节点设BITS。"},{id:349,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"监控、收费、通信系统的设计均应具备什么能力？",options:["联网扩展能力","独立运行能力","最低成本","最先进技术"],answer:[0],explanation:"JTG D80-2006要求监控、收费、通信各系统均应具备联网扩展能力，支持区域联网运行。"},{id:350,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"省界联合收费站每车服务时间为？",options:["20~26s","6~8s","14~20s","30~40s"],answer:[0],explanation:"省界联合收费站服务时间20~26s，因需处理不同省份收费标准和结算，时间最长。"},{id:351,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"高速公路监控系统中，匝道控制的主要功能是？",options:["控制入口匝道车辆汇入主线的流量","控制主线车辆驶出","控制服务区车辆","控制收费站车辆"],answer:[0],explanation:"匝道控制(Ramp Metering)通过信号灯控制进入主线的车辆流率，防止因匝道车辆过多导致主线拥堵。"},{id:352,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"监控外场设备的设计交通量按照预测第几年的交通量确定？",options:["第5年","第10年","第20年","第1年"],answer:[0],explanation:"机电设备设计按预测第5年交通量；管道和基础设计按预测第20年交通量。"},{id:353,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"交通工程设施与主体工程的设计施工关系是？",options:["同步规划、设计、施工","先主体后设施","先设施后主体","无关，独立实施"],answer:[0],explanation:"交通工程设施与主体工程应同步规划、设计、施工。管理设施可总体规划、一次设计、分期实施。"},{id:354,type:"single",category:"高速公路交通工程通用规范",difficulty:3,question:"高速公路收费中心服务器应采用什么工作方式？",options:["双机热备","单机运行","冷备方式","不需要备份"],answer:[0],explanation:"收费中心服务器采用双机热备工作方式，一台故障时另一台自动接管，保证收费数据不丢失。"},{id:355,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"通信系统为用路者和管理者提供什么类型的网络平台？",options:["宽带网络平台","窄带网络平台","单业务平台","模拟信号平台"],answer:[0],explanation:"通信系统提供集语音、数据、图像于一体的宽带网络平台，支持多媒体业务。"},{id:356,type:"single",category:"高速公路交通工程通用规范",difficulty:3,question:"会议电视系统的接地电阻要求为？",options:["≤0.5Ω","≤1Ω","≤4Ω","≤10Ω"],answer:[0],explanation:"会议电视系统对接地要求最高，接地电阻≤0.5Ω。一般通信机房≤1Ω。路侧紧急报警设施≤10Ω。"},{id:357,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"高速公路监控系统监控方式不包括？",options:["信号灯控制","主线控制","匝道控制","通道控制"],answer:[0],explanation:"监控方式分：主线控制(调节主线流)、匝道控制(控制入口汇入)、通道控制(协调相邻道路)。信号灯控制说法过于笼统。"},{id:358,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"通信系统支撑网不包括？",options:["业务网","数字同步网","公共信令网","网络管理网"],answer:[0],explanation:"通信系统三层架构：传送网(干线+接入)、业务网(电话/数据/图像)、支撑网(同步/信令/网管)。业务网属于第二层。"},{id:359,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"信令网采用什么标准？",options:["中国No.7信令","No.1信令","SS7信令","SIP信令"],answer:[0],explanation:"JTG D80-2006规定采用中国No.7信令标准(即SS7)，用于电话交换网的信令传输。"},{id:360,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"护栏与桥梁护栏的防撞等级应？",options:["相互匹配","护栏等级高于桥梁","桥梁等级高于护栏","互不相关"],answer:[0],explanation:"护栏与桥梁护栏防撞等级应相互匹配，确保过渡段安全。不匹配时需设置过渡段。"},{id:361,type:"single",category:"高速公路交通工程通用规范",difficulty:1,question:"交通标志的支撑方式中，门架式适用于？",options:["多车道道路需要每条车道都能看到标志","单车道道路","人行道","停车场"],answer:[0],explanation:"门架式支撑适用于多车道高速或主干道，标志横跨所有车道上方，确保每条车道驾驶员都能看到。"},{id:362,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"防眩板的设计需考虑什么因素？",options:["道路平纵线形和车辆前照灯高度","路面颜色","天气条件","交通量"],answer:[0],explanation:"防眩板设计需考虑道路平纵线形(弯道设置角度)和车辆前照灯高度，确保有效阻挡对向眩光。"},{id:363,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"高速公路交通标志的反光等级应满足？",options:["夜间和恶劣天气条件下的识别要求","仅白天识别要求","仅晴天识别要求","无特殊要求"],answer:[0],explanation:"标志应使用反光材料，确保夜间、雨天、雾天等条件下的视认性。反光等级根据道路等级和设计速度确定。"},{id:364,type:"single",category:"高速公路交通工程通用规范",difficulty:3,question:"通信管道必须与什么工程同步实施？",options:["高速公路土建工程","机电设备安装","路面施工","绿化工程"],answer:[0],explanation:"通信管道必须与高速公路土建工程同步实施(预埋)，敷设在中央分隔带或路侧，避免后期开挖。"},{id:365,type:"single",category:"高速公路交通工程通用规范",difficulty:2,question:"不停车收费系统(ETC)车道应与什么配合使用？",options:["自动栏杆和车辆识别系统","仅自动栏杆","仅人工收费","仅监控摄像头"],answer:[0],explanation:"ETC车道需配合自动栏杆(异常情况拦截)、车辆自动识别(AVI)、车型分类等系统使用。"},{id:366,type:"single",category:"公路隧道设计规范",difficulty:1,question:"JTG D70/2-2014是什么规范的编号？",options:["公路隧道设计规范 第二册 交通工程与附属设施","公路隧道设计规范 第一册 土建工程","公路工程技术标准","高速公路交通工程通用规范"],answer:[0],explanation:"JTG D70/2-2014即《公路隧道设计规范 第二册 交通工程与附属设施》，2014年8月1日实施。"},{id:367,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道交通工程设施配置等级按什么因素划分？",options:["隧道长度和预测交通量","仅隧道长度","仅交通量","隧道路面类型"],answer:[0],explanation:"配置等级按隧道单洞长度和预测单洞年平均日交通量(AADT)双重因素划分为A+、A、B、C、D五级。"},{id:368,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道设施配置最高等级为？",options:["A+","A","S","一级"],answer:[0],explanation:"配置等级从高到低：A+(最高)→A→B→C→D(最低)。A+适用于特长隧道+大交通量。"},{id:369,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道通风控制标准不包括以下哪项？",options:["PM2.5浓度","CO浓度","NO2浓度","能见度(VI)"],answer:[0],explanation:"通风标准：CO浓度(一氧化碳)、NO2浓度(二氧化氮)、能见度VI(烟雾浓度)、风速等。PM2.5不是隧道通风控制指标。"},{id:370,type:"single",category:"公路隧道设计规范",difficulty:2,question:"单向交通隧道内设计风速不宜大于？",options:["10m/s","5m/s","15m/s","20m/s"],answer:[0],explanation:"规范规定单向交通隧道内设计风速不宜大于10m/s，双向交通隧道不宜大于8m/s。"},{id:371,type:"single",category:"公路隧道设计规范",difficulty:2,question:"采用机械通风的隧道必须设置哪些检测器？",options:["能见度检测器、CO检测器、风速风向检测器","仅CO检测器","仅风速检测器","仅温度检测器"],answer:[0],explanation:"采用机械通风的隧道必须设能见度(VI)检测器、CO检测器、风速风向检测器。NO2检测器宜设。"},{id:372,type:"single",category:"公路隧道设计规范",difficulty:3,question:"隧道照明分为哪几个区段？",options:["入口段、过渡段、中间段、出口段","仅入口段和出口段","仅中间段","入口段和中间段"],answer:[0],explanation:"隧道照明按驾驶员视觉适应分为：入口段(适应明→暗)、过渡段(TR1/TR2/TR3逐级减亮)、中间段(基本照明)、出口段(适应暗→明)。"},{id:373,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道入口段照明亮度取决于什么因素？",options:["洞外亮度L20(S)和设计车速","仅洞外亮度","仅设计车速","隧道长度"],answer:[0],explanation:"入口段亮度=洞外亮度L20(S)×折减系数k。k值由设计车速和交通量确定。L20(S)为距洞口一个停车视距处的20度视场平均亮度。"},{id:374,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道出口段照明亮度应为中间段的？",options:["3~5倍","1倍(相同)","10倍","0.5倍"],answer:[0],explanation:"出口段照明需适应人眼明适应过程，亮度为中间段的3~5倍，帮助驾驶员从暗环境过渡到亮环境。"},{id:375,type:"single",category:"公路隧道设计规范",difficulty:3,question:"长度大于多少米的高速公路隧道应设置应急照明？",options:["500m","200m","1000m","3000m"],answer:[0],explanation:"L>500m的高速公路隧道应设应急照明，应急供电时间≥30min。L>200m的高速、一级公路隧道应设照明。"},{id:376,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道应急照明供电时间应不少于？",options:["30分钟","10分钟","60分钟","120分钟"],answer:[0],explanation:"应急照明供电时间≥30min，确保在外部电源中断时仍有足够时间疏散人员和车辆。"},{id:377,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道通风控制周期不宜小于？",options:["10分钟","1分钟","30分钟","60分钟"],answer:[0],explanation:"风机控制周期不宜小于10min，风机不应频繁启闭造成喘振。优先启动累计运行时间最短的风机。"},{id:378,type:"single",category:"公路隧道设计规范",difficulty:3,question:"每台风机启动间隔不宜小于？",options:["30秒","10秒","60秒","120秒"],answer:[0],explanation:"每台风机启动间隔不宜小于30s，避免多台风机同时启动对供电系统造成冲击。"},{id:379,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道火灾探测器推荐使用什么类型？",options:["双波长火焰探测器或光纤感温探测系统","普通烟感探测器","温度计","红外摄像机"],answer:[0],explanation:"A+/A级高速公路隧道必须设火灾探测器，推荐双波长火焰探测器或光纤感温探测系统，对隧道环境适应性好。"},{id:380,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道手动报警按钮的间距不宜大于？",options:["50m","100m","25m","200m"],answer:[0],explanation:"手动报警按钮沿隧道壁设置，间距不宜大于50m，确保在火灾初期人员能及时报警。"},{id:381,type:"single",category:"公路隧道设计规范",difficulty:2,question:"所有等级隧道都必须设置的消防设施是？",options:["灭火器","消火栓系统","水成膜泡沫灭火装置","自动喷淋系统"],answer:[0],explanation:"灭火器是所有等级隧道均必须设置的消防设施。消火栓和泡沫灭火装置仅在A+/A级必须设，B级宜设。"},{id:382,type:"single",category:"公路隧道设计规范",difficulty:2,question:"长度小于多少米的高速公路隧道可不设消火栓系统？",options:["500m","200m","1000m","3000m"],answer:[0],explanation:"L<500m的高速公路隧道可不设消火栓系统；L<800m的一级公路隧道可不设消火栓及泡沫灭火装置。"},{id:383,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道内交通信号灯应设置在什么位置？",options:["隧道入口联络通道前20~50m处","隧道中间段","隧道出口外","隧道入口后500m"],answer:[0],explanation:"交通信号灯设在隧道入口联络通道前20~50m处，由红、黄、绿和左转箭头组成，用于隧道交通控制。"},{id:384,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道车辆检测器应能检测什么信息？",options:["交通量、速度、行车方向，能识别二轮摩托车及以上所有车型","仅交通量","仅速度","仅车辆存在"],answer:[0],explanation:"隧道车辆检测器应能检测交通量、速度、行车方向，并能识别二轮摩托车及以上的所有车型。"},{id:385,type:"single",category:"公路隧道设计规范",difficulty:3,question:"隧道照明控制通常采用什么方式？",options:["根据交通量、洞外亮度、季节等分级调光控制","固定亮度全天不变","人工手动开关","仅根据洞外亮度控制"],answer:[0],explanation:"隧道照明控制根据交通量变化、洞外亮度变化、季节更替、时间段等进行分级调光控制，以节约能源。"},{id:386,type:"single",category:"公路交通安全",difficulty:1,question:"公路交通安全设施中，护栏的基本功能不包括？",options:["增加道路美观度","保护","隔离","缓冲和导向"],answer:[0],explanation:"护栏四大功能：保护(防止车辆冲出)、隔离(分隔对向车流)、缓冲(吸收碰撞能量)、导向(引导车辆回正)。美观不是基本功能。"},{id:387,type:"single",category:"公路交通安全",difficulty:1,question:"护栏按结构形式可分为？",options:["刚性、半刚性和柔性护栏","混凝土和钢护栏","路侧和中央护栏","波形梁和缆索护栏"],answer:[0],explanation:"三种：刚性(混凝土)、半刚性(波形梁钢护栏)、柔性(缆索护栏)。"},{id:388,type:"single",category:"公路交通安全",difficulty:1,question:"波形梁护栏属于什么类型的护栏？",options:["半刚性护栏","刚性护栏","柔性护栏","弹性护栏"],answer:[0],explanation:"波形梁钢护栏是典型的半刚性护栏，具有一定的变形吸能能力和良好的视线诱导效果，是最常用的护栏形式。"},{id:389,type:"single",category:"公路交通安全",difficulty:1,question:"缆索护栏属于什么类型？",options:["柔性护栏","半刚性护栏","刚性护栏","弹性护栏"],answer:[0],explanation:"缆索护栏是柔性护栏，通过缆索的拉伸变形吸收碰撞能量，适合积雪地区和长直线段。"},{id:390,type:"single",category:"公路交通安全",difficulty:2,question:"混凝土护栏(刚性护栏)的主要特点是？",options:["维修费用低，但安全性和舒适性较差","维修费用高","易更换","视线诱导好"],answer:[0],explanation:"混凝土刚性护栏碰撞后几乎不变形，维修费低，但碰撞时减速度大，安全性舒适性差，适用于大型车比例高路段。"},{id:391,type:"single",category:"公路交通安全",difficulty:2,question:"护栏防护等级从低到高排列正确的是？",options:["C→B→A→SB→SA→SS→HB→HA","A→B→C→SB→SA","HA→HB→SS→SA","B→C→A→SB"],answer:[0],explanation:"防护等级(低→高)：一(C)→二(B)→三(A/Am)→四(SB/SBm)→五(SA/SAm)→六(SS/SSm)→七(HB)→八(HA)。带m为中央分隔带专用。"},{id:392,type:"single",category:"公路交通安全",difficulty:2,question:"高速公路设计速度120km/h，事故严重程度为高时，路基护栏防撞等级为？",options:["六(SS、SSm)级","五(SA、SAm)级","四(SB、SBm)级","三(A、Am)级"],answer:[0],explanation:"120km/h+严重程度高→六(SS/SSm)级。100或80km/h+严重程度高→五(SA/SAm)级。"},{id:393,type:"single",category:"公路交通安全",difficulty:2,question:"高速公路设计速度100km/h或80km/h，事故严重程度高时，护栏等级为？",options:["五(SA、SAm)级","六(SS、SSm)级","四(SB、SBm)级","三(A、Am)级"],answer:[0],explanation:"100或80km/h+高事故严重程度→五(SA/SAm)级。120km/h时才是六(SS/SSm)级。"},{id:394,type:"single",category:"公路交通安全",difficulty:3,question:"跨越大型饮用水水源一级保护区和高速铁路的桥梁，护栏防撞等级宜为？",options:["八(HA)级","六(SS)级","五(SA)级","四(SB)级"],answer:[0],explanation:"特殊桥梁(跨越一级水源保护区、高速铁路、缆索承重桥梁等)防护等级宜采用HA(八级，最高级)。"},{id:395,type:"single",category:"公路交通安全",difficulty:2,question:"中央分隔带护栏，当整体式断面中间带宽度满足什么条件时必须设置？",options:["宽度≤12m或宽度内有障碍物","宽度>12m","任何宽度","宽度≤5m"],answer:[0],explanation:"中间带宽度≤12m，或宽度内有障碍物时，必须设中央分隔带护栏。分离式断面左侧按路侧护栏设置。"},{id:396,type:"single",category:"公路交通安全",difficulty:2,question:"因某些因素造成更严重碰撞后果的路段，应提高护栏的什么？",options:["防撞等级","高度","长度","颜色"],answer:[0],explanation:"因线形、运行速度、填土高度、交通量和车辆构成等因素造成更严重后果时，应提高护栏的防撞等级。"},{id:397,type:"single",category:"公路交通安全",difficulty:2,question:"波形梁护栏(高速/一级公路)的最小结构长度是？",options:["70m","48m","28m","100m"],answer:[0],explanation:"波形梁护栏最小结构长度：高速/一级70m，二级48m，三四级28m。小于此长度时护栏不能发挥整体防护效果。"},{id:398,type:"single",category:"公路交通安全",difficulty:2,question:"混凝土护栏(高速/一级公路)的最小结构长度是？",options:["36m","70m","24m","12m"],answer:[0],explanation:"混凝土护栏最小长度：高速/一级36m，二级24m，三四级12m。"},{id:399,type:"single",category:"公路交通安全",difficulty:2,question:"缆索护栏(高速/一级公路)的最小结构长度是？",options:["300m","70m","120m","36m"],answer:[0],explanation:"缆索护栏最小长度：高速/一级300m，二级120m，三四级120m。缆索护栏需较长锚固长度。"},{id:400,type:"single",category:"公路交通安全",difficulty:3,question:"大型车(总质量≥25t)自然数比例超过多少时，护栏应提高1个等级？",options:["20%","10%","30%","50%"],answer:[0],explanation:"总质量≥25t的大型车自然数比例>20%时，护栏防撞等级应提高1个等级。纵坡接近最大纵坡值的下坡路段也应提高1级。"},{id:401,type:"single",category:"公路交通安全",difficulty:1,question:"路侧护栏必须设置的条件(事故严重程度=高)不包括？",options:["净区内有一般建筑物","净区内有高速铁路","净区内有高速公路","净区内有高压输电线路"],answer:[0],explanation:"必须设置(高)：净区内有高速铁路、高速公路、高压输电线路、危险品储藏仓库。一般建筑物属于较低严重程度。"},{id:402,type:"single",category:"公路交通安全",difficulty:2,question:"路侧护栏应设置的条件(事故严重程度=中)包括？",options:["净区外有水深1.5m以上的水域","净区外有普通建筑物","净区外有一般农田","净区内有低矮灌木"],answer:[0],explanation:"应设置(中)：江/河/湖/海/沼泽等水深1.5m以上水域；I级铁路、一级公路；悬崖深谷深沟≥30m(三四级公路)。"},{id:403,type:"single",category:"公路交通安全",difficulty:1,question:"迎交通流方向的护栏端头应如何处理？",options:["外展或设置防撞端头/防撞垫","直接暴露","埋入地下","移除不用"],answer:[0],explanation:"迎交通流护栏端头必须外展至路侧净区外或设置防撞端头(防撞垫)，防止失控车辆直接撞击端头。"},{id:404,type:"single",category:"公路交通安全",difficulty:2,question:"不同防护等级或结构的护栏连接处必须设置？",options:["过渡段","直接连接","断开","警示标志"],answer:[0],explanation:"不同防护等级或不同结构形式的护栏连接处必须设置过渡段，过渡段防护等级≥所连接护栏中较低的等级。"},{id:405,type:"single",category:"公路交通安全",difficulty:3,question:"护栏面距防护障碍物的距离应大于？",options:["护栏最大横向动态位移外延值(W)或车辆最大动态外倾当量值(Vn)","护栏高度","护栏长度","任意值"],answer:[0],explanation:"护栏与障碍物的净距应>W(障碍物低于护栏)或>Vn(障碍物高于护栏)，确保碰撞时车辆和护栏不撞击障碍物。"},{id:406,type:"single",category:"公路交通安全",difficulty:2,question:"高速公路护栏事故严重程度分为几个等级？",options:["三个","四个","两个","五个"],answer:[0],explanation:"重要考点：事故严重程度分低、中、高三级(非四级！)。这是一个常见错误选项。"},{id:407,type:"single",category:"公路交通安全",difficulty:1,question:"交通标志中，警告标志的颜色是？",options:["黄底黑边黑图案","红底白字","蓝底白图案","绿底白字"],answer:[0],explanation:"警告标志为黄底、黑色边框、黑色图案(等边三角形)，提醒注意前方潜在危险。"},{id:408,type:"single",category:"公路交通安全",difficulty:2,question:"交通标线中，白色实线表示？",options:["禁止车辆变换车道或跨越","允许车辆变换车道","仅供行人使用","表示对向车流分隔"],answer:[0],explanation:"白色实线(同向车道分隔)禁止车辆变换车道或跨越。黄色实线用于对向车流分隔和禁止跨越。"},{id:409,type:"single",category:"公路交通安全",difficulty:2,question:"视线诱导设施包括轮廓标、线形诱导标和？",options:["合流诱导标","交通信号灯","可变信息标志","防眩板"],answer:[0],explanation:"视线诱导设施：轮廓标(显示道路轮廓)、线形诱导标(指示线形变化)、合流诱导标(提示前方合流)等。"},{id:410,type:"single",category:"公路交通安全",difficulty:2,question:"轮廓标通常设置在什么位置？",options:["道路边缘或护栏上","路面上方","隧道顶部","收费站"],answer:[0],explanation:"轮廓标沿道路两侧边缘或护栏上设置，反射车灯光线，显示道路线形轮廓，引导驾驶员夜间行驶。"},{id:411,type:"single",category:"公路交通安全",difficulty:3,question:"以下哪种路段不适合使用缆索护栏？",options:["小半径曲线路段","积雪地区","长直线段","不均匀沉降路段"],answer:[0],explanation:"缆索护栏不适合小半径曲线路段，因缆索张力在曲线上不易保持。适合长直线、积雪、不均匀沉降地区。"},{id:412,type:"single",category:"公路交通安全",difficulty:2,question:"波形梁护栏的优点不包括？",options:["维修费用最低","容易更换","视线诱导好","外形美观"],answer:[0],explanation:"波形梁护栏易更换、视线诱导好、外形美观，但碰撞后需维修更换，维修费用高于混凝土护栏。"},{id:413,type:"single",category:"公路交通安全",difficulty:1,question:"高速公路必须设置中央分隔带护栏的情况是？",options:["所有高速公路桥梁","仅部分高速公路","仅在弯道处","仅在下坡处"],answer:[0],explanation:"高速公路和作为干线的一级公路桥梁必须设置中央分隔带护栏。各等级公路桥梁必须设置路侧护栏。"},{id:414,type:"single",category:"公路交通安全",difficulty:2,question:"交通安全设施按功能分类中，属于被动安全设施的是？",options:["护栏","交通标志","交通标线","交通信号灯"],answer:[0],explanation:"护栏属于被动安全设施(车辆碰撞时发挥作用)，标志标线和信号灯属于主动安全设施(预防事故发生)。"},{id:415,type:"single",category:"公路交通安全",difficulty:3,question:"防撞垫(缓冲垫)的碰撞吸能原理是？",options:["通过内部可压缩材料或结构逐步吸收车辆动能","通过刚性阻挡停车","通过弹性反弹","通过磁力制动"],answer:[0],explanation:"防撞垫通过内部可压溃材料(如蜂窝铝、泡沫等)或结构在碰撞时逐步变形吸收车辆动能，降低碰撞减速度。"},{id:416,type:"multi",category:"公路交通安全",difficulty:2,question:"护栏按结构形式分为哪几类？",options:["刚性护栏(混凝土)","半刚性护栏(波形梁)","柔性护栏(缆索)","弹性护栏","塑料护栏"],answer:[0,1,2],explanation:"三种结构形式：刚性(混凝土)、半刚性(波形梁钢护栏)、柔性(缆索)。"},{id:417,type:"multi",category:"公路交通安全",difficulty:2,question:"以下哪些是护栏必须设置或应设置的条件？",options:["净区内有高速铁路","路侧有水深1.5m以上的水域","悬崖深谷深沟≥30m","净区内有高压输电线路"],answer:[0,1,2,3],explanation:"全部正确。净区内有高速铁路/高速公路/高压线/危险品仓库→必须设。水深>1.5m/I级铁路/深沟≥30m→应设。"},{id:418,type:"multi",category:"公路交通安全",difficulty:2,question:"高速公路护栏事故严重程度分为哪三个等级？",options:["低","中","高","极高","超高"],answer:[0,1,2],explanation:"事故严重程度仅分低、中、高三级。这是重要考点，注意不是四级。"},{id:419,type:"multi",category:"公路交通安全",difficulty:3,question:"以下哪些情况下护栏防撞等级应提高1个等级？",options:["纵坡接近最大纵坡的下坡路段","圆曲线半径接近最小半径的路段外侧","总质量≥25t的大型车比例>20%","直线路段","平坦路段"],answer:[0,1,2],explanation:"提高1级：①纵坡接近最大下坡路段 ②半径接近最小曲线的外侧 ③大型车(≥25t)比例>20%。"},{id:420,type:"multi",category:"公路交通安全",difficulty:2,question:"以下哪些属于视线诱导设施？",options:["轮廓标","线形诱导标","合流诱导标","护栏","信号灯"],answer:[0,1,2],explanation:"视线诱导设施包括轮廓标、线形诱导标、合流诱导标、诱导标等。护栏和信号灯不属于视线诱导设施。"},{id:421,type:"multi",category:"公路交通安全",difficulty:2,question:"波形梁护栏的优点包括？",options:["容易更换","视线诱导好","外形美观","维修费用低"],answer:[0,1,2],explanation:"波形梁护栏易更换、视线诱导好、外形美观。但碰撞后需维修，维修费用高于混凝土护栏。"},{id:422,type:"multi",category:"公路交通安全",difficulty:1,question:"交通标志按功能分为哪些类型？",options:["警告标志","禁令标志","指示标志","指路标志","施工标志"],answer:[0,1,2,3],explanation:"主要类型：警告、禁令(禁止/限制)、指示、指路、旅游区、施工安全等。"},{id:423,type:"multi",category:"公路交通安全",difficulty:2,question:"缆索护栏适用于以下哪些场景？",options:["积雪地区","长直线段","不均匀沉降地基","小半径曲线"],answer:[0,1,2],explanation:"缆索护栏适合积雪地区、长直线段、不均匀沉降地基。不适合小半径曲线(缆索张力难保持)。"},{id:424,type:"multi",category:"公路交通安全",difficulty:2,question:"护栏端头处理方式包括？",options:["外展至路侧净区外","设置防撞端头","设置防撞垫","直接暴露不处理"],answer:[0,1,2],explanation:"迎交通流护栏端头必须外展或设置防撞端头/防撞垫。直接暴露会造成严重安全隐患。"},{id:425,type:"multi",category:"公路交通安全",difficulty:1,question:"以下哪些属于被动安全设施？",options:["护栏","防撞垫","缓冲端头","可变信息标志"],answer:[0,1,2],explanation:"被动安全设施在事故发生时发挥作用(护栏、防撞垫、缓冲端头)。VMS属于主动安全(信息预警)。"},{id:426,type:"judge",category:"公路交通安全",difficulty:1,question:"护栏事故严重程度分为四个等级。",options:["正确","错误"],answer:[1],explanation:"错误。事故严重程度分为低、中、高三个等级，不是四个等级。"},{id:427,type:"judge",category:"公路交通安全",difficulty:1,question:"波形梁护栏属于半刚性护栏。",options:["正确","错误"],answer:[0],explanation:"正确。波形梁钢护栏是典型的半刚性护栏，具有一定的变形吸能能力。"},{id:428,type:"judge",category:"公路交通安全",difficulty:1,question:"高速公路和干线一级公路桥梁必须设置中央分隔带护栏。",options:["正确","错误"],answer:[0],explanation:"正确。各等级公路桥梁必须设路侧护栏，高速和干线一级还必须设中央分隔带护栏。"},{id:429,type:"judge",category:"公路交通安全",difficulty:2,question:"迎交通流的护栏端头可以直接暴露不处理。",options:["正确","错误"],answer:[1],explanation:"错误。迎交通流护栏端头必须外展或设置防撞端头/防撞垫，防止车辆直接撞击端头造成严重伤害。"},{id:430,type:"judge",category:"公路交通安全",difficulty:2,question:"中央分隔带宽度大于12m时必须设置中央分隔带护栏。",options:["正确","错误"],answer:[1],explanation:"错误。中间带宽度≤12m或宽度内有障碍物时须设护栏。宽度>12m时可以不在中央设置。"},{id:431,type:"judge",category:"公路交通安全",difficulty:2,question:"缆索护栏适用于所有曲线路段。",options:["正确","错误"],answer:[1],explanation:"错误。缆索护栏不适合小半径曲线路段，因缆索张力在曲线上不易保持。"},{id:432,type:"judge",category:"公路交通安全",difficulty:2,question:"大型车(≥25t)比例超过20%时护栏应提高1个防撞等级。",options:["正确","错误"],answer:[0],explanation:"正确。总质量≥25t的大型车自然数比例>20%时，护栏应提高1个防撞等级。"},{id:433,type:"judge",category:"公路交通安全",difficulty:1,question:"混凝土护栏的维修费用在各类护栏中最低。",options:["正确","错误"],answer:[0],explanation:"正确。混凝土刚性护栏碰撞后几乎不变形，维修费用最低，但安全性舒适性较差。"},{id:434,type:"judge",category:"公路交通安全",difficulty:2,question:"护栏防护等级HA为最低等级。",options:["正确","错误"],answer:[1],explanation:"错误。HA(八级)是最高防护等级，用于特殊重要桥梁。C(一级)是最低等级。"},{id:435,type:"judge",category:"公路交通安全",difficulty:2,question:"不同防护等级的护栏可以直接连接不需过渡。",options:["正确","错误"],answer:[1],explanation:"错误。不同防护等级或结构的护栏连接处必须设置过渡段。"},{id:436,type:"judge",category:"公路交通安全",difficulty:1,question:"轮廓标属于视线诱导设施。",options:["正确","错误"],answer:[0],explanation:"正确。轮廓标是视线诱导设施的一种，通过反射车灯显示道路线形轮廓。"},{id:437,type:"judge",category:"公路交通安全",difficulty:2,question:"护栏的防撞等级越高越好，所有路段都应使用最高等级护栏。",options:["正确","错误"],answer:[1],explanation:"错误。护栏本身也是障碍物，应适度防护，根据事故严重程度和道路条件合理选择等级。"},{id:438,type:"judge",category:"公路交通安全",difficulty:1,question:"红色在交通标志中表示禁止、停止或危险。",options:["正确","错误"],answer:[0],explanation:"正确。红色在交通标志中通常表示禁止、停止、危险或消防信息。"},{id:439,type:"judge",category:"公路交通安全",difficulty:2,question:"缆索护栏的最小结构长度在高速公路上为300m。",options:["正确","错误"],answer:[0],explanation:"正确。缆索护栏需要较长锚固长度，高速/一级公路最小300m。"},{id:440,type:"judge",category:"公路交通安全",difficulty:1,question:"波形梁护栏碰撞后可以更换损坏部分。",options:["正确","错误"],answer:[0],explanation:"正确。波形梁护栏是组装式结构，碰撞后可局部更换损坏的波形板、立柱等部件。"},{id:441,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道通风排烟设计主要针对什么工况？",options:["火灾工况","正常运营工况","养护工况","高峰工况"],answer:[0],explanation:"排烟设计重点考虑火灾工况下的排烟策略，包括临界风速确定、排烟量计算和排烟方式选择。"},{id:442,type:"single",category:"公路隧道设计规范",difficulty:3,question:"隧道火灾通风的临界风速是指？",options:["能够阻止烟气向上游(逆流)传播的最小纵向风速","使烟气完全排出的风速","隧道设计最大风速","风机最大出力时的风速"],answer:[0],explanation:"临界风速是火灾时阻止烟气向上游逆流扩散所需的最小纵向通风风速，是隧道排烟设计的关键参数。"},{id:443,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道照明入口段亮度折减系数k主要取决于？",options:["设计车速和预测交通量","隧道长度","洞外温度","路面类型"],answer:[0],explanation:"入口段折减系数k由设计速度和交通量确定，速度越高、交通量越大，k值越小(要求亮度越高)。"},{id:444,type:"single",category:"公路隧道设计规范",difficulty:2,question:"隧道中间段照明亮度一般范围是？",options:["1.0~10.0 cd/m^2","0.1~0.5 cd/m^2","50~100 cd/m^2","100~500 cd/m^2"],answer:[0],explanation:"中间段亮度根据设计速度和交通量取值，一般范围1.0~10.0cd/m^2。设计速度越高，亮度要求越高。"},{id:445,type:"single",category:"公路隧道设计规范",difficulty:2,question:"L>200m的高速公路、一级公路隧道应设置什么？",options:["
